# [GPT-5.6] REG-1 per-repository worker policy.
# PRIVATE. This file contains account names and spend posture, but NEVER tokens or secret values.
#
# [FABLE-5] STANDING RULE for every onboarded target (maintainer decision 2026-07-17): UI/front-end
# surfaces route to the openai/codex model chain (original-builder ownership: GPT-5.6 built the
# registry dashboard, e4098b9). Each target's routing table (the `routing` pointer below) must
# carry a terra-led `role = "site"` route — see README "Standing routing rules" + this repo's own
# orchestration/routing.toml for the canonical form.
#
# [FABLE-5] STANDING RULE for every onboarded target (maintainer decision 2026-07-17): frontier-
# tier agents (fable = Claude Fable, terra = GPT-5.6 sol/codex) author ALL CI/infrastructure work,
# incl. the self-draining pipeline itself (.github/workflows, dispatch/worker/gate scripts).
# Each target's routing table must carry a FRONTIER-ONLY `role = "ci"` chain (["fable", "terra"] —
# no sonnet/haiku): chain exhaustion then DEFERS at the claim step (defer-not-fallback, retried
# next tick) instead of degrading tier. Security match_labels overrides still win where they
# overlap. See README "Standing routing rules"; sparq-org/sparq carries it (sparq PR #3422).
#
# Schema for every [repos."owner/name"] row (all fields are required):
#   enabled                = bool
#   routing                = string  # relative role -> model_chain + agent table in the target repo
#   account_pool           = [string, ...]
#   max_concurrent         = positive integer
#   worker_timeout_minutes = positive integer
#   gate_profile           = "none" | "lint-only" | "crate-scoped" | "workspace"
#   arm_auto_merge         = bool
#   max_attempts           = positive integer
#   trust                  = "collaborators"
# Optional cross-provider review-loop fields (defaults in policy-resolve.py):
#   max_review_rounds        = positive integer (default 3)  # BASE review<->fix rounds; on
#                              exhaustion decide_budget (worker-pr.py) may extend to a hard cap
#                              of 6 total via a fix-model-tier escalation, an improving-progress
#                              verdict, or the re-review of a pushed pinned-floor fix that has
#                              not been graded yet, before needs-user (2026-07-17)
#   review_queue_ttl_minutes = positive integer (default 30) # review:needs age before alerting
#   cross_provider_fallback  = bool (default false)          # opt-in same-provider degrade when the
#                                                            # opposite provider is starved; false =
#                                                            # stay queued + alert (honest default)

[repos."sparq-org/sparq"]
enabled = true
routing = "orchestration/routing.toml"
account_pool = ["acct01", "acct02", "acct03", "acct04", "acct2css", "acct3css", "acct4css", "acct05", "acct06", "acct07"]
max_concurrent = 40
worker_timeout_minutes = 90
gate_profile = "crate-scoped"
arm_auto_merge = true         # arming now actually happens — ONLY in the review-fix approve path
require_usage = true          # hold (fail-closed) if the usage probe is unavailable
usage_safety_margin = 0.15    # admit only accounts with >=15% headroom in BOTH windows
max_attempts = 3              # per-issue worker attempts (also bounds the deferred-retry loop)
trust = "collaborators"
max_review_rounds = 3         # BASE bound; decide_budget may extend to 6 total (see header)
review_queue_ttl_minutes = 30 # surface a codex-starved review backlog after this age
cross_provider_fallback = false  # honest default: stay queued + alert, never silently degrade

# [OPUS-4.8] The registry as a SECOND self-managed target — its OWN pipeline drains its own
# ~19 open from:agent issues (triage -> ready -> worker -> draft PR -> cross-provider review ->
# arm) exactly like sparq. This repo IS the orchestration trust plane, so it runs conservatively:
# a SMALL max_concurrent, the SHARED account_pool, sparq-style routing (impl -> fable chain, docs
# -> haiku, review cross-provider), and a python/actions gate profile (the crate-scoped cargo gate
# does not fit a python repo). Its routing.toml (orchestration/routing.toml, in THIS repo) marks
# every orchestration area (dispatch/worker/set-up-account/review-loop/groom) as a soundness
# surface (escalate=true) so those routes run on Opus and, on chain-exhaustion, escalate to a
# human — AND the review lane's arm-side classifier reads those same match_labels keywords so an
# approved trust-surface PR is HUMAN-armed, never auto-armed (defect #3).
[repos."jeswr/agent-account-registry"]
enabled = true
routing = "orchestration/routing.toml"   # THIS repo's own routing (self-managed target)
account_pool = ["acct01", "acct02", "acct03", "acct04", "acct2css", "acct3css", "acct4css", "acct05", "acct06", "acct07"]
max_concurrent = 3            # SMALL: the trust plane drains slowly + conservatively
worker_timeout_minutes = 30   # python self-tests + actionlint are fast (no cargo build)
gate_profile = "registry-selftest"  # python --self-test suite + bash -n + actionlint (see worker-live.sh)
arm_auto_merge = true         # allow_auto_merge is enabled live (B1); the FINAL arm click on a
                              # gate-weakening trust-surface diff is still a human's (security_paths
                              # below, enforced at arm time — review stays automated)
require_usage = true          # hold (fail-closed) if the usage probe is unavailable
usage_safety_margin = 0.05    # small python jobs — 15% headroom over-delayed registry claims (2026-07-17); sparq keeps 0.15
max_attempts = 3
trust = "collaborators"
max_review_rounds = 3
review_queue_ttl_minutes = 30
cross_provider_fallback = false
# [OPUS-4.8] B3 / defects #2,#4: the ACTIVE, WIRED trust-surface FILE control. A worker PR whose
# diff touches ANY of these gate-weakening / orchestration-control paths routes its ARM to a HUMAN
# even for a benign-labelled PR (area:docs/haiku etc.). CONSUMED by review-fix.yml: the review-
# outcome + ready-and-arm steps pass this list to worker-pr.trust_surface_paths_touched, and
# ready-and-arm re-derives the live PR diff (renamed paths included) before ever undrafting/arming.
# The automated cross-provider review still runs — only the final arm click is a human's here.
security_paths = [
  "scripts/trust-gate.py",
  "scripts/dispatch-claim.py",
  "scripts/worker-live.sh",
  "scripts/worker-pr.py",
  "scripts/worker-issue.py",
  "scripts/select-and-claim.py",
  "scripts/groom.py",
  "scripts/broker-refresh.py",
  "scripts/account-usage.py",
  "scripts/policy-resolve.py",
  "scripts/route-resolve.py",
  "scripts/ready-issues.py",
  "scripts/dispatch-plan.py",
  "scripts/triage.py",
  "policy/",
  "orchestration/",
  ".github/workflows/",
  ".claude/agents/",
]
