# [GPT-5.6] REG-1 per-repository worker policy.
# PRIVATE. This file contains account names and spend posture, but NEVER tokens or secret values.
#
# MODEL NAMING + POLICY (maintainer directive 2026-07-18): sol is the codex-side FRONTIER model
# (GPT-5.6 sol/codex). terra is a DIFFERENT, sonnet-class GPT model — earlier comments here
# misnamed it "GPT-5.6 sol/codex". terra and sonnet are DOCS-ONLY: they never implement, review,
# or fix (review-fix.yml / dispatch-claim.py / worker-pr.py assert this structurally). sol
# reviews anthropic-authored content; opus stays lead reviewer of openai-authored content.
#
# [FABLE-5] STANDING RULE for every onboarded target (maintainer decision 2026-07-17): UI/front-end
# surfaces route to the openai/codex model chain (original-builder ownership: GPT-5.6 sol/codex
# built the registry dashboard, e4098b9). Each target's routing table (the `routing` pointer below)
# must carry a sol-led `role = "site"` route — see README "Standing routing rules" + this repo's own
# orchestration/routing.toml for the canonical form.
#
# [FABLE-5] STANDING RULE for every onboarded target (maintainer decision 2026-07-17): frontier-
# tier agents (fable = Claude Fable, sol = GPT-5.6 sol/codex) author ALL CI/infrastructure work,
# incl. the self-draining pipeline itself (.github/workflows, dispatch/worker/gate scripts).
# Each target's routing table must carry a FRONTIER-ONLY `role = "ci"` chain (["sol", "fable"] —
# no terra/sonnet/haiku): chain exhaustion then DEFERS at the claim step (defer-not-fallback,
# retried next tick) instead of degrading tier. Security match_labels overrides still win where
# they overlap. See README "Standing routing rules"; sparq-org/sparq carries it (sparq PR #3422).
#
# Schema for every [repos."owner/name"] row (all fields are required):
#   enabled                = bool
#   routing                = string  # relative role -> model_chain + agent table in the target repo
#   account_pool           = [string, ...]
#   max_concurrent         = positive integer
#   worker_timeout_minutes = positive integer
#   gate_profile           = "none" | "lint-only" | "crate-scoped" | "workspace"
#   arm_auto_merge         = bool
#   max_attempts           = positive integer
#   trust                  = "collaborators"
# Optional cross-provider review-loop fields (defaults in policy-resolve.py):
#   max_review_rounds        = positive integer (default 3)  # BASE review<->fix rounds; on
#                              exhaustion decide_budget (worker-pr.py) may extend to a hard cap
#                              of 6 total via a fix-model-tier escalation, an improving-progress
#                              verdict, or the re-review of a pushed pinned-floor fix that has
#                              not been graded yet, before needs-user (2026-07-17)
#   review_queue_ttl_minutes = positive integer (default 30) # review:needs age before alerting
#   cross_provider_fallback  = bool (default false)          # opt-in same-provider degrade when the
#                                                            # opposite provider is starved; false =
#                                                            # stay queued + alert (honest default)
#   trusted_bots             = [string, ...] (default [])    # issue #111: the EXACT allowlist of
#                              trusted App bot issue-author logins, added to the OWNER/MEMBER/
#                              COLLABORATOR associations of `trust = "collaborators"`. CLAIM unions
#                              it with the runtime-resolved worker App `bot_login`, so the pipeline's
#                              own App bot needs NO entry here; list ONLY additional trusted bots.
#                              Suffix-matching "<x>[bot]" is gone — an unlisted bot is never trusted.
#
# [FABLE-5] Optional per-target THROUGHPUT controls. target_ready is consumed by
# scripts/curate-frontier.py; the alert thresholds are consumed by scripts/metrics.py, whose
# defaults live in metrics.DEFAULT_THRESHOLDS. metrics.py collects, per ENABLED target, the
# maintainer's 6 asks — issues open / ready to
# drain (via each target's REAL readiness definition, NOT a label count) / drained last hour, PRs
# open, PR open-rate, PR close/merge-rate — plus derived net_pr_flow + review_lane_health, appends
# each snapshot to a bounded ring on the `ledger` branch (LEDGER_REF, data/metrics-history.json),
# and upserts ONE deduped `throughput-alert` issue per (target, classification) when a SUSTAINED
# backlog-growth-vs-drain condition holds. Classifications: backlog-growing | review-lane-stalled |
# ready-starved | worker-failing. All fields optional; each must be the type shown:
#   [repos."owner/name".throughput]
#   target_ready            = int in [1,100] (default 12) # curate-frontier ready-depth target
#   open_pr_alert_threshold = positive int (default 20)   # backlog-growing needs prs_open above this
#   ready_alert_threshold   = positive int (default 40)   # ready-starved needs issues_ready above this
#   sustain_snapshots       = positive int (default 2)    # K: recent snapshots that must AGREE for
#                                                         #   ANY of the four rules (all are sustained)
#   worker_success_floor    = float in [0,1] (default 0.5)# worker-failing below this with attempts
#   worker_min_samples      = positive int (default 3)    # worker-failing needs >= this many attempts
#                                                         #   (a single failed run is noise, not a fail)
#   recover_snapshots       = positive int (default 2)    # hysteresis: auto-close only after the
#                                                         #   condition is clear this many ticks
# Optional per-target readiness override (defaults by repo — sparq: status:ready engine via
# ready-issues.py; registry: its own open `from:agent` backlog):
#   [repos."owner/name".readiness]
#   kind = "status-ready" | "from-agent-open"

[repos."sparq-org/sparq"]
enabled = true
routing = "orchestration/routing.toml"
account_pool = ["acct01", "acct02", "acct03", "acct04", "acct2css", "acct3css", "acct4css", "acct05", "acct06", "acct07"]
max_concurrent = 40
worker_timeout_minutes = 90
gate_profile = "crate-scoped"
arm_auto_merge = true         # arming now actually happens — ONLY in the review-fix approve path
require_usage = true          # hold (fail-closed) if the usage probe is unavailable
usage_safety_margin = 0.15    # admit only accounts with >=15% headroom in BOTH windows
max_attempts = 3              # per-issue worker attempts (also bounds the deferred-retry loop)
trust = "collaborators"
max_review_rounds = 3         # BASE bound; decide_budget may extend to 6 total (see header)
review_queue_ttl_minutes = 30 # surface a codex-starved review backlog after this age
cross_provider_fallback = false  # honest default: stay queued + alert, never silently degrade

# [FABLE-5] Throughput alert thresholds (scripts/metrics.py). sparq is a large, fast repo, so the
# backlog bar sits above a healthy steady-state (dozens of open + draft PRs is normal); the alert
# is for GROWTH-with-no-drain, which the 2026-07-18T09:10Z snapshot already trips (52 open PRs,
# open-rate 5/hr, close-rate 0/hr, 0 merges this hour despite 51 in 24h => review lane stalled).
[repos."sparq-org/sparq".throughput]
target_ready            = 30   # stocked frontier for the standing 60/hr throughput goal
open_pr_alert_threshold = 40   # backlog-growing needs open PRs above this AND close-rate < open-rate
ready_alert_threshold   = 60   # ready-starved needs this many ready issues AND 0 closed in 1h
sustain_snapshots       = 2    # anti-spike: 2 consecutive */15 ticks must agree (~30 min)
worker_success_floor    = 0.5  # worker-failing below 50% success with any worker attempts this hour

# [OPUS-4.8] The registry as a SECOND self-managed target — its OWN pipeline drains its own
# ~19 open from:agent issues (triage -> ready -> worker -> draft PR -> cross-provider review ->
# arm) exactly like sparq. This repo IS the orchestration trust plane, so it runs conservatively:
# a SMALL max_concurrent, the SHARED account_pool, sparq-style routing (impl -> sol-led chain,
# docs -> haiku, review cross-provider), and a python/actions gate profile (the crate-scoped cargo gate
# does not fit a python repo). Its routing.toml (orchestration/routing.toml, in THIS repo) marks
# every orchestration area (dispatch/worker/set-up-account/review-loop/groom) as a soundness
# surface (escalate=true) so those routes run on Opus and, on chain-exhaustion, escalate to a
# human — AND the review lane's arm-side classifier reads those same match_labels keywords so an
# approved trust-surface PR is HUMAN-armed, never auto-armed (defect #3).
[repos."jeswr/agent-account-registry"]
enabled = true
routing = "orchestration/routing.toml"   # THIS repo's own routing (self-managed target)
account_pool = ["acct01", "acct02", "acct03", "acct04", "acct2css", "acct3css", "acct4css", "acct05", "acct06", "acct07"]
max_concurrent = 3            # SMALL: the trust plane drains slowly + conservatively
worker_timeout_minutes = 30   # python self-tests + actionlint are fast (no cargo build)
gate_profile = "registry-selftest"  # python --self-test suite + bash -n + actionlint (see worker-live.sh)
arm_auto_merge = true         # allow_auto_merge is enabled live (B1); the FINAL arm click on a
                              # trust-surface diffs AUTO-ARM on approve with a SHA-bound audit
                              # trail (Decision 7 revised 2026-07-18; security_paths below feeds
                              # the audit, no longer a human park)
require_usage = true          # hold (fail-closed) if the usage probe is unavailable
usage_safety_margin = 0.05    # small python jobs — 15% headroom over-delayed registry claims (2026-07-17); sparq keeps 0.15
max_attempts = 3
trust = "collaborators"
max_review_rounds = 3
review_queue_ttl_minutes = 30
cross_provider_fallback = false

# [FABLE-5] Throughput alert thresholds (scripts/metrics.py). The trust plane drains slowly (small
# max_concurrent) so its healthy backlog is much smaller — a lower open-PR bar. Its readiness is
# its own open `from:agent` backlog (readiness.kind below), not the sparq status:ready engine.
[repos."jeswr/agent-account-registry".throughput]
target_ready            = 12   # conservative trust-plane frontier depth
open_pr_alert_threshold = 12   # a growing PR backlog is abnormal for the slow-drain trust plane
ready_alert_threshold   = 30   # a large un-drained from:agent frontier with 0 closed in 1h
sustain_snapshots       = 2
worker_success_floor    = 0.5

[repos."jeswr/agent-account-registry".readiness]
kind = "from-agent-open"       # the registry drains its OWN open from:agent issues (its backlog)

# [OPUS-4.8] B3 / defects #2,#4: the ACTIVE, WIRED trust-surface FILE control. A worker PR whose
# diff touches ANY of these gate-weakening / orchestration-control paths routes its ARM to a HUMAN
# even for a benign-labelled PR (area:docs/haiku etc.). CONSUMED by review-fix.yml: the review-
# outcome + ready-and-arm steps pass this list to worker-pr.trust_surface_paths_touched, and
# ready-and-arm re-derives the live PR diff (renamed paths included) before ever undrafting/arming.
# The automated cross-provider review still runs — only the final arm click is a human's here.
#
# [issue #145 — sol-audit worker] DIRECTORY PREFIXES, not an enumerated file list. The prior
# per-script enumeration omitted credential materialization (scripts/worker-prep.sh), the model-
# isolation container (containers/), and the model-health CAS (scripts/model-health.py) — a benign
# PR could weaken any of them without the arm gate firing, and every newly added trust-plane script
# inherited the same hole. Whole-directory prefixes are fail-closed: a NEW file under any of these
# trees is a trust surface the moment it lands. [issue #166] This list is UNIONED onto (it EXTENDS,
# it does NOT replace) worker-pr.py DEFAULT_TRUST_SURFACE_PATHS via resolve_trust_surface_paths, so
# it can only ADD per-target surfaces — a built-in default can never be silently dropped by
# narrowing this list, and the two lists no longer need manual sync (a default added there protects
# this target too). Removing a mandatory default requires an explicit, separately-reviewed deny
# mechanism. Aligns with the worker-live.sh registry-selftest gate.
security_paths = [
  "scripts/",           # every orchestration/credential/health/provenance control script
  "containers/",        # the model-isolation sandbox (worker-model.Dockerfile)
  "policy/",
  "orchestration/",
  ".github/workflows/",
  ".claude/agents/",
]
