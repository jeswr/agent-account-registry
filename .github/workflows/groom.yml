# [GPT-5.6] REG-5 grooming sweep: repairs dead-lease in-progress issues, closed-unmerged-PR
# orphans, exhausted attempt budgets, and stale worker PRs. The cron was enabled after the REG-4
# staged pilot proved target writes end-to-end (issues #2407–#2416 flowed; PRs #2417–#2421
# merged) — groom is the ONLY crash-recovery path, so scheduled runs are load-bearing for
# autonomy. The minute offset avoids same-minute lease-ledger CAS contention with
# groom-leases.yml's */15 cron (both writers are CAS-safe; this is contention reduction).
name: groom

on:
  workflow_dispatch:
  schedule:
    - cron: '7-59/15 * * * *'

permissions: {}

concurrency:
  group: registry-groom
  cancel-in-progress: false

jobs:
  groom:
    name: Reclaim and repair orchestration state
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read       # inspect registry worker run state
      contents: write     # CAS data/leases.json + read data/model-health.json (both on the `ledger` branch)
      issues: write       # upsert/close the model-access health alert issues (model-health decide)
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Out-of-band DATA-ONLY invariant sweep (review round 2): this step runs from MASTER's
      # copy of this workflow on every scheduled tick, so it cannot be bypassed by content on
      # the ledger branch itself. The platform already blocks the confined actor (Actions'
      # GITHUB_TOKEN cannot create/update .github/workflows/** — it never holds the `workflows`
      # permission); this sweep detects and fails LOUD if anything beyond the documented data
      # plane ever appears on `ledger` regardless of how it got there.
      #
      # WHITELIST, not blacklist (review round 3): every tree entry must be one of
      #   100644 blob README.md            (the branch's tombstone/pointer doc)
      #   040000 tree data                 (the data directory itself)
      #   100644 blob data/<name>.json     (regular, non-executable JSON blobs, no subdirs)
      # so executable-mode blobs (100755), symlinks (120000), submodules (160000),
      # extensionless files, and data/evil.py all fail regardless of naming tricks. A
      # truncated tree listing also fails: unverified means violated.
      - name: Assert the ledger branch is still data-only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          resp=$(gh api "repos/$GITHUB_REPOSITORY/git/trees/ledger?recursive=1")
          if [ "$(jq -r '.truncated' <<<"$resp")" != "false" ]; then
            echo "::error::ledger tree listing is truncated — data-only invariant cannot be verified"
            exit 1
          fi
          bad=$(jq -r '.tree[] | [.mode, .type, .path] | @tsv' <<<"$resp" | awk -F'\t' '
            !(($1 == "100644" && $2 == "blob" && $3 == "README.md") ||
              ($1 == "040000" && $2 == "tree" && $3 == "data") ||
              ($1 == "100644" && $2 == "blob" && $3 ~ /^data\/[^\/]+\.json$/))')
          if [ -n "$bad" ]; then
            printf '::error::ledger branch carries non-whitelisted content (data-only invariant violated):\n%s\n' "$bad"
            exit 1
          fi

      - name: Mint target-scoped maintenance App token (pinned)
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: sparq
          permission-issues: write
          permission-pull-requests: write

      - name: Sweep dead leases, stale issues, exhausted attempts, and stale PRs
        env:
          REGISTRY_GH_TOKEN: ${{ github.token }}
          TARGET_GH_TOKEN: ${{ steps.target-token.outputs.token }}
          # An App INSTALLATION token cannot call GET /user; groom resolves the bot identity from
          # the public /users/<slug>[bot] endpoint instead (the worker.yml canary fix).
          APP_SLUG: ${{ steps.target-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          printf '::add-mask::%s\n' "$REGISTRY_GH_TOKEN"
          printf '::add-mask::%s\n' "$TARGET_GH_TOKEN"
          python3 scripts/groom.py --self-test
          python3 scripts/groom.py \
            --registry-repo "$GITHUB_REPOSITORY" \
            --policy-file policy/repos.toml \
            --policy-resolver scripts/policy-resolve.py \
            --bot-slug "$APP_SLUG"

      # Model-access health decision (registry #32): the groom sweep already runs on schedule, so it
      # is the natural place to evaluate the health record window and raise/close alerts (keeps
      # dispatch.yml lean). Reads data/model-health.json + the enabled provider->account fleet, then
      # upserts ONE ops-alert issue per (condition, provider). An unreadable ledger exits NONZERO
      # (every reader fails loud, review r3); continue-on-error keeps the maintenance sweep alive
      # while this step goes visibly red. Account identifiers stay salted (decision 22a).
      #
      # [FABLE-5] `id` + the guard step below: continue-on-error keeps the sweep alive (grooming
      # already ran) but a bare continue-on-error step failure does NOT set groom.result=failure, so
      # the always()-final `alarm` job (keyed on needs.groom.result) would NOT fire and this
      # load-bearing provider-cap alerting step could crash SILENTLY (visible only as a buried
      # per-step annotation — exactly the posture this PR eliminates). The guard re-raises the
      # decide outcome AFTER the sweep is safely complete, so groom reddens → the alarm fires.
      - name: Decide + raise/close model-access health alerts
        id: model_health_decide
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          REGISTRY_ALERT_TOKEN: ${{ github.token }}
          # Privacy routing (locked decision 22c) + the #39 fix: ALERT_REPO without ALERT_TOKEN
          # falls back to the registry repo (never dropped silently). Identifiers stay salted.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
          MAINTAINER_HANDLE: jeswr
          # Salt to map enabled account handles -> the salted hashes stored in the ledger, so the
          # provider-capped ("every enabled account") decision can be computed.
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          set -uo pipefail
          python3 scripts/model-health.py --self-test
          python3 scripts/model-health.py decide --policy-file policy/repos.toml

      # [FABLE-5] Surface a swallowed decide failure into the JOB result so the always() alarm fires.
      # The decide step is continue-on-error (the sweep must survive), but that ALSO hides its
      # failure from the job-level alarm — a silent-failure gap for the load-bearing provider-cap
      # alerting. This step runs last, after grooming is safely done, and reddens groom iff decide
      # failed, so needs.groom.result becomes 'failure' and the alarm records it LOUDLY.
      - name: Fail the job if the model-health decision step failed (so the alarm fires)
        if: ${{ steps.model_health_decide.outcome == 'failure' }}
        run: |
          echo "::error::model-health decide step failed — reddening groom so the pipeline alarm fires (grooming itself completed)"
          exit 1

  # [FABLE-5] Loud-fail alarm — the STRUCTURAL GAP the audit flagged: groom.yml had NO
  # always()/failure()-final alarm, so a failed scheduled groom surfaced ONLY as a red Actions run
  # (the silent class the maintainer is fighting). groom is the ONLY crash-recovery path, so a
  # silent groom failure freezes recovery fleet-wide. This job needs: groom and fires on its
  # failure/cancel, upserting the single rolling pipeline-failure issue.
  alarm:
    needs: groom
    if: ${{ always() && (needs.groom.result == 'failure' || needs.groom.result == 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/pipeline-alarm
        with:
          job-name: groom
          job-result: ${{ needs.groom.result }}
          cancelled: ${{ needs.groom.result == 'cancelled' }}
          detail: "groom sweep ${{ needs.groom.result }} — the crash-recovery path failed; recovery is frozen this tick"
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}
