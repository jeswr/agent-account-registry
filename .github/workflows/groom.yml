# [GPT-5.6] REG-5 grooming sweep: repairs dead-lease in-progress issues, closed-unmerged-PR
# orphans, exhausted attempt budgets, and stale worker PRs. The cron was enabled after the REG-4
# staged pilot proved target writes end-to-end (issues #2407–#2416 flowed; PRs #2417–#2421
# merged) — groom is the ONLY crash-recovery path, so scheduled runs are load-bearing for
# autonomy. The minute offset avoids same-minute lease-ledger CAS contention with
# groom-leases.yml's */15 cron (both writers are CAS-safe; this is contention reduction).
name: groom

on:
  workflow_dispatch:
  schedule:
    - cron: '7-59/15 * * * *'

permissions: {}

concurrency:
  group: registry-groom
  cancel-in-progress: false

jobs:
  groom:
    name: Reclaim and repair orchestration state
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read       # inspect registry worker run state
      contents: write     # compare-and-swap data/leases.json
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Mint target-scoped maintenance App token (pinned)
        id: target-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: sparq
          permission-issues: write
          permission-pull-requests: write

      - name: Sweep dead leases, stale issues, exhausted attempts, and stale PRs
        env:
          REGISTRY_GH_TOKEN: ${{ github.token }}
          TARGET_GH_TOKEN: ${{ steps.target-token.outputs.token }}
          # An App INSTALLATION token cannot call GET /user; groom resolves the bot identity from
          # the public /users/<slug>[bot] endpoint instead (the worker.yml canary fix).
          APP_SLUG: ${{ steps.target-token.outputs.app-slug }}
        run: |
          set -euo pipefail
          printf '::add-mask::%s\n' "$REGISTRY_GH_TOKEN"
          printf '::add-mask::%s\n' "$TARGET_GH_TOKEN"
          python3 scripts/groom.py --self-test
          python3 scripts/groom.py \
            --registry-repo "$GITHUB_REPOSITORY" \
            --policy-file policy/repos.toml \
            --policy-resolver scripts/policy-resolve.py \
            --bot-slug "$APP_SLUG"
