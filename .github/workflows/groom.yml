# [GPT-5.6] REG-5 grooming sweep: repairs dead-lease in-progress issues, closed-unmerged-PR
# orphans, exhausted attempt budgets, and stale worker PRs. The cron was enabled after the REG-4
# staged pilot proved target writes end-to-end (issues #2407–#2416 flowed; PRs #2417–#2421
# merged) — groom is the ONLY crash-recovery path, so scheduled runs are load-bearing for
# autonomy. The minute offset avoids same-minute lease-ledger CAS contention with
# groom-leases.yml's */15 cron (both writers are CAS-safe; this is contention reduction).
name: groom

on:
  workflow_dispatch:
  schedule:
    - cron: '7-59/15 * * * *'

permissions: {}

concurrency:
  group: registry-groom
  cancel-in-progress: false

jobs:
  groom:
    name: Reclaim and repair orchestration state
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read       # inspect registry worker run state
      contents: write     # CAS data/leases.json + read data/model-health.json (both on the `ledger` branch)
      issues: write       # upsert/close the model-access health alert issues (model-health decide)
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Provenance records live on the unprotected `ledger` data-plane branch (issue #96):
      # master's required `gate` check rejects every direct contents-API PUT, so post-outage
      # records exist ONLY at this ref — a master-only read would orphan-park every
      # ledger-recorded draft. The master checkout keeps the pre-outage copies as fallback.
      # Fails the job LOUDLY if the ledger branch is missing.
      - name: Checkout the data-plane ledger branch (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: ledger
          ref: ledger
          persist-credentials: false

      # Out-of-band DATA-ONLY invariant sweep (review round 2): this step runs from MASTER's
      # copy of this workflow on every scheduled tick, so it cannot be bypassed by content on
      # the ledger branch itself. The platform already blocks the confined actor (Actions'
      # GITHUB_TOKEN cannot create/update .github/workflows/** — it never holds the `workflows`
      # permission); this sweep detects and fails LOUD if anything beyond the documented data
      # plane ever appears on `ledger` regardless of how it got there.
      #
      # WHITELIST, not blacklist (review round 3): every tree entry must be one of
      #   100644 blob README.md            (the branch's tombstone/pointer doc)
      #   040000 tree data                 (the data directory itself)
      #   100644 blob data/<name>.json     (regular, non-executable JSON blobs, no subdirs)
      #   040000 tree orchestration[/provenance|/review-verdicts]   (issue #96 record dirs)
      #   100644 blob orchestration/{provenance,review-verdicts}/<name>.json
      # so executable-mode blobs (100755), symlinks (120000), submodules (160000),
      # extensionless files, and data/evil.py all fail regardless of naming tricks. A
      # truncated tree listing also fails: unverified means violated.
      - name: Assert the ledger branch is still data-only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          resp=$(gh api "repos/$GITHUB_REPOSITORY/git/trees/ledger?recursive=1")
          if [ "$(jq -r '.truncated' <<<"$resp")" != "false" ]; then
            echo "::error::ledger tree listing is truncated — data-only invariant cannot be verified"
            exit 1
          fi
          bad=$(jq -r '.tree[] | [.mode, .type, .path] | @tsv' <<<"$resp" | awk -F'\t' '
            !(($1 == "100644" && $2 == "blob" && $3 == "README.md") ||
              ($1 == "040000" && $2 == "tree" && $3 == "data") ||
              ($1 == "100644" && $2 == "blob" && $3 ~ /^data\/[^\/]+\.json$/) ||
              ($1 == "040000" && $2 == "tree" && ($3 == "orchestration" ||
                 $3 == "orchestration/provenance" || $3 == "orchestration/review-verdicts")) ||
              ($1 == "100644" && $2 == "blob" &&
                 $3 ~ /^orchestration\/(provenance|review-verdicts)\/[^\/]+\.json$/))')
          if [ -n "$bad" ]; then
            printf '::error::ledger branch carries non-whitelisted content (data-only invariant violated):\n%s\n' "$bad"
            exit 1
          fi

      # Per-owner target token mint (issue #168): policy enables targets under TWO distinct owners
      # (sparq-org, jeswr), so a SINGLE App token scoped to one owner 404s every read and fails
      # every write on the other owner's repo — aborting the sweep before dead leases are released.
      # dispatch.yml already mints one token per owner; groom now does the same. This step derives
      # the enabled owners from policy and asserts they are exactly {sparq-org, jeswr}, so a policy
      # change adding a third owner fails LOUD here instead of silently dropping that owner's token
      # (which would reintroduce the wrong-owner-token bug).
      - name: Resolve distinct enabled target owners from policy
        id: owners
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import tomllib

          with open("policy/repos.toml", "rb") as handle:
              document = tomllib.load(handle)
          repos = document.get("repos") if isinstance(document, dict) else None
          if not isinstance(repos, dict) or not repos:
              raise SystemExit("policy has no target rows")
          safe = re.compile(r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*")
          owners = {}
          for repo, row in repos.items():
              if not isinstance(row, dict) or row.get("enabled") is not True:
                  continue
              if not isinstance(repo, str) or not safe.fullmatch(repo):
                  raise SystemExit(f"unsafe enabled target repo {repo!r} in policy")
              owner, name = repo.split("/", 1)
              owners.setdefault(owner, name)  # one representative repo per owner is enough
          if set(owners) != {"sparq-org", "jeswr"}:
              raise SystemExit(f"unexpected enabled target owners {sorted(owners)}; add a mint step")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"sparq_name={owners['sparq-org']}\n")
              output.write(f"jeswr_name={owners['jeswr']}\n")
          PY

      # Each mint is continue-on-error: a missing install for one owner only DEFERS that owner's
      # issue/PR repair (groom.py skips it loudly); dead-lease release and the other owner's
      # grooming still run — the whole sweep is never aborted by one owner's credential gap.
      - name: Mint sparq-org target-scoped maintenance App token (pinned)
        id: target-token-sparq
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: ${{ steps.owners.outputs.sparq_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Mint jeswr target-scoped maintenance App token (pinned)
        id: target-token-jeswr
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: ${{ steps.owners.outputs.jeswr_name }}
          permission-issues: write
          permission-pull-requests: write

      # Assemble the {owner: token} JSON map from whichever mints succeeded — a masked, single-line
      # step output; missing owners are simply absent (their grooming defers, never wrong-owner).
      - name: Assemble the per-owner target token map
        id: token-map
        env:
          SPARQ_TOKEN: ${{ steps.target-token-sparq.outputs.token }}
          JESWR_TOKEN: ${{ steps.target-token-jeswr.outputs.token }}
        run: |
          set -euo pipefail
          [[ -z "${SPARQ_TOKEN:-}" ]] || printf '::add-mask::%s\n' "$SPARQ_TOKEN"
          [[ -z "${JESWR_TOKEN:-}" ]] || printf '::add-mask::%s\n' "$JESWR_TOKEN"
          python3 - <<'PY'
          import json
          import os

          tokens = {}
          if os.environ.get("SPARQ_TOKEN"):
              tokens["sparq-org"] = os.environ["SPARQ_TOKEN"]
          if os.environ.get("JESWR_TOKEN"):
              tokens["jeswr"] = os.environ["JESWR_TOKEN"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              # Compact single-line JSON — GITHUB_OUTPUT is line-based; the tokens are masked above.
              output.write(f"tokens={json.dumps(tokens, separators=(',', ':'))}\n")
          PY

      - name: Sweep dead leases, stale issues, exhausted attempts, and stale PRs
        env:
          REGISTRY_GH_TOKEN: ${{ github.token }}
          # Per-owner target App-token map (issue #168): groom.py resolves the token for each target
          # repo's OWNER, so a repo under a second owner is never read/written with the wrong token.
          TARGET_GH_TOKENS: ${{ steps.token-map.outputs.tokens }}
          # An App INSTALLATION token cannot call GET /user; groom resolves the bot identity from
          # the public /users/<slug>[bot] endpoint instead (the worker.yml canary fix). The same App
          # is installed on both owners, so the slug is identical — take it from whichever mint won.
          APP_SLUG: ${{ steps.target-token-sparq.outputs.app-slug || steps.target-token-jeswr.outputs.app-slug }}
        run: |
          set -euo pipefail
          printf '::add-mask::%s\n' "$REGISTRY_GH_TOKEN"
          # Re-mask each per-owner target token defensively (already masked at map assembly).
          python3 - <<'PY'
          import json
          import os
          for token in json.loads(os.environ.get("TARGET_GH_TOKENS", "{}") or "{}").values():
              if token:
                  print(f"::add-mask::{token}")
          PY
          python3 scripts/groom.py --self-test
          python3 scripts/groom.py \
            --registry-repo "$GITHUB_REPOSITORY" \
            --policy-file policy/repos.toml \
            --policy-resolver scripts/policy-resolve.py \
            --bot-slug "$APP_SLUG" \
            --ledger-root ledger

      # Model-access health decision (registry #32): the groom sweep already runs on schedule, so it
      # is the natural place to evaluate the health record window and raise/close alerts (keeps
      # dispatch.yml lean). Reads data/model-health.json + the enabled provider->account fleet, then
      # upserts ONE ops-alert issue per (condition, provider). An unreadable ledger exits NONZERO
      # (every reader fails loud, review r3); continue-on-error keeps the maintenance sweep alive
      # while this step goes visibly red. Account identifiers stay salted (decision 22a).
      - name: Decide + raise/close model-access health alerts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          REGISTRY_ALERT_TOKEN: ${{ github.token }}
          # Privacy routing (locked decision 22c) + the #39 fix: ALERT_REPO without ALERT_TOKEN
          # falls back to the registry repo (never dropped silently). Identifiers stay salted.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
          MAINTAINER_HANDLE: jeswr
          # Salt to map enabled account handles -> the salted hashes stored in the ledger, so the
          # provider-capped ("every enabled account") decision can be computed.
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          set -euo pipefail
          python3 scripts/model-health.py --self-test
          python3 scripts/model-health.py decide --policy-file policy/repos.toml
