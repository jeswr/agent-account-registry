name: account-fleet dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions: {}

concurrency:
  group: account-fleet-dashboard
  cancel-in-progress: true

jobs:
  build:
    name: Build privacy-safe Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # SECRET-EXFIL GUARD (issue #101): reads toJSON(secrets) (ACCT_* probe subset) and
    # PROVENANCE_SALT, which live in the `dispatch-secrets` environment (deployment-branch
    # policy: default branch only) — full rationale on the `claim` job in dispatch.yml.
    # The `deploy` job below keeps its own `github-pages` environment (no secrets there).
    environment: dispatch-secrets
    permissions:
      actions: read
      contents: read
      issues: read
    steps:
      - name: Checkout registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # The mutable data plane (leases + model-health) lives on the unprotected `ledger` branch
      # (issue #28): the master copies under data/ are frozen tombstones. This checkout fails the
      # job LOUDLY if the ledger branch is missing.
      - name: Checkout the data-plane ledger branch (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: ledger
          ref: ledger
          persist-credentials: false

      # Trust guard (review round 1): the ledger branch is DATA-ONLY by design — a
      # `workflow_dispatch` at `ref: ledger` would execute the LEDGER copy of a workflow file,
      # so its non-execution property holds only while no executable content exists at that ref.
      # Fail LOUD if that ever erodes.
      - name: Ledger checkout is data-only (trust guard)
        run: |
          set -euo pipefail
          test ! -e ledger/.github
          test ! -e ledger/scripts

      # Only this filter sees the complete secret map; the probe receives an ACCT_* file.
      - name: Materialize the ACCT_* worker-token subset for the probe
        continue-on-error: true
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/acct-secrets.json" <<'PY'
          import json
          import os
          import re
          import sys

          path = sys.argv[1]
          allow = re.compile(r"ACCT[A-Z0-9]+_TOKEN")
          data = json.loads(os.environ["ALL_SECRETS"])
          subset = {key: value for key, value in data.items()
                    if isinstance(value, str) and allow.fullmatch(key)}
          # Create atomically 0600 (O_EXCL: fresh runner temp, the file must not pre-exist) so the
          # token subset is never even transiently readable under the runner's default umask.
          fd = os.open(path, os.O_WRONLY | os.O_CREAT | os.O_EXCL, 0o600)
          with os.fdopen(fd, "w", encoding="utf-8") as handle:
              json.dump(subset, handle)
          PY

      - name: Probe live account usage (tokens never printed)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          # The salt is the probe's ONLY route to the openai quota signal (issue #29): the
          # model-health ledger keys rate-limit backoff records by SALTED account hash, so a
          # salt-less probe emits bare `{"exempt": true}` entries and the reactive backoff never
          # reaches the dashboard's openai card (sol finding 1, PR #281 fix round).
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          # Read the backoff ledger from THIS job's ledger-branch checkout — the same loudly
          # guarded source dashboard-gen renders from — instead of a second API read.
          MODEL_HEALTH_FILE: ledger/data/model-health.json
          REGISTRY_REPO: ${{ github.repository }}
          SECRETS_FILE: ${{ runner.temp }}/acct-secrets.json
        run: |
          set -uo pipefail
          python3 scripts/account-usage.py --self-test
          # stderr flows to the step log: the probe's fail-open ::warning:: lines are sanitized
          # (no handles/salt/counts — asserted by its self-test), and the old 2>/dev/null is
          # exactly what hid this step's missing-salt gap in production.
          python3 scripts/account-usage.py > "$RUNNER_TEMP/usage.json" || printf '{}' > "$RUNNER_TEMP/usage.json"
          echo 'usage-probe: snapshot written'

      - name: Generate privacy-safe dashboard
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          REGISTRY_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Loud data-plane guard (issue #28): the ledger files must come from the ledger-branch
          # checkout — a dashboard silently rendered from the frozen master copies would misreport
          # every live lease.
          test -f ledger/data/leases.json
          test -f ledger/data/model-health.json
          python3 scripts/dashboard-gen.py --self-test
          # The observability snapshot (issue #246) is OPTIONAL on the ledger until its collector
          # lands: an absent file keeps the panel hidden, while a present-but-invalid one fails
          # this build loudly inside dashboard-gen (never published on a guess).
          python3 scripts/dashboard-gen.py --usage "$RUNNER_TEMP/usage.json" \
            --leases ledger/data/leases.json --model-health ledger/data/model-health.json \
            --observability ledger/data/observability.json
          # metrics.yml CAS-publishes the optional snapshot under the ledger's whitelisted data/
          # plane. This build publishes it at the panel's site-relative path and still owns the one
          # and only Pages deploy; absence keeps the panel hidden until its first snapshot.
          if [[ -f ledger/data/metrics.json ]]; then
            cp ledger/data/metrics.json site/metrics.json
          fi

      - name: Upload GitHub Pages artifact (pinned)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages (pinned)
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # KEEP-ALIVE for the newest scheduled workflows: GitHub's cron registration/delivery for
  # recently-added workflows is unreliable (observed 2026-07-21: metrics missed 3 consecutive
  # 15-min slots; curate/conflict-resolver intermittent). This job piggybacks on dashboard's
  # PROVEN */15 schedule and re-dispatches a listed workflow ONLY when its last run is older
  # than its own cadence + slack (no-op when the native schedule works — self-retiring).
  # No secrets, no environment; actions:write scoped to this job for the dispatch POST only.
  cron-keepalive:
    name: Re-dispatch stale scheduled workflows (cron-delivery fallback)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # dispatch-secrets binding: the cross-repo leg mints from REGISTRY_ADMIN_APP_ID/KEY,
    # which post-#101 live ONLY in this environment (guard-enforced repo-wide).
    environment: dispatch-secrets
    permissions:
      actions: write
    steps:
      - name: Dispatch any listed workflow whose last run is stale
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          now=$(date -u +%s)
          # workflow-file:stale-threshold-seconds (cadence + slack)
          for spec in metrics.yml:1200 conflict-resolver.yml:1500 curate.yml:2400 dispatch.yml:1200 groom.yml:1800 retriage.yml:3600; do
            wf="${spec%%:*}"; limit="${spec##*:}"
            last=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${wf}/runs?per_page=1" \
                   --jq '.workflow_runs[0].created_at // empty' || true)
            prev=0
            [ -n "$last" ] && prev=$(date -u -d "$last" +%s)
            age=$(( now - prev ))
            if [ "$age" -gt "$limit" ]; then
              echo "keepalive: ${wf} last ran ${age}s ago (limit ${limit}s) — dispatching"
              gh api -X POST \
                "repos/${GITHUB_REPOSITORY}/actions/workflows/${wf}/dispatches" -f ref=master
            else
              echo "keepalive: ${wf} fresh (${age}s <= ${limit}s)"
            fi
          done

      # Cross-repo leg: sparq's re-arm sweeper is the merge-queue closure backstop and
      # runs on a 10-minute cron in sparq-org/sparq — cover its cron-delivery gaps too
      # (same observed unreliability for recently-added workflows). Fail-soft: if the
      # App is not configured the mint errors, the guarded step is skipped, and the
      # native schedule remains the only driver.
      - name: Mint sparq-org keepalive App token (pinned)
        id: sparq-keepalive-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: sparq
          permission-actions: write

      - name: Dispatch stale sparq scheduled workflows (cross-repo keepalive)
        if: steps.sparq-keepalive-token.outputs.token != ''
        env:
          GH_TOKEN: ${{ steps.sparq-keepalive-token.outputs.token }}
        run: |
          set -euo pipefail
          now=$(date -u +%s)
          # workflow-file:stale-threshold-seconds (cadence + slack)
          for spec in rearm-sweeper.yml:1200; do
            wf="${spec%%:*}"; limit="${spec##*:}"
            last=$(gh api "repos/sparq-org/sparq/actions/workflows/${wf}/runs?per_page=1" \
                   --jq '.workflow_runs[0].created_at // empty' || true)
            prev=0
            [ -n "$last" ] && prev=$(date -u -d "$last" +%s)
            age=$(( now - prev ))
            if [ "$age" -gt "$limit" ]; then
              echo "keepalive: sparq-org/sparq ${wf} last ran ${age}s ago (limit ${limit}s) — dispatching"
              gh api -X POST \
                "repos/sparq-org/sparq/actions/workflows/${wf}/dispatches" -f ref=main
            else
              echo "keepalive: sparq-org/sparq ${wf} fresh (${age}s <= ${limit}s)"
            fi
          done
