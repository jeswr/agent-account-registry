name: account-fleet dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions: {}

concurrency:
  group: account-fleet-dashboard
  cancel-in-progress: true

jobs:
  build:
    name: Build privacy-safe Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      issues: read
    # [FABLE-5] Round-8 P1: honest usage-probe health. The probe steps stay non-terminal
    # (continue-on-error — the dashboard still deploys, rendering usage as `unknown`), but
    # their REAL outcomes feed this output so a failed probe raises a non-terminal
    # `usage-probe-degraded` alarm and BLOCKS the recover job — a silent probe failure can no
    # longer publish false availability or clear prior dashboard alerts. Round-9 P1: step
    # outcomes alone are NOT health — account-usage.py deliberately OMITS accounts whose
    # token/probe failed and still exits 0 (a `{}` snapshot "succeeds"), so the gate also
    # requires the probe's SEMANTIC coverage verdict (`coverage_ok`, written by the script to
    # $GITHUB_OUTPUT: true only when EVERY pool-admitted catalog account carries a usage entry).
    # 'true' ONLY when both steps genuinely succeeded AND coverage is complete; anything else
    # (including a crash before the verdict is written — the output then reads empty) is
    # degraded.
    outputs:
      usage_probe_ok: ${{ (steps.acct-secrets.outcome == 'success' && steps.probe.outcome == 'success' && steps.probe.outputs.coverage_ok == 'true') && 'true' || 'false' }}
    steps:
      - name: Checkout registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # The mutable data plane (leases + model-health) lives on the unprotected `ledger` branch
      # (issue #28): the master copies under data/ are frozen tombstones. This checkout fails the
      # job LOUDLY if the ledger branch is missing.
      - name: Checkout the data-plane ledger branch (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: ledger
          ref: ledger
          persist-credentials: false

      # Trust guard (review round 1): the ledger branch is DATA-ONLY by design — a
      # `workflow_dispatch` at `ref: ledger` would execute the LEDGER copy of a workflow file,
      # so its non-execution property holds only while no executable content exists at that ref.
      # Fail LOUD if that ever erodes.
      - name: Ledger checkout is data-only (trust guard)
        run: |
          set -euo pipefail
          test ! -e ledger/.github
          test ! -e ledger/scripts

      # Only this filter sees the complete secret map; the probe receives an ACCT_* file.
      # Non-terminal (continue-on-error) but its real outcome feeds `usage_probe_ok` above.
      - name: Materialize the ACCT_* worker-token subset for the probe
        id: acct-secrets
        continue-on-error: true
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/acct-secrets.json" <<'PY'
          import json
          import os
          import re
          import sys

          path = sys.argv[1]
          allow = re.compile(r"ACCT[A-Z0-9]+_TOKEN")
          data = json.loads(os.environ["ALL_SECRETS"])
          subset = {key: value for key, value in data.items()
                    if isinstance(value, str) and allow.fullmatch(key)}
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(subset, handle)
          os.chmod(path, 0o600)
          PY

      # [FABLE-5] Round-8 P1: the probe no longer swallows its own failure into an empty-but-
      # "successful" `{}` snapshot (which the generator then published as every account
      # AVAILABLE). A failed self-test or probe now fails THIS step — non-terminal via
      # continue-on-error (the dashboard still deploys, rendering usage as `unknown`), but the
      # real outcome feeds `usage_probe_ok`, which alarms and blocks recovery. Round-9 P1: the
      # script ALSO writes its semantic coverage verdict (`coverage_ok=true` only when every
      # pool-admitted account carries a usage entry — a fail-closed per-account omit exits 0)
      # straight to $GITHUB_OUTPUT, and `usage_probe_ok` requires it; the verdict is a boolean,
      # never a count (locked decision 22b). USAGE_COVERAGE_OUTPUT is scoped to the snapshot
      # invocation only so the self-test can never write a stray output line. stderr is still
      # discarded on the probe call (credential-safety posture: never stream probe stderr).
      - name: Probe live account usage (tokens never printed)
        id: probe
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          SECRETS_FILE: ${{ runner.temp }}/acct-secrets.json
        run: |
          set -euo pipefail
          python3 scripts/account-usage.py --self-test
          USAGE_COVERAGE_OUTPUT="$GITHUB_OUTPUT" python3 scripts/account-usage.py > "$RUNNER_TEMP/usage.json" 2>/dev/null
          echo 'usage-probe: snapshot written'

      - name: Generate privacy-safe dashboard
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          REGISTRY_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Loud data-plane guard (issue #28): the ledger files must come from the ledger-branch
          # checkout — a dashboard silently rendered from the frozen master copies would misreport
          # every live lease.
          test -f ledger/data/leases.json
          test -f ledger/data/model-health.json
          # A FAILED probe may leave usage.json absent or truncated mid-write; discard it so the
          # generator renders usage as `unknown` (probe health is alarmed separately via
          # usage_probe_ok) instead of crashing the build on a partial file. Only on probe
          # failure: a SUCCESSFUL probe that wrote garbage must crash the build loudly below
          # (_read_json raises), never be silently discarded as "unknown".
          if [ "${{ steps.probe.outcome }}" != "success" ]; then
            rm -f "$RUNNER_TEMP/usage.json"
          fi
          python3 scripts/dashboard-gen.py --self-test
          python3 scripts/dashboard-gen.py --usage "$RUNNER_TEMP/usage.json" \
            --leases ledger/data/leases.json --model-health ledger/data/model-health.json

      - name: Upload GitHub Pages artifact (pinned)
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy GitHub Pages (pinned)
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # [FABLE-5] Loud-fail alarm — the dashboard is the maintainer's PRIMARY visibility surface and
  # runs UNATTENDED every 15m (build → deploy). It had no alarm: a silent build/deploy crash lets
  # the dashboard go stale silently (directly counter to this PR's visibility goal). This job-level
  # alarm records a build OR deploy failure/cancel to the same rolling pipeline-failure issue.
  alarm:
    needs: [build, deploy]
    # Fires on any hard build/deploy failure — AND (round-8 P1) on a GREEN tick whose usage
    # probe silently failed: the dashboard then deploys with usage rendered `unknown`, which is
    # honest on the page but must ALSO reach the rolling alert (mirrors dispatch's non-terminal
    # `repo-degraded` pattern). `!= 'true'` is fail-closed against a missing output.
    if: >-
      ${{ always() && (
        needs.build.result == 'failure' || needs.build.result == 'cancelled' ||
        needs.deploy.result == 'failure' || needs.deploy.result == 'cancelled' ||
        needs.deploy.result == 'skipped' ||
        (needs.build.result == 'success' && needs.build.outputs.usage_probe_ok != 'true')
      ) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Alarm on a build/deploy failure (terminal)
        if: >-
          ${{ needs.build.result == 'failure' || needs.build.result == 'cancelled' ||
              needs.deploy.result == 'failure' || needs.deploy.result == 'cancelled' ||
              needs.deploy.result == 'skipped' }}
        uses: ./.github/actions/pipeline-alarm
        with:
          # Deploy is `needs: build`, so a build crash SKIPS deploy — surface whichever failed.
          job-name: ${{ (needs.build.result == 'failure' || needs.build.result == 'cancelled') && 'build' || 'deploy' }}
          job-result: ${{ (needs.build.result == 'failure' || needs.build.result == 'cancelled') && needs.build.result || needs.deploy.result }}
          cancelled: ${{ needs.build.result == 'cancelled' || needs.deploy.result == 'cancelled' }}
          detail: >-
            dashboard tick: build=${{ needs.build.result }} deploy=${{ needs.deploy.result }} —
            the maintainer's primary visibility surface failed to rebuild/redeploy and is going stale
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}
      # [FABLE-5] Round-8 P1: the degraded-usage-probe out-of-band alarm. NON-TERMINAL — the
      # tick stays green and the dashboard still deploys — but LOUD: the rolling alert carries a
      # `usage-probe-degraded` row, and `recover` (gated on usage_probe_ok == 'true') will not
      # clear dashboard rows until a tick probes cleanly. Round-9 P1: `usage_probe_ok` now also
      # embeds the probe's SEMANTIC coverage verdict, so a green probe step whose snapshot
      # silently omitted failed accounts (even a bare `{}`) fires this alarm too. Both steps can
      # fire in one run (probe degraded + deploy failed): two distinct rows, both accurate.
      - name: Alarm on a degraded usage probe (dashboard deployed with unknown usage, non-terminal)
        if: >-
          ${{ needs.build.result == 'success' &&
              needs.build.outputs.usage_probe_ok != 'true' }}
        uses: ./.github/actions/pipeline-alarm
        with:
          job-name: build
          job-result: failure
          failure-class: usage-probe-degraded
          detail: >-
            dashboard usage probe DEGRADED — the secret materialization or live usage probe
            failed, or the probe observed usage for only part of the account catalog (semantic
            coverage incomplete), so the dashboard deployed rendering the unobserved accounts'
            usage/availability as unknown (no false availability is published); heals
            automatically once a dashboard tick probes cleanly with full coverage
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}

  # [FABLE-5] Auto-close-on-heal (review P2: recovery was wired only for dispatch): on a healthy
  # dashboard tick, prune dashboard's rows from the rolling pipeline alert (--resolve) so a
  # recovered dashboard never pins the alert open forever. Never reddens (fail-soft resolve path);
  # with no open alert it is a single cheap `gh issue list`.
  recover:
    needs: [build, deploy]
    # `usage_probe_ok == 'true'` (round-8 P1): a green tick whose usage probe failed proved
    # NOTHING about probe health — running --resolve on it would clear prior dashboard alerts
    # (including the freshly-raised `usage-probe-degraded` row's predecessors) on the strength
    # of a run that observed no usage data at all. Round-9 P1: the gate is SEMANTIC, not just
    # step-outcome — usage_probe_ok also requires the probe's coverage_ok verdict, so a
    # "successful" probe whose snapshot omitted failed accounts (a `{}` result is not health)
    # blocks recovery too. The exact-'true' comparison is itself fail-closed: a missing/empty
    # output skips recovery.
    if: >-
      ${{ always() && needs.build.result == 'success' && needs.deploy.result == 'success' &&
          needs.build.outputs.usage_probe_ok == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      # actions:read — --resolve prunes only rows OLDER than this run's START
      # (run_started_at via the runs API; round-5 P1 — the recover job's own execution
      # time let an overlapping run's concurrent failure be pruned as recovered).
      # Without it the script SKIPS recovery (fail closed).
      actions: read
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/pipeline-alarm
        with:
          mode: resolve
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}
