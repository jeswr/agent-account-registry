# [FABLE-5] Identify the acct02 Anthropic account behind its stored setup-token — WITHOUT PII.
# PII POLICY (README lines 4-7 + locked decision 22/22a — sol review round 5 of #275, finding 2):
# this repo and its Actions logs are PUBLIC, so raw account handles/EMAILS never appear in any
# output. Identity is conveyed ONLY as the registry's salted-hash convention
# sha256(email + ':' + PROVENANCE_SALT)[:16] (identical to worker-pr.py account_hash /
# model-health.py / backfill-provenance.py) — the maintainer recomputes it over the private
# email map to match. The token is a masked secret, never echoed; only non-PII provider/format
# fields are printed raw.
name: account-whoami
on:
  workflow_dispatch: {}
permissions: {}
jobs:
  whoami:
    runs-on: ubuntu-latest
    # SECRET-EXFIL GUARD (issue #101): reads ACCT02_TOKEN + PROVENANCE_SALT, which live in the
    # `dispatch-secrets` environment (deployment-branch policy: default branch only) — full
    # rationale on the `claim` job in dispatch.yml. A dispatch from any non-default ref is
    # refused server-side.
    environment: dispatch-secrets
    steps:
      # Step NAME kept GENERIC (sol round 20 of #275): step names render in the public Actions
      # run UI, so no raw account handle appears here — the secret reference below is the only
      # place the slot name necessarily occurs, and secret NAMES are repo metadata, not output.
      - name: Probe the configured account (salted-hash identity only — no raw handle or email)
        env:
          TOK: ${{ secrets.ACCT02_TOKEN }}
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          echo "token_present=$([ -n "$TOK" ] && echo yes || echo no)"
          # Non-PII FORMAT field: classify the token by its PUBLIC prefix class (never print
          # the token itself — prefix classes are public Anthropic documentation, not secret).
          case "$TOK" in
            sk-ant-oat*) echo "token_format=oauth-setup-token" ;;
            sk-ant-api*) echo "token_format=api-key" ;;
            "")          echo "token_format=<absent>" ;;
            *)           echo "token_format=other" ;;
          esac
          echo "provider=anthropic"
          code=$(curl -s -o /tmp/p.json -w '%{http_code}' --max-time 20 -H "Authorization: Bearer $TOK" -H "anthropic-version: 2023-06-01" https://api.anthropic.com/api/oauth/profile || echo curlfail)
          echo "http_status=$code"
          # PII policy (README line 4 + locked decision 22a): the raw email NEVER reaches the
          # log — only sha256(email:PROVENANCE_SALT)[:16], the exact account_hash convention
          # (scripts/worker-pr.py), matchable against the maintainer's private email map hashed
          # the same way. No salt => print NOTHING email-derived (fail closed, never raw).
          email=$(jq -r '.email // empty' /tmp/p.json 2>/dev/null || true)
          if [ -z "$email" ]; then
            echo "email_hash=<no-email-key>"
          elif [ -z "$PROVENANCE_SALT" ]; then
            echo "email_hash=<no-salt-refusing-to-derive>"
          else
            echo "email_hash=$(printf '%s:%s' "$email" "$PROVENANCE_SALT" | sha256sum | cut -c1-16)"
          fi
          # Response FORMAT (key names only — field names carry no PII, values are never dumped).
          echo "response_keys=$(jq -r 'try (keys | join(",")) catch "<non-object>"' /tmp/p.json 2>/dev/null || echo -)"
          # usage fingerprint (per-account rate-limit window): identifies the account even when
          # /api/oauth/profile is 403 for a setup-token — same account => same 5h/7d reset
          # timestamps, which is exactly why the RAW values are account-identifying and (sol
          # round 20 of #275) never reach this PUBLIC log. Each value is logged only as the
          # registry's salted-hash convention sha256(value:PROVENANCE_SALT)[:16] (same as
          # email_hash above): the maintainer probes their candidate account privately and
          # hashes the same way to match. No salt => a header COUNT only (fail closed, never
          # raw). `status` is a generic non-identifying enum (allowed/rejected) and stays raw.
          curl -s -D /tmp/rl.txt -o /dev/null --max-time 20 -X POST https://api.anthropic.com/v1/messages \
            -H "Authorization: Bearer $TOK" -H "anthropic-version: 2023-06-01" -H "content-type: application/json" \
            -H "anthropic-beta: oauth-2025-04-20" \
            -d '{"model":"claude-haiku-4-5","max_tokens":1,"messages":[{"role":"user","content":"hi"}]}' || true
          rl() { grep -i "^anthropic-ratelimit-unified-$1:" /tmp/rl.txt | sed -E 's/^[^:]*:[[:space:]]*//' | tr -d '\r'; }
          rlh() {
            v=$(rl "$1")
            if [ -z "$v" ]; then echo "<absent>"; else printf '%s:%s' "$v" "$PROVENANCE_SALT" | sha256sum | cut -c1-16; fi
          }
          if [ -z "$PROVENANCE_SALT" ]; then
            echo "usage_fingerprint=<no-salt-refusing-to-derive> ratelimit_headers_present=$(grep -ci '^anthropic-ratelimit-unified-' /tmp/rl.txt || true)"
          else
            echo "usage_5h_reset_hash=$(rlh 5h-reset) usage_7d_reset_hash=$(rlh 7d-reset) usage_5h_util_hash=$(rlh 5h-utilization) usage_7d_util_hash=$(rlh 7d-utilization) status=$(rl status)"
          fi
