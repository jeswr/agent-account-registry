# ONE-SHOT OUTAGE REPAIR for issue #101 — migrate the 14 repo-scope Actions secrets into the
# `dispatch-secrets` environment so the merged secrets-guard (scripts/dispatch-secrets-guard.py,
# activated by PR #264) stops failing every dispatch tick closed.
#
# DELETE THIS FILE in a follow-up PR immediately after ONE successful `phase: migrate` run (and
# with it delete scripts/migrate-secrets.sh, unenrolling it from pr-gate.yml and worker-live.sh's
# FULL_SELFTEST_SUITE — pr-gate hard-fails on an enrolled-but-missing script). The `migrate` job
# deliberately reads ALL migrated secrets from an environment-UNBOUND job — the exact shape the
# guard exists to forbid — because it MUST see the repo-scope copies in order to move them. (The
# guard only gates dispatch.yml's jobs, so this workflow does not trip it, but it is still an
# exposure surface and must not outlive its use.) For the same reason the `migrate` job must NOT
# carry `environment: dispatch-secrets`: bound, it would read back the environment copies and the
# repo-scope originals could never be verified or drained.
#
# TWO-RUN PROTOCOL (sol review round 8 of #275, finding 1 — the QUEUE-TIME secrets snapshot):
# GitHub captures a run's `secrets.*` values when the run is QUEUED (documented behavior), so
# NOTHING a run does after starting — the previous rounds' IN-RUN quiesce included — can make its
# S_* inputs fresher than a writer rotation that landed before the run was queued. Freshness
# therefore needs TWO runs, selected by the `phase` workflow_dispatch input:
#
#   phase: quiesce — a single SECRET-FREE job (no S_* mapping anywhere in the job; its mint is
#       Actions:write ONLY, so the token cannot read or move any secret): disables the 4 writer
#       workflows, then runs the COHERENT drain check (one unfiltered run-listing snapshot per
#       writer, nonterminal statuses filtered client-side — see finding 2 in
#       scripts/migrate-secrets.sh). Succeeds only when the writers are disabled AND drained.
#   phase: migrate (default) — the migrate + cleanup-bootstrap jobs, each gated by a first
#       fail-closed step (in scripts/migrate-secrets.sh, BEFORE any listing of consequence or
#       any mutation) asserting every writer workflow's API state is `disabled_manually` AND
#       that the same coherent drain check still holds. If not: "run phase: quiesce first and
#       wait for success".
#   phase: cleanup-bootstrap — the ENVIRONMENT-BOUND bootstrap-drain job STANDALONE (round 13:
#       recovery for a cancellation that hit MID-cleanup, after the APP_ID delete but before
#       the APP_KEY delete — see the cleanup-standalone job's comment). Its env-bound mint
#       works whatever bootstrap secrets remain at repo scope (2/1/0); all cleanup gates
#       (attempt-1, actor pins, C0 live quiesced+drained checks, exact-set check) apply
#       unchanged. Round 15: cleanup does NOT apply the M0c queue-time ordering attestation
#       (it consumes no queue-time secrets snapshot; a refused or actor-skipped `phase:
#       resume` event in the run history would otherwise deny this recovery forever — see
#       phase_cleanup's C0 comment in scripts/migrate-secrets.sh).
#   phase: resume — the re-enable job standalone (AFTER a successful cleanup — round 14: its
#       R0 precondition FAIL-CLOSES while ANY of the 14 remain at repo scope, so a failed or
#       partial migrate can never be "abandoned" into a dual-scope state; recovery from a
#       partial migrate is re-dispatching migrate, then cleanup — never resume. A successful
#       migrate self-resumes, see below).
#
# WHY the in-run gate is sufficient (finding-1 reasoning, for the record): the operator
# dispatches `phase: migrate` only AFTER observing the quiesce run succeed, so the migrate run's
# QUEUE-time secrets snapshot postdates the drain. The quiesce run proved a moment at which the
# writers were disabled AND zero writer runs were nonterminal; a disabled workflow admits no new
# run, so from that moment no writer run can execute at all — unless someone with actions:write
# re-enables the workflows. The migrate-phase gate re-verifies IN-RUN that the writers are STILL
# `disabled_manually` and STILL drained: together with the quiesce run's success that excludes
# any writer execution between the drain and the gate, which brackets the queue instant — hence
# the snapshot's S_* values are the newest values the writers ever wrote. (Residual, accepted:
# an out-of-band actions-admin re-enable -> writer run -> re-disable inside the window would
# evade the state check; that is the operator's own credential class, outside this threat
# model.)
#
# ROUND 9 (sol, finding 1 — QUEUE-TIME ORDERING is now ENFORCED, not assumed): the round-8
# argument leaned on the OPERATOR dispatching migrate only after observing quiesce succeed. A
# migrate dispatched while the quiesce run is still EXECUTING sits PENDING in the shared
# concurrency group below with its `secrets.*` snapshot already fixed at QUEUE time — i.e. from
# BEFORE the drain finished; when it finally starts, M0a/M0b pass (writers disabled + drained by
# then) while a writer admitted pre-drain may have rotated a secret V1 -> V2 AFTER the snapshot:
# M3 would copy stale V1 into the environment and M5 would delete fresh V2. The MIGRATE
# gate therefore carries an ORDERING ATTESTATION (M0c in scripts/migrate-secrets.sh; round 15:
# the CLEANUP phase deliberately does not — it consumes no queue-time snapshot): it fetches
# this run's own created_at (GET /repos/{r}/actions/runs/$GITHUB_RUN_ID — the runner's default
# env var), finds the NEWEST successful `phase: quiesce` run in this workflow's run listing
# (machine-readable via the `run-name` below — the run-listing API does not expose
# workflow_dispatch inputs), and requires that quiesce run's updated_at (completion) STRICTLY
# BEFORE this run's created_at. Else fail closed: quiesce must COMPLETE before migrate is QUEUED
# (queue-time secrets snapshot) — re-dispatch migrate.
#
# ROUND 9 (sol, finding 2 — RE-RUN ACTOR BYPASS): `github.actor` stays the ORIGINAL initiator
# when a run is RE-RUN, while `github.triggering_actor` is the re-runner — so an actor-only gate
# lets any write-access user re-run a jeswr-initiated run under the secret-admin mint. Every
# phase job's `if:` therefore requires BOTH `github.actor == 'jeswr'` AND
# `github.triggering_actor == 'jeswr'`; the pair is PINNED by the actor contract in
# scripts/migrate-secrets.sh --self-test (dropping the triggering_actor clause goes red).
#
# ROUND 11 (sol — M0c is NOT ATTEMPT-AWARE, so RE-RUNS ARE PROHIBITED): GITHUB_RUN_ID stays
# CONSTANT across re-run attempts while GITHUB_RUN_ATTEMPT increments, so a RE-RUN of an old
# migrate run would fetch the ORIGINAL attempt's created_at and total-order the quiesce/resume
# history against THAT instant — every resume/Q2 event that landed after the original queue is
# excluded by M0c's strictly-precedes filter — while the re-run attempt's own secrets-snapshot
# timing diverges from that timestamp: the attestation would hold for attempt 1, not for the
# attempt actually running. The kill is total: EVERY phase (all four, in
# scripts/migrate-secrets.sh) asserts GITHUB_RUN_ATTEMPT == 1 as its FIRST check — before any
# API call — and fails closed otherwise ("re-runs are prohibited for this workflow (queue-time
# attestation is attempt-unaware) — dispatch a FRESH run of this phase"); an UNSET value fails
# closed too (absent is never assumed to mean attempt 1). GITHUB_RUN_ATTEMPT is the runner's
# default env var, exactly like the GITHUB_RUN_ID that M0c consumes — GITHUB_* names are
# reserved, so it is not (and cannot be) re-mapped below. Recovery is always a FRESH
# workflow_dispatch of the same phase: cheap, and the two-run protocol + total-order
# attestation then apply cleanly at the fresh queue time.
#
# RUNBOOK:
#   1. dispatch this workflow with phase: quiesce; WAIT for the run to SUCCEED.
#   2. dispatch with phase: migrate (the default) — the FRESH queue takes a FRESH secrets
#      snapshot that postdates the drain. (Machine-enforced by M0c: a migrate queued before the
#      quiesce COMPLETED fails closed with zero mutations — re-dispatch it.)
#   3. a successful migrate SELF-RESUMES the writers (the reenable-writers job below); a FAILED
#      migrate leaves them disabled DELIBERATELY (a rerun stays raceless, and rotation cannot
#      write into a partly-drained repo scope) — re-dispatch phase: migrate to converge (then
#      cleanup). Do NOT dispatch phase: resume from a failed/partial migrate — it FAIL-CLOSES
#      (round 14) while any of the 14 remain at repo scope: a migrate that died between its
#      env copy and its repo delete leaves a dual-scope state, and a resumed post-cutover
#      writer would rotate the ENVIRONMENT copy while the stale repo copy survives — the next
#      migrate's repo-presence-is-authoritative rule would then overwrite the newer env value
#      with the stale repo one and delete the repo copy (newest-credential loss, all gates
#      green). phase: resume is for AFTER a successful cleanup (repo scope empty), only.
#   4. FAILED RUNS ARE NEVER RE-RUN (round 11): `gh run rerun` and the UI Re-run buttons fail
#      closed at every phase's attempt gate, because a re-run keeps the ORIGINAL attempt's run
#      id/created_at and M0c would attest against the wrong queue instant. ALWAYS dispatch a
#      FRESH run of whichever phase you need instead.
#   5. MID-CLEANUP CANCELLATION (round 13): a cancellation between the cleanup job's two
#      bootstrap deletes (APP_ID gone, APP_KEY still at repo scope) is recovered by dispatching
#      `phase: cleanup-bootstrap` FRESH — the standalone env-bound job mints from the
#      ENVIRONMENT copies, so the repo-scope bootstrap state is irrelevant; it converges
#      (deletes whatever remains, asserts empty). Do NOT dispatch phase: migrate from this
#      state: the env-UNBOUND main job cannot mint once APP_ID has left repo scope. After the
#      standalone cleanup succeeds, dispatch phase: resume to re-enable the writers.
#
# TWO-PHASE DELETION (sol review round 3 of #275 — bootstrap credential loss): the App token the
# secret-bearing jobs mint comes from REGISTRY_ADMIN_APP_ID / REGISTRY_ADMIN_APP_KEY, which are
# themselves two of the 14 migrated secrets. A single-phase design that deletes all 14 from repo
# scope could be cancelled after deleting the APP_ID but before the APP_KEY — leaving a
# repo-scope stray (guard stays red) that no rerun could heal, because the environment-UNBOUND
# job cannot read the env copies to mint again: BRICKED. So deletion is split:
#   phase `main`  (job `migrate`, env-UNBOUND): copies all 14 into the environment, verifies, then
#       deletes ONLY the 12 NON-bootstrap repo-scope secrets. The 2 bootstrap secrets are NEVER
#       deleted in this phase — they stay at repo scope so any rerun of this job can still mint.
#   phase `cleanup-bootstrap` (job below, `environment: dispatch-secrets`-BOUND): mints its App
#       token FROM THE ENVIRONMENT COPIES (env-bound jobs resolve `secrets.*` from the environment
#       first; the copies were written and listing-verified by the main phase) and deletes the 2
#       repo-scope bootstrap secrets.
# ORDERING: the dispatch secrets-guard goes green ONLY after `cleanup-bootstrap` completes — after
# the main phase the 2 bootstrap secrets intentionally remain at repo scope, so the guard stays
# red until the cleanup job has drained them. Rerun semantics (always via FRESH dispatch —
# round 11 bans re-runs): a main-phase rerun converges as before (per-name state machine over
# the 14 copies + the 12-name deletion loop); a cleanup-phase rerun converges (deletes whichever
# of the 2 remain; zero-remaining = success no-op); a cancellation BETWEEN the jobs
# re-dispatches phase: migrate from a converged state (the bootstrap repo copies still exist,
# so the main job can still mint); a cancellation MID-cleanup (APP_ID deleted, APP_KEY not —
# migrate can no longer mint) re-dispatches phase: cleanup-bootstrap, the STANDALONE env-bound
# cleanup job (round 13). Once cleanup has succeeded ONCE the repair is done and this file is
# deleted — a from-scratch rerun after that point fails at the main job's mint (the bootstrap
# secrets no longer exist at repo scope), which is expected and harmless: there is nothing left
# to migrate.
#
# The migration logic lives in scripts/migrate-secrets.sh (`--phase
# quiesce|main|cleanup-bootstrap|resume-writers`) — an IDEMPOTENT per-name state machine,
# self-tested against a permission-modelling fake gh.
#
# POST-CLEANUP, a repo-scope stray (e.g. an old-snapshot run re-run after re-enable) trips the
# dispatch secrets-guard loudly; the remediation is direct admin deletion
# (`gh secret delete <NAME> -R jeswr/agent-account-registry`) — NOT a migration rerun: after
# cleanup the bootstrap repo copies are gone BY DESIGN, so a fresh migration run cannot mint,
# and there is nothing left to migrate anyway.
#
# APP-INSTALLATION GRANTS REQUIRED (a mint fails loudly PRE-mutation if the sparq-orchestrator
# installation lacks any of them — remediation: grant on the App installation, then re-run):
#   - Repository permissions -> Secrets:      Read and write  (repo-scope secret list + DELETE;
#       the resume phase's R0 precondition listing sits under Secrets READ — round 14)
#   - Repository permissions -> Environments: Read and write  (env-secret list/public-key/PUT)
#   - Repository permissions -> Actions:      Read and write  (the quiesce phase runs
#       `gh workflow disable`, resume runs `enable` — both under the "Actions" WRITE
#       permission; the migrate/cleanup gate's workflow-state reads + run listings sit under
#       Actions read)
#
# The FIVE mint steps' `permission-*` declarations below are PINNED by the workflow-mint-contract
# assertion in scripts/migrate-secrets.sh --self-test (sol review round 4 of #275, finding 3):
# removing, weakening, or widening any of them turns pr-gate/worker-live's self-test red. Change
# the declarations and the contract's expected sets TOGETHER, deliberately. Per-phase least
# privilege (round 8): quiesce = actions RW ONLY; migrate = secrets RW + environments RW +
# actions R (it no longer disables anything — it only READS workflow state + run listings for
# the gate); cleanup-bootstrap AND cleanup-standalone (round 13, same phase two dispatch paths)
# = secrets RW + environments R + actions R; reenable-writers = actions RW + secrets R
# (round 14: the R0 resume precondition LISTS the repo scope to prove none of the 14 remain —
# the token can re-enable workflows and READ secret names, but cannot write or delete any
# secret and holds no environments power). The round-13 REACHABILITY contract
# additionally pins the phase input choices, the standalone job's needs-freedom + phase
# routing + environment binding, and both cleanup jobs' script invocations.
#
# Secret values only ever flow env-var -> stdin -> gh in-process; never echoed, never argv,
# never toJSON(secrets).
name: migrate-secrets-to-env
# MACHINE-READABLE PHASE (round-9 finding 1): the M0c ordering attestation in
# scripts/migrate-secrets.sh selects quiesce runs out of `gh run list` by displayTitle — the
# run-listing API does not expose workflow_dispatch inputs, so the phase is encoded here. The
# attestation matches the literal 'migrate-secrets [quiesce]'; change the two together.
run-name: "migrate-secrets [${{ inputs.phase }}]"

on:
  workflow_dispatch:
    inputs:
      phase:
        description: >-
          quiesce = secret-free writer disable + drain (run FIRST, wait for success);
          migrate = the actual migration (default; fails closed without a prior quiesce);
          cleanup-bootstrap = the env-bound bootstrap drain STANDALONE (round 13: the
          mid-cleanup-cancellation recovery — works regardless of repo-scope bootstrap state);
          resume = re-enable the writers standalone (only AFTER a successful cleanup —
          round 14: fail-closes while any of the 14 remain at repo scope; recover a
          failed migrate by re-dispatching migrate, then cleanup, never resume)
        type: choice
        default: migrate
        options:
          - quiesce
          - migrate
          - cleanup-bootstrap
          - resume

# contents:read ONLY (checkout of scripts/migrate-secrets.sh on this private repo); every
# mutation flows through the minted App installation tokens below.
permissions:
  contents: read

concurrency:
  group: migrate-secrets
  cancel-in-progress: false

jobs:
  quiesce:
    name: "Phase quiesce: SECRET-FREE writer disable + coherent drain check"
    # Round-8 finding 1: this job carries NO S_* mapping and its mint is Actions:write ONLY —
    # it exists so the OPERATOR can observe "writers disabled + drained" BEFORE dispatching the
    # migrate run, whose queue-time secrets snapshot then postdates the drain.
    # BOTH actor fields (round-9 finding 2): github.actor stays the ORIGINAL initiator on a
    # re-run while github.triggering_actor is the RE-RUNNER — actor-only would let any
    # write-access user re-run this under its mint. Pinned by the self-test's actor contract.
    if: inputs.phase == 'quiesce' && github.ref == 'refs/heads/master' && github.actor == 'jeswr' && github.triggering_actor == 'jeswr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # LEAST PRIVILEGE (pinned by the mint contract): Actions write ONLY — this token can
      # disable workflows and list their runs, but cannot read, write, or delete any secret.
      - name: Mint registry-scoped App token (actions write ONLY — secret-free phase)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-actions: write

      # The script's FIRST act is the round-11 attempt gate: GITHUB_RUN_ATTEMPT (runner default
      # env var) must be exactly 1 — re-runs fail closed; dispatch a fresh run of this phase.
      - name: Disable the writer workflows + coherent drain check (scripts/migrate-secrets.sh --phase quiesce)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: bash scripts/migrate-secrets.sh --phase quiesce

  migrate:
    name: "Phase main: copy 14 into dispatch-secrets, delete the 12 non-bootstrap repo copies"
    # Defense-in-depth only (an attacker's branch copy controls its own file — the real lever is
    # that this file is deleted after use and the secrets stop existing at repo scope): refuse to
    # run off-master or for any actor but the maintainer — BOTH fields (round-9 finding 2):
    # github.actor stays the original initiator on a RE-RUN while github.triggering_actor is the
    # re-runner, so actor-only lets a write-access user re-run a jeswr run under this job's
    # secret-admin mint. Pinned by the self-test's actor contract.
    if: inputs.phase == 'migrate' && github.ref == 'refs/heads/master' && github.actor == 'jeswr' && github.triggering_actor == 'jeswr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Same pinned mint pattern as dispatch.yml's claim job, scoped to this repository. ALL
      # THREE permissions are load-bearing (sol review rounds on #275, verified against the REST
      # docs' fine-grained-permission tables): the repo-scope /actions/secrets list + DELETE sit
      # under "Secrets", the ENVIRONMENT-secret PUT/list/public-key sit under "Environments" (a
      # Secrets-only token 403s on every env-secret call), and the round-8 quiesce GATE's
      # workflow-state reads + run listings sit under "Actions" READ — deliberately NOT write:
      # this phase never disables or enables a workflow (the quiesce phase above owns the
      # disable). If the sparq-orchestrator installation was never GRANTED one of them, the
      # mint fails loudly HERE, before any mutation (remediation: grant the permissions listed
      # in the header on the App installation, then re-run).
      - name: Mint registry-scoped App token (secrets + environments admin, actions read)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: write
          permission-actions: read

      # The script's FIRST act is the round-11 attempt gate (GITHUB_RUN_ATTEMPT — the runner's
      # default env var, consumed like GITHUB_RUN_ID below — must be exactly 1: re-runs are
      # prohibited for this workflow, dispatch a fresh run), then the fail-closed M0a/M0b/M0c
      # gate: every writer workflow must be `disabled_manually` AND drained (round 8), AND the
      # newest successful quiesce run must have COMPLETED strictly before this run's created_at
      # (round 9 — the M0c ordering attestation consumes the runner's default GITHUB_RUN_ID env
      # var to fetch created_at; GITHUB_* names are reserved, so neither is re-mapped here) —
      # else "run phase: quiesce first" / "re-dispatch migrate", BEFORE any secret listing or
      # mutation.
      - name: Run the idempotent main phase (scripts/migrate-secrets.sh --phase main)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
          S_ACCOUNT_EMAIL_MAP: ${{ secrets.ACCOUNT_EMAIL_MAP }}
          S_ACCT01_TOKEN: ${{ secrets.ACCT01_TOKEN }}
          S_ACCT02_TOKEN: ${{ secrets.ACCT02_TOKEN }}
          S_ACCT03_TOKEN: ${{ secrets.ACCT03_TOKEN }}
          S_ACCT04_TOKEN: ${{ secrets.ACCT04_TOKEN }}
          S_ACCT05_TOKEN: ${{ secrets.ACCT05_TOKEN }}
          S_ACCT06_TOKEN: ${{ secrets.ACCT06_TOKEN }}
          S_ACCT07_TOKEN: ${{ secrets.ACCT07_TOKEN }}
          S_ACCT2CSS_TOKEN: ${{ secrets.ACCT2CSS_TOKEN }}
          S_ACCT3CSS_TOKEN: ${{ secrets.ACCT3CSS_TOKEN }}
          S_ACCT4CSS_TOKEN: ${{ secrets.ACCT4CSS_TOKEN }}
          S_PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          S_REGISTRY_ADMIN_APP_ID: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          S_REGISTRY_ADMIN_APP_KEY: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
        run: bash scripts/migrate-secrets.sh --phase main

  cleanup-bootstrap:
    name: "Phase cleanup-bootstrap: env-bound mint, delete the 2 repo-scope bootstrap secrets"
    # `needs` + `success()`: the bootstrap repo copies may only be drained once the main phase
    # has PROVEN (listing-verified) that the environment holds all 14 — including the 2 this
    # job's own mint depends on. A cancellation between the jobs re-dispatches phase: migrate
    # from a converged state.
    needs: migrate
    # BOTH actor fields — see the migrate job's comment (round-9 finding 2).
    if: success() && inputs.phase == 'migrate' && github.ref == 'refs/heads/master' && github.actor == 'jeswr' && github.triggering_actor == 'jeswr'
    # ENV-BOUND on purpose (the mirror image of the main job's unbound-on-purpose): `secrets.*`
    # below resolve from the dispatch-secrets ENVIRONMENT first, so this job mints from the env
    # copies the main phase wrote — the repo-scope bootstrap originals are no longer load-bearing
    # and can be deleted without any brick window. workflow_dispatch on master satisfies the
    # environment's custom branch policy.
    environment: dispatch-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Minimal grants for this phase: Secrets write (repo-scope DELETE), Environments read
      # (the pre-delete assertion that the env really holds the bootstrap copies), Actions read
      # (the same round-8 quiesced-and-drained gate as the main phase — workflow-state reads +
      # drain run listings; round 15: the M0c ordering attestation no longer runs in this
      # phase). Deliberately NOT Actions write: this phase never disables/enables a workflow.
      - name: Mint registry-scoped App token FROM THE ENVIRONMENT COPIES
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: read
          permission-actions: read

      # The script's FIRST act is the round-11 attempt gate: GITHUB_RUN_ATTEMPT (runner default
      # env var) must be exactly 1 — re-runs fail closed; dispatch a fresh run of this phase.
      - name: Drain the 2 repo-scope bootstrap secrets (scripts/migrate-secrets.sh --phase cleanup-bootstrap)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: bash scripts/migrate-secrets.sh --phase cleanup-bootstrap

  cleanup-standalone:
    name: "Phase cleanup-bootstrap (standalone dispatch): env-bound mint, finish the bootstrap drain"
    # ROUND 13 (sol — mid-cleanup cancellation was UNRECOVERABLE through the workflow): the
    # cleanup phase deletes REGISTRY_ADMIN_APP_ID before REGISTRY_ADMIN_APP_KEY, so a
    # cancellation between the two deletes leaves the repo scope KEY-only. From that state a
    # fresh `phase: migrate` cannot mint (its env-UNBOUND job reads the now-missing repo-scope
    # APP_ID), a re-run of the cancelled cleanup is prohibited by the round-11 attempt gate,
    # and no workflow input dispatched the cleanup job standalone (it only ran behind
    # `needs: migrate`). This THIN job is the recovery path: `phase: cleanup-bootstrap`
    # dispatches the SAME script phase under the SAME environment binding + mint grants as the
    # needs-chained job above, but with NO `needs:` — deliberately a second job id rather than
    # an always()-guard on the job above, so the migrate-phase needs-graph stays untouched.
    # It composes with every existing gate: a fresh dispatch is attempt 1 (round-11 gate
    # passes), C0 re-asserts the writers quiesced+drained on LIVE state (round 15: the
    # queue-time total-order attestation is deliberately NOT applied in cleanup — this phase
    # consumes no queue-time secrets snapshot, and a refused or actor-skipped `phase: resume`
    # event in the history must not be able to deny this recovery forever; see phase_cleanup's
    # C0 comment), and the env-bound mint works
    # regardless of repo-scope bootstrap state (2/1/0 remaining — the script converges and
    # asserts empty). It does NOT self-resume the writers: dispatch phase: resume after it
    # succeeds (see RUNBOOK).
    # BOTH actor fields — see the migrate job's comment (round-9 finding 2).
    if: inputs.phase == 'cleanup-bootstrap' && github.ref == 'refs/heads/master' && github.actor == 'jeswr' && github.triggering_actor == 'jeswr'
    # ENV-BOUND for the same reason as the job above: `secrets.*` resolve from the
    # dispatch-secrets environment first, so the mint uses the copies the main phase wrote and
    # listing-verified — the repo-scope bootstrap originals (whole point of this path) may
    # already be partly or fully gone.
    environment: dispatch-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Identical minimal grants to the needs-chained cleanup mint above (pinned by the mint
      # contract): Secrets write + Environments read + Actions read, deliberately NOT
      # Actions write.
      - name: Mint registry-scoped App token FROM THE ENVIRONMENT COPIES
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: read
          permission-actions: read

      # The script's FIRST act is the round-11 attempt gate: GITHUB_RUN_ATTEMPT (runner default
      # env var) must be exactly 1 — a fresh dispatch always is; re-runs fail closed.
      - name: Drain the remaining repo-scope bootstrap secrets (scripts/migrate-secrets.sh --phase cleanup-bootstrap)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: bash scripts/migrate-secrets.sh --phase cleanup-bootstrap

  reenable-writers:
    name: "Self-resume after a COMPLETED migrate (or phase: resume standalone)"
    # Round-8 semantics: the quiesce PHASE disabled the writers; they self-resume ONLY after the
    # whole migrate phase (both jobs) succeeded. A FAILED migrate leaves them disabled
    # DELIBERATELY — re-enabling would let rotation write into a partly-drained repo scope and
    # would invalidate the quiesce a converging rerun still relies on. Recovery: re-dispatch
    # phase: migrate (converges, then self-resumes here), then cleanup; phase: resume is for
    # AFTER cleanup only — its R0 precondition (round 14, in the script) fail-closes while any
    # of the 14 remain at repo scope, so a partial migrate cannot be "abandoned" into a
    # dual-scope state where a resumed writer's env rotation would later be overwritten by the
    # stale repo copy. The self-resume path here needs no extra guard: it fires only on
    # needs.cleanup-bootstrap.result == 'success' (below), i.e. after C4 proved the repo scope
    # empty — R0 then passes trivially on its re-listing.
    # `always()` is required so this job is still EVALUATED when migrate/cleanup are skipped
    # (the phase: resume dispatch) — the phase conditions then decide.
    needs: [migrate, cleanup-bootstrap]
    # BOTH actor fields — see the migrate job's comment (round-9 finding 2).
    if: >-
      always() && github.ref == 'refs/heads/master' &&
      github.actor == 'jeswr' && github.triggering_actor == 'jeswr' &&
      (inputs.phase == 'resume' ||
       (inputs.phase == 'migrate' && needs.cleanup-bootstrap.result == 'success'))
    # ENV-BOUND so the mint resolves in EVERY reachable state: env-bound `secrets.*` prefer the
    # dispatch-secrets ENVIRONMENT copies and fall back to repo scope — before the main phase
    # converges the repo-scope bootstrap originals still exist, and after cleanup drains them
    # the environment copies do. An UNBOUND job here would fail to mint exactly in the
    # cleanup-succeeded case and leave the writers disabled.
    environment: dispatch-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # LEAST PRIVILEGE (pinned by the mint contract): Actions write + Secrets READ — the
      # round-14 R0 resume precondition must LIST the repo-scope secret NAMES to prove none of
      # the 14 remain (writers only resume from a clean cutover state); the token still cannot
      # write or delete any secret, and holds no environments power at all.
      - name: Mint registry-scoped App token (actions write + secrets read)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-actions: write
          permission-secrets: read

      # The script's FIRST act is the round-11 attempt gate: GITHUB_RUN_ATTEMPT (runner default
      # env var) must be exactly 1 — re-runs fail closed; dispatch a fresh run of this phase.
      - name: Re-enable the writer workflows (scripts/migrate-secrets.sh --phase resume-writers)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: bash scripts/migrate-secrets.sh --phase resume-writers
