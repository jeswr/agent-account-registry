# ONE-SHOT OUTAGE REPAIR for issue #101 — migrate the 14 repo-scope Actions secrets into the
# `dispatch-secrets` environment so the merged secrets-guard (scripts/dispatch-secrets-guard.py,
# activated by PR #264) stops failing every dispatch tick closed.
#
# DELETE THIS FILE in a follow-up PR immediately after ONE successful run. It deliberately reads
# ALL migrated secrets from an environment-UNBOUND job — the exact shape the guard exists to
# forbid — because it MUST see the repo-scope copies in order to move them. (The guard only gates
# dispatch.yml's jobs, so this workflow does not trip it, but it is still an exposure surface and
# must not outlive its single use.) For the same reason this job must NOT carry
# `environment: dispatch-secrets`: bound, it would read back the environment copies and the
# repo-scope originals could never be verified or drained.
#
# Ordered fail-safe (no mutation before every input is proven present, no deletion before every
# copy is proven landed):
#   1. assert all 14 secret values are non-empty (a missing secret hard-fails BEFORE any mutation)
#   2. `gh secret set --env dispatch-secrets` for each of the 14 (client-side encryption; upsert)
#   3. list the environment's secrets and assert every one of the 14 names is present
#   4. only then delete the 14 repo-scope copies
#   5. list repo-scope secrets and assert the scope is empty (the live repo scope holds exactly
#      these 14 today — anything left over is surfaced by NAME, values are never printed)
#
# Secret values only ever flow env-var -> gh in-process; never echoed, never toJSON(secrets).
name: migrate-secrets-to-env

on:
  workflow_dispatch:

permissions: {}   # everything below runs through the minted App installation token

concurrency:
  group: migrate-secrets
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate 14 repo-scope secrets into dispatch-secrets (one-shot)
    # Defense-in-depth only (an attacker's branch copy controls its own file — the real lever is
    # that this file is deleted after use and the secrets stop existing at repo scope): refuse to
    # run off-master or for any actor but the maintainer.
    if: github.ref == 'refs/heads/master' && github.actor == 'jeswr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Same pinned mint pattern as dispatch.yml's claim job. Scoped to this repository with
      # ONLY the Secrets permission — if the stored App was never granted `Secrets: write`, the
      # mint fails loudly HERE, before any mutation (remediation: grant it on the App, re-run).
      - name: Mint registry-scoped App token (secrets admin only)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write

      - name: Migrate (assert -> set x14 -> verify env listing -> delete x14 -> verify empty)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          S_ACCOUNT_EMAIL_MAP: ${{ secrets.ACCOUNT_EMAIL_MAP }}
          S_ACCT01_TOKEN: ${{ secrets.ACCT01_TOKEN }}
          S_ACCT02_TOKEN: ${{ secrets.ACCT02_TOKEN }}
          S_ACCT03_TOKEN: ${{ secrets.ACCT03_TOKEN }}
          S_ACCT04_TOKEN: ${{ secrets.ACCT04_TOKEN }}
          S_ACCT05_TOKEN: ${{ secrets.ACCT05_TOKEN }}
          S_ACCT06_TOKEN: ${{ secrets.ACCT06_TOKEN }}
          S_ACCT07_TOKEN: ${{ secrets.ACCT07_TOKEN }}
          S_ACCT2CSS_TOKEN: ${{ secrets.ACCT2CSS_TOKEN }}
          S_ACCT3CSS_TOKEN: ${{ secrets.ACCT3CSS_TOKEN }}
          S_ACCT4CSS_TOKEN: ${{ secrets.ACCT4CSS_TOKEN }}
          S_PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          S_REGISTRY_ADMIN_APP_ID: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          S_REGISTRY_ADMIN_APP_KEY: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
        run: |
          set -euo pipefail
          set +x   # belt-and-braces: never trace commands that carry secret values
          REPO='jeswr/agent-account-registry'
          ENV_NAME='dispatch-secrets'
          NAMES=(
            ACCOUNT_EMAIL_MAP
            ACCT01_TOKEN ACCT02_TOKEN ACCT03_TOKEN ACCT04_TOKEN
            ACCT05_TOKEN ACCT06_TOKEN ACCT07_TOKEN
            ACCT2CSS_TOKEN ACCT3CSS_TOKEN ACCT4CSS_TOKEN
            PROVENANCE_SALT
            REGISTRY_ADMIN_APP_ID REGISTRY_ADMIN_APP_KEY
          )

          echo '== phase 1: assert every source secret is present (no mutation yet) =='
          for name in "${NAMES[@]}"; do
            var="S_${name}"
            if [ -z "${!var:-}" ]; then
              echo "::error::repo-scope secret ${name} is empty or missing — aborting BEFORE any mutation"
              exit 1
            fi
            echo "present: ${name}"
          done

          echo '== phase 2: copy all 14 into the environment (gh encrypts client-side) =='
          for name in "${NAMES[@]}"; do
            var="S_${name}"
            gh secret set "$name" --env "$ENV_NAME" --repo "$REPO" --body "${!var}"
            echo "set: ${name} -> ${ENV_NAME}"
          done

          echo '== phase 3: verify the environment listing holds every one of the 14 names =='
          env_names=$(gh api "repos/${REPO}/environments/${ENV_NAME}/secrets" --paginate --jq '.secrets[].name')
          missing=0
          for name in "${NAMES[@]}"; do
            if ! grep -qx "$name" <<<"$env_names"; then
              echo "::error::${name} did not land in the ${ENV_NAME} environment — repo-scope copies left UNTOUCHED"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo 'all 14 present in the environment'

          echo '== phase 4: delete the repo-scope copies (only now that every copy is proven) =='
          for name in "${NAMES[@]}"; do
            gh secret delete "$name" --repo "$REPO"
            echo "deleted repo-scope: ${name}"
          done

          echo '== phase 5: assert the repo scope is now empty =='
          leftovers=$(gh api "repos/${REPO}/actions/secrets" --paginate --jq '.secrets[].name')
          if [ -n "$leftovers" ]; then
            for name in $leftovers; do
              if printf '%s\n' "${NAMES[@]}" | grep -qx "$name"; then
                echo "::error::migrated secret ${name} STILL present at repo scope"
              else
                echo "::error::unexpected non-migrated repo-scope secret: ${name} (repo scope held exactly the 14 when this workflow was written)"
              fi
            done
            exit 1
          fi
          echo 'MIGRATION COMPLETE: repo scope empty, all 14 live in dispatch-secrets. Now DELETE this workflow.'
