# ONE-SHOT OUTAGE REPAIR for issue #101 — migrate the 14 repo-scope Actions secrets into the
# `dispatch-secrets` environment so the merged secrets-guard (scripts/dispatch-secrets-guard.py,
# activated by PR #264) stops failing every dispatch tick closed.
#
# DELETE THIS FILE in a follow-up PR immediately after ONE successful run of BOTH jobs (and with
# it delete scripts/migrate-secrets.sh, unenrolling it from pr-gate.yml and worker-live.sh's
# FULL_SELFTEST_SUITE — pr-gate hard-fails on an enrolled-but-missing script). The `migrate` job
# deliberately reads ALL migrated secrets from an environment-UNBOUND job — the exact shape the
# guard exists to forbid — because it MUST see the repo-scope copies in order to move them. (The
# guard only gates dispatch.yml's jobs, so this workflow does not trip it, but it is still an
# exposure surface and must not outlive its use.) For the same reason the `migrate` job must NOT
# carry `environment: dispatch-secrets`: bound, it would read back the environment copies and the
# repo-scope originals could never be verified or drained.
#
# TWO-PHASE DELETION (sol review round 3 of #275 — bootstrap credential loss): the App token both
# jobs mint comes from REGISTRY_ADMIN_APP_ID / REGISTRY_ADMIN_APP_KEY, which are themselves two
# of the 14 migrated secrets. A single-phase design that deletes all 14 from repo scope could be
# cancelled after deleting the APP_ID but before the APP_KEY — leaving a repo-scope stray (guard
# stays red) that no rerun could heal, because the environment-UNBOUND job cannot read the env
# copies to mint again: BRICKED. So deletion is split:
#   phase `main`  (job `migrate`, env-UNBOUND): copies all 14 into the environment, verifies, then
#       deletes ONLY the 12 NON-bootstrap repo-scope secrets. The 2 bootstrap secrets are NEVER
#       deleted in this phase — they stay at repo scope so any rerun of this job can still mint.
#   phase `cleanup-bootstrap` (job below, `environment: dispatch-secrets`-BOUND): mints its App
#       token FROM THE ENVIRONMENT COPIES (env-bound jobs resolve `secrets.*` from the environment
#       first; the copies were written and listing-verified by the main phase) and deletes the 2
#       repo-scope bootstrap secrets.
# ORDERING: the dispatch secrets-guard goes green ONLY after `cleanup-bootstrap` completes — after
# the main phase the 2 bootstrap secrets intentionally remain at repo scope, so the guard stays
# red until the cleanup job has drained them. Rerun semantics: a main-phase rerun converges as
# before (per-name state machine over the 14 copies + the 12-name deletion loop); a cleanup-phase
# rerun converges (deletes whichever of the 2 remain; zero-remaining = success no-op); a
# cancellation BETWEEN the jobs reruns the whole workflow from a converged state (the bootstrap
# repo copies still exist, so the main job can still mint). Once cleanup has succeeded ONCE the
# repair is done and this file is deleted — a from-scratch rerun after that point fails at the
# main job's mint (the bootstrap secrets no longer exist at repo scope), which is expected and
# harmless: there is nothing left to migrate.
#
# The migration logic lives in scripts/migrate-secrets.sh (`--phase main|cleanup-bootstrap`) — an
# IDEMPOTENT per-name state machine, self-tested against a permission-modelling fake gh. It FAILS
# CLOSED while any live secret-writer workflow run (worker / review-fix / set-up-account /
# pat-validity) is queued or in_progress. Residual (accepted): a run that STARTED before the
# env-binding PRs merged executes an old workflow snapshot and could still write a repo-scope
# secret afterwards — the secrets-guard catches that loudly and re-running this idempotent
# migration heals it.
#
# APP-INSTALLATION GRANTS REQUIRED (the mint fails loudly PRE-mutation if the sparq-orchestrator
# installation lacks any of them — remediation: grant on the App installation, then re-run):
#   - Repository permissions -> Secrets:      Read and write  (repo-scope secret list + DELETE)
#   - Repository permissions -> Environments: Read and write  (env-secret list/public-key/PUT)
#   - Repository permissions -> Actions:      Read            (sol review round 3 of #275: the
#       script's pre-flight runs `gh run list` to prove no live secret writer, and workflow-run
#       listing sits under the "Actions" permission — a secrets+environments-only token 403s on
#       the very first pre-flight call and the migration fails closed before touching anything)
#
# The two mint steps' `permission-*` declarations below are PINNED by the workflow-mint-contract
# assertion in scripts/migrate-secrets.sh --self-test (sol review round 4 of #275, finding 3):
# removing, weakening, or widening any of them turns pr-gate/worker-live's self-test red. Change
# the declarations and the contract's expected sets TOGETHER, deliberately.
#
# Secret values only ever flow env-var -> stdin -> gh in-process; never echoed, never argv,
# never toJSON(secrets).
name: migrate-secrets-to-env

on:
  workflow_dispatch:

# contents:read ONLY (checkout of scripts/migrate-secrets.sh on this private repo); every
# mutation flows through the minted App installation tokens below.
permissions:
  contents: read

concurrency:
  group: migrate-secrets
  cancel-in-progress: false

jobs:
  migrate:
    name: "Phase main: copy 14 into dispatch-secrets, delete the 12 non-bootstrap repo copies"
    # Defense-in-depth only (an attacker's branch copy controls its own file — the real lever is
    # that this file is deleted after use and the secrets stop existing at repo scope): refuse to
    # run off-master or for any actor but the maintainer.
    if: github.ref == 'refs/heads/master' && github.actor == 'jeswr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Same pinned mint pattern as dispatch.yml's claim job, scoped to this repository. ALL
      # THREE permissions are load-bearing (sol review rounds on #275, verified against the REST
      # docs' fine-grained-permission tables): the repo-scope /actions/secrets list + DELETE sit
      # under "Secrets", the ENVIRONMENT-secret PUT/list/public-key sit under "Environments" (a
      # Secrets-only token 403s on every env-secret call), and the pre-flight's `gh run list`
      # sits under "Actions" (read). If the sparq-orchestrator installation was never GRANTED
      # one of them, the mint fails loudly HERE, before any mutation (remediation: grant the
      # permissions listed in the header on the App installation, then re-run).
      - name: Mint registry-scoped App token (secrets + environments admin, actions read)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: write
          permission-actions: read

      - name: Run the idempotent main phase (scripts/migrate-secrets.sh --phase main)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
          S_ACCOUNT_EMAIL_MAP: ${{ secrets.ACCOUNT_EMAIL_MAP }}
          S_ACCT01_TOKEN: ${{ secrets.ACCT01_TOKEN }}
          S_ACCT02_TOKEN: ${{ secrets.ACCT02_TOKEN }}
          S_ACCT03_TOKEN: ${{ secrets.ACCT03_TOKEN }}
          S_ACCT04_TOKEN: ${{ secrets.ACCT04_TOKEN }}
          S_ACCT05_TOKEN: ${{ secrets.ACCT05_TOKEN }}
          S_ACCT06_TOKEN: ${{ secrets.ACCT06_TOKEN }}
          S_ACCT07_TOKEN: ${{ secrets.ACCT07_TOKEN }}
          S_ACCT2CSS_TOKEN: ${{ secrets.ACCT2CSS_TOKEN }}
          S_ACCT3CSS_TOKEN: ${{ secrets.ACCT3CSS_TOKEN }}
          S_ACCT4CSS_TOKEN: ${{ secrets.ACCT4CSS_TOKEN }}
          S_PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          S_REGISTRY_ADMIN_APP_ID: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          S_REGISTRY_ADMIN_APP_KEY: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
        run: bash scripts/migrate-secrets.sh --phase main

  cleanup-bootstrap:
    name: "Phase cleanup-bootstrap: env-bound mint, delete the 2 repo-scope bootstrap secrets"
    # `needs` + `success()`: the bootstrap repo copies may only be drained once the main phase
    # has PROVEN (listing-verified) that the environment holds all 14 — including the 2 this
    # job's own mint depends on. A cancellation between the jobs reruns from a converged state.
    needs: migrate
    if: success() && github.ref == 'refs/heads/master' && github.actor == 'jeswr'
    # ENV-BOUND on purpose (the mirror image of the main job's unbound-on-purpose): `secrets.*`
    # below resolve from the dispatch-secrets ENVIRONMENT first, so this job mints from the env
    # copies the main phase wrote — the repo-scope bootstrap originals are no longer load-bearing
    # and can be deleted without any brick window. workflow_dispatch on master satisfies the
    # environment's custom branch policy.
    environment: dispatch-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Minimal grants for this phase: Secrets write (repo-scope DELETE), Environments read
      # (the pre-delete assertion that the env really holds the bootstrap copies), Actions read
      # (the same live-writer pre-flight as the main phase).
      - name: Mint registry-scoped App token FROM THE ENVIRONMENT COPIES
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: read
          permission-actions: read

      - name: Drain the 2 repo-scope bootstrap secrets (scripts/migrate-secrets.sh --phase cleanup-bootstrap)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: bash scripts/migrate-secrets.sh --phase cleanup-bootstrap
