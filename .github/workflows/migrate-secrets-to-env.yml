# ONE-SHOT OUTAGE REPAIR for issue #101 — migrate the 14 repo-scope Actions secrets into the
# `dispatch-secrets` environment so the merged secrets-guard (scripts/dispatch-secrets-guard.py,
# activated by PR #264) stops failing every dispatch tick closed.
#
# DELETE THIS FILE in a follow-up PR immediately after ONE successful run (and with it delete
# scripts/migrate-secrets.sh, unenrolling it from pr-gate.yml and worker-live.sh's
# FULL_SELFTEST_SUITE — pr-gate hard-fails on an enrolled-but-missing script). This workflow
# deliberately reads ALL migrated secrets from an environment-UNBOUND job — the exact shape the
# guard exists to forbid — because it MUST see the repo-scope copies in order to move them. (The
# guard only gates dispatch.yml's jobs, so this workflow does not trip it, but it is still an
# exposure surface and must not outlive its use.) For the same reason this job must NOT carry
# `environment: dispatch-secrets`: bound, it would read back the environment copies and the
# repo-scope originals could never be verified or drained.
#
# The migration logic lives in scripts/migrate-secrets.sh (sol review of PR #275: the previous
# in-workflow script was not crash-recoverable). It is an IDEMPOTENT per-name state machine — a
# re-run after ANY interruption converges: env-held names are skipped (their repo-scope values
# are legitimately unavailable once deleted — that IS the resume path), missing copies are
# copied via STDIN (never argv) and verified against the environment listing, then the 14
# repo-scope copies are drained and both scopes re-asserted. It also FAILS CLOSED while any live
# secret-writer workflow run (worker / review-fix / set-up-account / pat-validity) is queued or
# in_progress. Residual (accepted): a run that STARTED before the env-binding PRs merged executes
# an old workflow snapshot and could still write a repo-scope secret afterwards — the
# secrets-guard catches that loudly and re-running this idempotent migration heals it.
#
# Secret values only ever flow env-var -> stdin -> gh in-process; never echoed, never argv,
# never toJSON(secrets).
name: migrate-secrets-to-env

on:
  workflow_dispatch:

# contents:read ONLY (checkout of scripts/migrate-secrets.sh on this private repo); every
# mutation flows through the minted App installation token below.
permissions:
  contents: read

concurrency:
  group: migrate-secrets
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate 14 repo-scope secrets into dispatch-secrets (idempotent, re-runnable)
    # Defense-in-depth only (an attacker's branch copy controls its own file — the real lever is
    # that this file is deleted after use and the secrets stop existing at repo scope): refuse to
    # run off-master or for any actor but the maintainer.
    if: github.ref == 'refs/heads/master' && github.actor == 'jeswr'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # Same pinned mint pattern as dispatch.yml's claim job, scoped to this repository. BOTH
      # permissions are load-bearing (sol review round on #275, verified against the REST docs'
      # fine-grained-permission tables): the repo-scope /actions/secrets list + DELETE sit under
      # the "Secrets" permission, but the ENVIRONMENT-secret PUT/list/public-key sit under the
      # "Environments" permission — a Secrets-only token 403s on every env-secret call. If the
      # sparq-orchestrator installation was never GRANTED one of them, the mint fails loudly
      # HERE, before any mutation (remediation: on the App installation grant Repository
      # permissions -> Secrets: Read and write AND Environments: Read and write, then re-run).
      - name: Mint registry-scoped App token (secrets + environments admin only)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: agent-account-registry
          permission-secrets: write
          permission-environments: write

      - name: Run the idempotent migration (scripts/migrate-secrets.sh)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REGISTRY_REPO: ${{ github.repository }}
          S_ACCOUNT_EMAIL_MAP: ${{ secrets.ACCOUNT_EMAIL_MAP }}
          S_ACCT01_TOKEN: ${{ secrets.ACCT01_TOKEN }}
          S_ACCT02_TOKEN: ${{ secrets.ACCT02_TOKEN }}
          S_ACCT03_TOKEN: ${{ secrets.ACCT03_TOKEN }}
          S_ACCT04_TOKEN: ${{ secrets.ACCT04_TOKEN }}
          S_ACCT05_TOKEN: ${{ secrets.ACCT05_TOKEN }}
          S_ACCT06_TOKEN: ${{ secrets.ACCT06_TOKEN }}
          S_ACCT07_TOKEN: ${{ secrets.ACCT07_TOKEN }}
          S_ACCT2CSS_TOKEN: ${{ secrets.ACCT2CSS_TOKEN }}
          S_ACCT3CSS_TOKEN: ${{ secrets.ACCT3CSS_TOKEN }}
          S_ACCT4CSS_TOKEN: ${{ secrets.ACCT4CSS_TOKEN }}
          S_PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          S_REGISTRY_ADMIN_APP_ID: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          S_REGISTRY_ADMIN_APP_KEY: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
        run: bash scripts/migrate-secrets.sh
