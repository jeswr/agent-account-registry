# [OPUS-4.8] verify-app — identify the stored automation App + where it's installed, then
# confirm it can mint a sparq-scoped installation token. Run manually after installing the App.
name: verify-app

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    # SECRET-EXFIL GUARD (issue #101): reads REGISTRY_ADMIN_APP_ID/KEY, which live in the
    # `dispatch-secrets` environment (deployment-branch policy: default branch only) — full
    # rationale on the `claim` job in dispatch.yml.
    environment: dispatch-secrets
    steps:
      - name: Identify the stored App + its installations
        env:
          APP_ID: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          APP_KEY: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
        run: |
          set -euo pipefail
          pip install --quiet pyjwt cryptography
          JWT=$(python3 - <<'PY'
          import jwt, time, os
          now = int(time.time())
          print(jwt.encode({"iat": now-60, "exp": now+540, "iss": os.environ["APP_ID"]},
                           os.environ["APP_KEY"], algorithm="RS256"))
          PY
          )
          echo "== stored App identity (this is the app the registry secrets belong to) =="
          curl -s -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" \
            https://api.github.com/app \
            | python3 -c 'import sys,json;d=json.load(sys.stdin);print("  slug:",d.get("slug")," app_id:",d.get("id")," owner:",(d.get("owner") or {}).get("login"))'
          echo "== where the stored App is currently installed =="
          curl -s -H "Authorization: Bearer $JWT" -H "Accept: application/vnd.github+json" \
            https://api.github.com/app/installations \
            | python3 -c 'import sys,json;xs=json.load(sys.stdin);print("  (none)") if not xs else [print("  on:",i.get("account",{}).get("login")," type:",i.get("target_type")," repos:",i.get("repository_selection")) for i in xs]'

      - name: Try to mint a sparq-scoped token (the real goal)
        id: token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: sparq

      - name: Report
        run: |
          if [ "${{ steps.token.outcome }}" = "success" ]; then
            echo "VERIFY-APP: OK — the stored App minted a sparq-org/sparq token."
          else
            echo "VERIFY-APP: the stored App is NOT installed on sparq-org/sparq (see identity + installations above)."
          fi
