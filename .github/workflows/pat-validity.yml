# [FABLE-5] Weekly REGISTRY_SECRETS_PAT validity probe (issue #37): a rotated/expired PAT used to
# be discovered only when set-up-account or the rotation write-back actually ran `gh secret set` —
# i.e. while a human was waiting on onboarding. This probes ahead of time: GET /user, the Actions
# secrets public-key read, then an AUTHORITATIVE `gh secret set` on the disposable canary secret
# REGISTRY_PAT_PROBE_CANARY (review r3: the public-key read needs only Secrets: read, so it alone
# would bless a read-only PAT that onboarding's write still breaks on; the canary holds no secret
# material and is overwritten weekly). Upserts ONE rolling `from:agent` alert issue on
# invalid/insufficient-scope/near-expiry; network-unknown never alerts and never closes an
# existing alert (no false alarms, no false recoveries). The token is never printed.
name: pat-validity
on:
  schedule:
    # Weekly is enough — fine-grained PAT expiry is calendar-scale. Explicit off-peak minute
    # (not a wildcard or :00) per repo convention: wildcard/top-of-hour schedules are throttled
    # hardest under load.
    - cron: '41 6 * * 1'
  workflow_dispatch: {}

permissions:
  # An explicit permissions block zeroes every grant not listed — checkout of the probe script
  # on this private repo needs contents:read or the job dies before the probe runs.
  contents: read
  issues: write   # rolling alert upsert only

concurrency:
  group: pat-validity
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (pinned)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Self-tests are the gate in this repo: never trust a probe whose own fixtures fail.
      - name: Self-test the probe before trusting its verdict
        run: python3 scripts/pat-validity.py --self-test

      - name: Probe PAT validity + upsert the rolling alert
        env:
          # Materialized single-secret env (the fingerprint-accounts least-exposure posture):
          # ONLY the probed PAT enters this step — never toJSON(secrets).
          REGISTRY_PAT: ${{ secrets.REGISTRY_SECRETS_PAT }}
          # The alert issue is written with the ambient token (issues:write above), NOT the PAT —
          # a broken PAT must still be able to page the maintainer. The canary WRITE probe runs
          # the other way round: the script strips this ambient token from the child `gh` env and
          # authenticates with the probed PAT alone, so ambient credentials can never mask a
          # read-only PAT.
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: python3 scripts/pat-validity.py

  # [FABLE-5] Loud-fail alarm — pat-validity is an UNATTENDED weekly scheduled pipeline whose own
  # rolling alert fires ONLY when the probe RUNS and concludes "invalid". If the `probe` job itself
  # CRASHES (self-test failure, checkout failure, uncaught network exception, cancellation) that
  # in-script alert never runs and an expired PAT would go undetected → fleet-wide token mutations
  # start failing silently. This job-level alarm records a probe-job crash to the same rolling
  # pipeline-failure issue so a crashed probe is never silent.
  alarm:
    needs: probe
    if: ${{ always() && (needs.probe.result == 'failure' || needs.probe.result == 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/pipeline-alarm
        with:
          job-name: probe
          job-result: ${{ needs.probe.result }}
          cancelled: ${{ needs.probe.result == 'cancelled' }}
          detail: >-
            pat-validity probe ${{ needs.probe.result }} — the PAT-expiry probe CRASHED (its own
            invalid-PAT alert only fires on a completed probe); an expired REGISTRY_SECRETS_PAT
            could now go undetected and fleet-wide token mutations may start failing
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}

  # [FABLE-5] Auto-close-on-heal (review P2: recovery was wired only for dispatch): a healthy
  # probe prunes pat-validity's rows from the rolling pipeline alert (--resolve), so a recovered
  # weekly probe never pins the alert open until the NEXT week's run. Never reddens; cheap no-op
  # with no open alert.
  recover:
    needs: probe
    if: ${{ always() && needs.probe.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
      # actions:read — --resolve prunes only rows OLDER than this run's START
      # (run_started_at via the runs API; round-5 P1 — the recover job's own execution
      # time let an overlapping run's concurrent failure be pruned as recovered).
      # Without it the script SKIPS recovery (fail closed).
      actions: read
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/pipeline-alarm
        with:
          mode: resolve
          registry-token: ${{ github.token }}
          alert-repo: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          alert-token: ${{ secrets.ALERT_TOKEN || '' }}
