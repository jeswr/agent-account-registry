# [OPUS-4.8] Registry self-management: issue triage + untrusted-input quarantine for
# jeswr/agent-account-registry. Mirrors the sparq target's .github/workflows/triage-issue.yml
# trust-gate pattern: on a new/edited issue, trust-gate by the AUTHOR's repo permission with an
# EXACT-MATCH trust for jeswr (the maintainer) and for the registry orchestrator App bot login; a
# third-party author is quarantined (trust:untrusted) and its content is NEVER inspected. A trusted
# author's issue is statically triaged (role/priority/status) by scripts/triage.py — no model call.
#
# Minimal by design (do not over-build): reuses the sparq template and the registry's own
# scripts/triage.py. actionlint-clean; least privilege (issues:write, contents:read only).
name: triage-issue

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: true

env:
  # Exact-match trusted logins. The maintainer, plus the registry orchestrator App bot login (an
  # App is never a collaborator, so the permission probe returns none and its worker-follow-up
  # issues would be wrongly quarantined). A repo variable lets the maintainer set the concrete App
  # slug post-install; the fallback is the documented default. NO blanket [bot] trust.
  MAINTAINER_LOGIN: jeswr
  APP_BOT_LOGIN: ${{ vars.REGISTRY_APP_BOT_LOGIN || 'agent-account-registry[bot]' }}

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      NUM: ${{ github.event.issue.number }}
      AUTHOR: ${{ github.event.issue.user.login }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Trust-gate the author (exact-match maintainer/App, else repo permission)
        id: trust
        run: |
          set -euo pipefail
          # Exact-match trust for the maintainer and the registry App bot login — never a blanket
          # [bot] trust (a spoofed bot-suffixed author from some other App must not pass).
          if [ "$AUTHOR" = "$MAINTAINER_LOGIN" ] || [ "$AUTHOR" = "$APP_BOT_LOGIN" ]; then
            echo "trusted=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          perm=$(gh api "repos/$REPO/collaborators/$AUTHOR/permission" --jq .permission 2>/dev/null || echo none)
          case "$perm" in
            admin|maintain|write) echo "trusted=1" >> "$GITHUB_OUTPUT" ;;
            *) echo "trusted=0" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Quarantine + notify (untrusted author)
        if: steps.trust.outputs.trusted != '1'
        run: |
          set -uo pipefail
          gh issue edit "$NUM" -R "$REPO" --add-label trust:untrusted --add-label status:untriaged || true
          gh issue comment "$NUM" -R "$REPO" \
            --body "> 🤖 SPARQ agent — this issue is from a non-collaborator, so it is **quarantined** (\`trust:untrusted\`) and its content is not acted on. A maintainer can approve it by adding a 👍 reaction." || true

      - name: Static triage (trusted author)
        if: steps.trust.outputs.trusted == '1'
        run: |
          set -euo pipefail
          labels=$(gh issue view "$NUM" -R "$REPO" --json labels --jq '[.labels[].name]|join(",")')
          out=$(python3 scripts/triage.py --labels "$labels" --type task)
          add=$(printf '%s\n' "$out" | sed -n 's/^ADD: //p')
          rem=$(printf '%s\n' "$out" | sed -n 's/^REMOVE: //p')
          for l in $add; do gh issue edit "$NUM" -R "$REPO" --add-label "$l" || true; done
          for l in $rem; do gh issue edit "$NUM" -R "$REPO" --remove-label "$l" || true; done

  # [FABLE-5] Loud-fail alarm: triage-issue had NO always()-final alarm (the repo convention that
  # dispatch.yml + set-up-account.yml carry). A failed trust-gate/triage now upserts the rolling
  # pipeline-failure issue instead of only reddening the Actions tab.
  alarm:
    needs: triage
    if: ${{ always() && (needs.triage.result == 'failure' || needs.triage.result == 'cancelled') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/pipeline-alarm
        with:
          job-name: triage
          job-result: ${{ needs.triage.result }}
          cancelled: ${{ needs.triage.result == 'cancelled' }}
          detail: "triage-issue ${{ needs.triage.result }} on issue #${{ github.event.issue.number }}"
          registry-token: ${{ github.token }}

  # [FABLE-5] Auto-close-on-heal (review P2: recovery was wired only for dispatch): a healthy
  # triage prunes triage-issue's rows from the rolling pipeline alert (--resolve), so a recovered
  # triage never pins the alert open forever. Never reddens; cheap no-op with no open alert.
  recover:
    needs: triage
    if: ${{ always() && needs.triage.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/pipeline-alarm
        with:
          mode: resolve
          registry-token: ${{ github.token }}
