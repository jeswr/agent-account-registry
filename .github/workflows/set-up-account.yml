# [OPUS-4.8] Web-login broker: create a "set up new account" issue → get a sign-in URL in a
# comment → sign in → the captured token is stored as the account secret + the account is registered.
#
# REQUIRES the automation identity: secrets.REGISTRY_ADMIN_TOKEN — a fine-grained PAT (or App token)
# with: Secrets:write on the token-target repo (sparq-org/sparq, per token-placement option A) and
# Issues:write on this registry. The default GITHUB_TOKEN cannot write secrets. Until it is set, the
# workflow surfaces the sign-in URL but the final secret-store step no-ops with a clear message.
name: set-up-account
on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  login:
    # Only run on the trigger label AND only for a maintainer-authored issue (trust safeguard).
    if: >-
      github.event.label.name == 'set-up-account' &&
      github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_REPO: sparq-org/sparq        # where account token secrets live (option A)
      LOGIN_DIR: ${{ runner.temp }}/login
    steps:
      - uses: actions/checkout@v4

      - name: Determine provider + handle
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          BODY: ${{ github.event.issue.body }}
          TITLE: ${{ github.event.issue.title }}
        run: |
          prov=$(printf '%s\n%s' "$TITLE" "$BODY" | grep -oiE 'openai|anthropic' | head -1 | tr 'A-Z' 'a-z')
          [ -n "$prov" ] || prov=anthropic
          # next free ACCTNN handle by scanning existing account issues
          n=$(gh issue list -R "${{ github.repository }}" --state all --json title \
                --jq '[.[].title|select(test("^acct[0-9]+$"))|ltrimstr("acct")|tonumber]|max // 0' 2>/dev/null || echo 0)
          printf 'provider=%s\n' "$prov" >> "$GITHUB_OUTPUT"
          printf 'handle=acct%02d\n' "$((n+1))" >> "$GITHUB_OUTPUT"
          printf 'secret=ACCT%02d_TOKEN\n' "$((n+1))" >> "$GITHUB_OUTPUT"

      - name: Install provider CLI
        run: |
          if [ "${{ steps.meta.outputs.provider }}" = "openai" ]; then
            npm i -g @openai/codex >/dev/null 2>&1 || curl -fsSL https://codex.sh/install | sh || true
          else
            npm i -g @anthropic-ai/claude-code >/dev/null 2>&1 || true
          fi

      - name: Run device login + post sign-in URL, then capture token
        id: login
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/account-login.sh "${{ steps.meta.outputs.provider }}" "$LOGIN_DIR" 780 &
          BR=$!
          # wait for the sign-in instructions, post them to the issue
          for _ in $(seq 1 40); do [ -s "$LOGIN_DIR/signin.txt" ] && break; sleep 2; done
          if [ -s "$LOGIN_DIR/signin.txt" ]; then
            gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
              --body "$(printf '### Sign in to register this account\n\n```\n%s\n```\n\n_Only continue if you started this. The account token will be captured and stored as a secret; nothing is printed here._' "$(cat "$LOGIN_DIR/signin.txt")")"
          fi
          wait "$BR" && echo "status=ok" >> "$GITHUB_OUTPUT" || echo "status=fail" >> "$GITHUB_OUTPUT"

      - name: Store token as the account secret (needs REGISTRY_ADMIN_TOKEN)
        if: steps.login.outputs.status == 'ok'
        env:
          ADMIN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
        run: |
          if [ -z "${ADMIN:-}" ]; then
            gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
              --body "✅ Sign-in captured, but **REGISTRY_ADMIN_TOKEN is not set** so the token can't be stored as a secret. Add a fine-grained PAT (Secrets:write on $TARGET_REPO) as \`REGISTRY_ADMIN_TOKEN\`, then re-run." || true
            exit 0
          fi
          GH_TOKEN="$ADMIN" gh secret set "${{ steps.meta.outputs.secret }}" -R "$TARGET_REPO" < "$LOGIN_DIR/token"
          # register the account metadata issue (no token) + label available
          GH_TOKEN="$ADMIN" gh issue create -R "${{ github.repository }}" \
            --title "${{ steps.meta.outputs.handle }}" \
            --label "provider:${{ steps.meta.outputs.provider == 'openai' && 'openai' || 'anthropic' }}" \
            --label status:available \
            --body "$(printf 'provider: %s\nmax_concurrent_workers: 1\nsecret_ref: %s\nnotes: registered via set-up-account broker\n' "${{ steps.meta.outputs.provider }}" "${{ steps.meta.outputs.secret }}")"
          gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
            --body "✅ Account **${{ steps.meta.outputs.handle }}** registered (secret \`${{ steps.meta.outputs.secret }}\` on $TARGET_REPO). Closing." || true
          gh issue close "${{ github.event.issue.number }}" -R "${{ github.repository }}" || true

      - name: Report failure
        if: steps.login.outputs.status != 'ok'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
            --body "⚠️ Sign-in did not complete in time (device code expires ~15 min). Re-apply the \`set-up-account\` label to try again." || true
