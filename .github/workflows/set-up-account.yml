# [OPUS-4.8] Web-login broker (review-hardened S5): a maintainer opens a "set up new account" issue
# labelled `set-up-account`; the broker posts a sign-in URL/code, captures the token, and stores it.
#
# Hardening vs the GPT-5.6 review: actor AND author must be admin/maintain; the secrets-write PAT is
# required BEFORE any login (no capturing a credential we can't store); actions are SHA-pinned and the
# CLI is version-pinned with no curl-to-shell; enrollments are serialized; provider is structured
# (a provider:* label, no silent default); the token is never echoed (only `gh secret set < file`);
# an always() step shreds all auth state.
#
# COMPLETION fixes (audit-2026-07-17): the captured secret is stored on THIS registry repo — the
# only place any consumer reads it (worker.yml `secrets[secret_ref]`, the dispatch usage probe,
# fingerprint-accounts; the old sparq-org/sparq write registered accounts nothing could use). The
# account issue now carries the `models:` line read_accounts requires (an account with empty models
# is silently invisible to the allocator), the broker validates its own registration through the
# real read_accounts parser, and the handle is appended to policy/repos.toml account_pool with a
# contents-API compare-and-swap (rebase-retry) so no human policy edit is left dangling.
#
# STALE-SNAPSHOT fix (#186, hardened after review round 1 of #236): the handle/secret in `meta`
# are only a pre-login HINT. A re-read before the write is still a TOCTOU check, so the store step
# instead takes ATOMIC ownership of the slot by creating `refs/acct-claims/<handle>` — git ref
# creation is first-writer-wins on the server, and claims are never deleted (a failed run burns its
# slot instead of releasing it, so a retry can never overwrite an in-flight credential). The slot is
# derived from the COMPLETE union (fully paginated, never a capped page) of claim refs, acctNN issue
# titles in ANY state, and ACCTNN_TOKEN secret names at BOTH scopes — repository AND the
# dispatch-secrets environment, the post-#101 canonical home (an env-only token with no claim ref
# or issue would otherwise be invisible and the broker would burn its claim ref on an occupied
# slot); if any listing fails, freeness cannot be proven and the run fails closed. The claim-ref namespace is the canonical allocation record every
# automated account writer must claim in BEFORE writing; downstream steps consume the claimed slot
# via steps.store.outputs, not the stale snapshot.
#
# CONFIDENTIAL-CHALLENGE fix (#181): the device code / sign-in URL is a REDEEMABLE authorization
# challenge — on this PUBLIC repo, posting it in an issue comment (or a run log, or a job summary)
# lets any observer redeem it FIRST and bind an attacker-controlled provider account, whose captured
# credential this broker would then trust and store. So the challenge is NEVER surfaced in the clear:
# the broker proves the requesting maintainer has an encryption-capable GitHub-published GPG key
# BEFORE any login starts (fail closed, like the secrets preflight), then delivers the challenge
# ENCRYPTED to that key — only the holder of the matching private key can recover the code, and the
# plaintext challenge never leaves the runner.
name: set-up-account
on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write   # policy/repos.toml account_pool append (contents-API CAS)

concurrency:
  group: set-up-account
  cancel-in-progress: false

jobs:
  login:
    if: github.event.label.name == 'set-up-account'
    runs-on: ubuntu-latest
    # REGISTRY_SECRETS_PAT's canonical home is the dispatch-secrets environment (post-#101 the
    # repo scope must stay EMPTY — the secrets-guard fails dispatch closed otherwise), so the
    # broker job must be env-bound to resolve it. `issues: labeled` events run on the default
    # branch, which the environment's custom deployment-branch policy admits.
    environment: dispatch-secrets
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # The `runner` context is not valid in job-level env (it invalidated the whole workflow —
      # GitHub refused to parse the file, so the broker never fired). Derive LOGIN_DIR in a step.
      - name: Resolve LOGIN_DIR under the runner temp dir
        run: echo "LOGIN_DIR=$RUNNER_TEMP/login" >> "$GITHUB_ENV"

      - name: Trust gate — actor AND author must be admin/maintain
        run: |
          for u in "${{ github.actor }}" "${{ github.event.issue.user.login }}"; do
            perm=$(gh api "repos/${{ github.repository }}/collaborators/$u/permission" --jq .permission 2>/dev/null || echo none)
            case "$perm" in
              admin|maintain) ;;
              *) echo "::error::$u lacks admin/maintain (got '$perm') — refusing"; exit 1 ;;
            esac
          done

      # The workflow's own github.token cannot write Actions secrets; REGISTRY_SECRETS_PAT is the
      # jeswr-owned fine-grained PAT on THIS registry repo (already proven by the rotation
      # write-back in worker-live.sh). Post-#101 it lives in the dispatch-secrets environment
      # (this job is env-bound to resolve it). LEAST-PRIVILEGE GRANTS (sol review round 4 of
      # #275): repository Secrets: READ (the store step only LISTS repo-scope secrets and GETs
      # the candidate name for the both-scopes absence probe — it never writes at repo scope)
      # + Environments: READ AND WRITE (the env public-key read `gh secret set --env` performs
      # and the store step's env-secret union listing sit under Environments: read; the
      # env-secret PUT under Environments: write).
      #
      # PRESENCE ALONE IS NOT ENOUGH (round-4 finding 1): a PAT that exists but was minted
      # under-scoped — or stored at repo scope by a well-meaning operator following a vague
      # recovery hint, re-tripping the secrets-guard — would fail only AFTER the credential was
      # captured. So BOTH capabilities are proven HERE, before any login starts or sign-in URL
      # is surfaced: (1) the NON-MUTATING repo-scope secrets listing the store step's absence
      # probe performs, and (2) an AUTHORITATIVE environment write — a real `gh secret set
      # --env` on the disposable REGISTRY_PAT_PROBE_CANARY secret pat-validity.py already
      # overwrites weekly (it holds NO secret material; only a completed write proves write
      # access — a read probe would bless a read-only PAT). Fail closed pre-login on either.
      - name: Preflight — REGISTRY_SECRETS_PAT present AND store-capable, before any login
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_SECRETS_PAT }}
        run: |
          set -euo pipefail
          fail() {
            gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
              --body "❌ $1 Refusing to start login — no sign-in URL is surfaced until the broker has proven it can store what the login captures (fail closed). **Fix:** mint a fine-grained PAT on \`${{ github.repository }}\` with repository **Secrets: read** + **Environments: read and write** (least privilege — the broker only lists/reads repo-scope secrets and writes environment secrets), store it with \`gh secret set REGISTRY_SECRETS_PAT --repo ${{ github.repository }} --env dispatch-secrets\` (the dispatch-secrets ENVIRONMENT is its canonical home — a repo-scope copy would re-trip the secrets-guard), then re-apply the \`set-up-account\` label." || true
            exit 1
          }
          if [ -z "${REGISTRY_PAT:-}" ]; then
            fail "\`REGISTRY_SECRETS_PAT\` is not set (not resolvable from the \`dispatch-secrets\` environment), so a captured token could not be stored."
          fi
          # Capability probe 1 — repository Secrets: READ, via the same NON-MUTATING listing the
          # store step's both-scopes absence probe performs (never a repo-scope write, which
          # would re-trip the secrets-guard).
          if ! GH_TOKEN="$REGISTRY_PAT" gh api "repos/${{ github.repository }}/actions/secrets?per_page=1" --jq .total_count >/dev/null; then
            fail "\`REGISTRY_SECRETS_PAT\` resolves but cannot LIST repository-scope secrets — it lacks repository **Secrets: read**, so the store step's both-scopes absence probe would fail closed only AFTER the credential was captured."
          fi
          # Capability probe 2 — authoritative Environments: WRITE, via a real env-secret write
          # to the disposable canary pat-validity.py overwrites weekly (holds no secret
          # material; value via stdin, never argv, per the repo convention).
          if ! printf '%s' "set-up-account preflight write-probe canary - holds no secret material" \
              | GH_TOKEN="$REGISTRY_PAT" gh secret set REGISTRY_PAT_PROBE_CANARY -R "${{ github.repository }}" --env dispatch-secrets; then
            fail "\`REGISTRY_SECRETS_PAT\` resolves but cannot WRITE a \`dispatch-secrets\` environment secret — it lacks **Environments: read and write**, so storing the captured credential would fail only AFTER capture."
          fi
          echo "preflight: REGISTRY_SECRETS_PAT proven store-capable (repo Secrets:read listing + authoritative dispatch-secrets canary write)"

      - name: Determine provider (structured — no silent default)
        id: meta
        run: |
          prov=""
          for lb in ${{ join(github.event.issue.labels.*.name, ' ') }}; do
            case "$lb" in provider:openai) prov=openai;; provider:anthropic) prov=anthropic;; esac
          done
          if [ -z "$prov" ]; then
            gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
              --body "❌ Add a \`provider:openai\` or \`provider:anthropic\` label, then re-apply \`set-up-account\`." || true
            exit 1
          fi
          # The models line the allocator requires (read_accounts drops model-less accounts),
          # derived from the provider (mirrors orchestration/routing.toml's [models] catalog).
          # openai mints the FULL codex alias set [sol, luna, terra]: select-and-claim's
          # choose_account requires exact alias membership, so a terra-only record would defer
          # every sol/luna claim forever (sol r2 finding 1). anthropic stays
          # [fable, opus, sonnet, haiku] — unchanged.
          if [ "$prov" = openai ]; then models='[sol, luna, terra]'; else models='[fable, opus, sonnet, haiku]'; fi
          # handle/secret here are only a PRE-LOGIN RESERVATION HINT: the login below can take ~13 min,
          # during which another (non-serialized) writer may claim this number, so the store step
          # derives the real slot from complete live state and atomically claims it (an acct-claims
          # ref) before writing (#186). This hint only makes a retry converge on the same slot.
          n=$(gh issue list -R "${{ github.repository }}" --state all --json title \
                --jq '[.[].title|select(test("^acct[0-9]+$"))|ltrimstr("acct")|tonumber]|max // 0' 2>/dev/null || echo 0)
          {
            printf 'provider=%s\n' "$prov"
            printf 'models=%s\n' "$models"
            printf 'handle=acct%02d\n' "$((n+1))"
            printf 'secret=ACCT%02d_TOKEN\n' "$((n+1))"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout (pinned)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install provider CLI (version-pinned, fail on error)
        run: |
          set -e
          if [ "${{ steps.meta.outputs.provider }}" = "openai" ]; then
            npm i -g @openai/codex@0.144.1
          else
            npm i -g @anthropic-ai/claude-code@2.1.177
          fi

      # #181: the device code / sign-in URL is a REDEEMABLE authorization challenge — anyone who reads
      # it before the maintainer does can complete the device flow against an attacker-controlled
      # provider account, whose credential this broker would then capture, trust and store. On a PUBLIC
      # repo an issue comment (and the run log, and the job summary) is world-readable, so the challenge
      # must never appear there in the clear. Deliver it through a maintainer-only channel: encrypt it
      # to the requesting maintainer's own GitHub-published GPG key (the requester is already trust-gated
      # to admin/maintain above), so only the holder of the matching private key can read it. Prove a
      # usable, encryption-capable key exists HERE, before any login starts (fail closed, mirroring the
      # secrets preflight) — a login whose challenge we cannot deliver confidentially must never run.
      - name: Preflight — requester has a confidential-delivery key, before any login
        env:
          REQUESTER: ${{ github.event.issue.user.login }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p "$LOGIN_DIR"; chmod 700 "$LOGIN_DIR"
          keyfile="$LOGIN_DIR/recipient.asc"
          # Fetch the requester's PUBLIC GPG keys (armored) via the API — never any private material.
          # Zero keys, an API error, or an empty body all fail closed (no challenge is ever surfaced).
          if ! gh api "users/$REQUESTER/gpg_keys" \
                 --jq '.[].raw_key | select(. != null and . != "")' > "$keyfile" 2>/dev/null \
             || ! [ -s "$keyfile" ]; then
            gh issue comment "$ISSUE" -R "$REPO" \
              --body "❌ Cannot deliver the sign-in challenge confidentially: \`@$REQUESTER\` has no public GPG key on GitHub. On a public repository the device code / sign-in URL is a redeemable authorization challenge and must never be posted in the clear (any observer could redeem it first and bind an attacker-controlled account), so no login was started. **Fix:** add a GPG key to your GitHub account (Settings → SSH and GPG keys), then re-apply the \`set-up-account\` label — the challenge will be encrypted to that key and you decrypt it locally with \`gpg -d\`." || true
            echo "::error::requester has no GPG key — cannot deliver challenge confidentially, refusing (fail closed)"; exit 1
          fi
          # Import into an isolated, disposable keyring under LOGIN_DIR (shredded by the always() step).
          export GNUPGHOME="$LOGIN_DIR/gnupg"; mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
          if ! gpg --batch --import "$keyfile" >/dev/null 2>&1; then
            gh issue comment "$ISSUE" -R "$REPO" \
              --body "❌ \`@$REQUESTER\`'s published GPG key could not be imported, so the sign-in challenge cannot be encrypted to it. No login was started (fail closed). **Fix:** ensure a valid GPG public key is on your GitHub account, then re-apply \`set-up-account\`." || true
            echo "::error::requester GPG key failed to import — refusing (fail closed)"; exit 1
          fi
          # Prove at least one imported key can actually ENCRYPT (a sign-only / malformed key would
          # otherwise fail only AFTER the login started and the challenge was already in hand). Persist
          # the exact fingerprint that works so the login step encrypts to that same recipient.
          for fpr in $(gpg --batch --with-colons --list-keys | awk -F: '$1=="fpr"{print $10}'); do
            if printf 'probe' | gpg --batch --yes --trust-model always -a -e -r "$fpr" >/dev/null 2>&1; then
              printf '%s' "$fpr" > "$LOGIN_DIR/recipient.fpr"; break
            fi
          done
          if ! [ -s "$LOGIN_DIR/recipient.fpr" ]; then
            gh issue comment "$ISSUE" -R "$REPO" \
              --body "❌ \`@$REQUESTER\`'s published GPG key cannot be used to encrypt (no encryption-capable key/subkey). The sign-in challenge cannot be delivered confidentially, so no login was started (fail closed). **Fix:** publish an encryption-capable GPG key on GitHub, then re-apply \`set-up-account\`." || true
            echo "::error::no encryption-capable GPG key for requester — refusing (fail closed)"; exit 1
          fi
          echo "preflight: challenge will be delivered encrypted to @$REQUESTER's GPG key"

      - name: Device login + deliver encrypted sign-in, capture token
        id: login
        env:
          REQUESTER: ${{ github.event.issue.user.login }}
        run: |
          set -euo pipefail
          export GNUPGHOME="$LOGIN_DIR/gnupg"   # the keyring the preflight imported the recipient into
          bash scripts/account-login.sh "${{ steps.meta.outputs.provider }}" "$LOGIN_DIR" 780 &
          BR=$!
          for _ in $(seq 1 40); do [ -s "$LOGIN_DIR/signin.txt" ] && break; sleep 2; done
          if [ -s "$LOGIN_DIR/signin.txt" ]; then
            # #181: NEVER post the raw challenge — on a public repo it is world-readable and redeemable.
            # Encrypt it to the requester's GPG key (proven present + encryption-capable by the preflight)
            # and post only the ASCII-armored ciphertext. gpg reads the plaintext from a file and writes
            # ciphertext to a file, so the challenge is never an argv, a pipe echoed to the log, or a summary.
            recipient=$(cat "$LOGIN_DIR/recipient.fpr" 2>/dev/null || true)
            if [ -z "$recipient" ]; then
              echo "::error::no imported GPG recipient at login time — refusing to surface challenge (fail closed)"
              kill "$BR" 2>/dev/null || true
              echo "status=fail" >> "$GITHUB_OUTPUT"; exit 1
            fi
            gpg --batch --yes --trust-model always -a -e -r "$recipient" \
              -o "$LOGIN_DIR/signin.asc" "$LOGIN_DIR/signin.txt"
            # shellcheck disable=SC2016  # single-quoted printf FORMAT (markdown backticks) is deliberate
            gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
              --body "$(printf '### Sign in to register this account (challenge encrypted to @%s)\n\nThe device code / sign-in URL is a redeemable authorization challenge; on a public repo it is never posted in the clear (any observer could redeem it first and bind an attacker-controlled account). It is encrypted to your GitHub GPG key — save the block below to a file and run `gpg -d`, then complete the sign-in:\n\n```\n%s\n```\n\n_Only continue if you started this. The token is captured and stored as a secret; it is never printed._' "$REQUESTER" "$(cat "$LOGIN_DIR/signin.asc")")"
          fi
          if wait "$BR"; then echo "status=ok" >> "$GITHUB_OUTPUT"; else echo "status=fail" >> "$GITHUB_OUTPUT"; fi

      # [OPUS-4.8] #191: reject an enrollment whose CAPTURED credential format is incompatible with
      # the routing aliases the account will declare — BEFORE the irreversible secret write. The
      # Anthropic login broker falls back to `claude-credentials-json` when `claude setup-token`
      # leaves a credentials file but prints no `sk-ant-` token (account-login.sh:61-62); every
      # current anthropic alias in orchestration/routing.toml declares `claude-oauth-token`, so such
      # an account enrolls successfully yet every worker claim of it dies at worker.yml's "credential
      # format conflicts with protected routing" gate — an unusable account that still burns a slot.
      # The post-store read_accounts validation only checks `models` is nonempty, so it passes this
      # through. Assert here that the captured format equals the declared credential_format of EVERY
      # alias in the account's models list, failing closed on any mismatch / unknown alias / missing
      # format, so an incompatible credential is never stored (works for both providers).
      - name: Reject a credential format incompatible with the routing aliases (fail closed, pre-store)
        if: steps.login.outputs.status == 'ok'
        env:
          MODELS: ${{ steps.meta.outputs.models }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          fmt=$(cat "$LOGIN_DIR/credential_format" 2>/dev/null || true)
          reject() {
            gh issue comment "$ISSUE" -R "$REPO" \
              --body "❌ Captured credential format \`${fmt:-<none>}\` is incompatible with the routing aliases for this account ($1). The account was **not** registered (no secret stored). $2" || true
            echo "::error::$1 — refusing to store (fail closed)"; exit 1
          }
          [ -n "$fmt" ] || reject "no credential_format was captured" "Re-apply \`set-up-account\` to retry the login."
          CAPTURED_FMT="$fmt" MODELS="$MODELS" python3 - <<'PY' || reject "the captured format is not compatible with every declared alias" "Fix the login so it yields a routing-compatible credential (e.g. a \`claude-oauth-token\`), or reconcile orchestration/routing.toml."
          import os, sys, tomllib
          with open("orchestration/routing.toml", "rb") as fh:
              catalog = tomllib.load(fh).get("models", {})
          captured = os.environ["CAPTURED_FMT"]
          aliases = [m.strip() for m in os.environ["MODELS"].strip().strip("[]").split(",") if m.strip()]
          if not aliases:
              print("no declared aliases to validate against", file=sys.stderr); sys.exit(1)
          for alias in aliases:
              meta = catalog.get(alias)
              if not meta or not meta.get("credential_format"):
                  print(f"alias {alias!r} has no credential_format in routing.toml", file=sys.stderr); sys.exit(1)
              if meta["credential_format"] != captured:
                  print(f"alias {alias!r} requires {meta['credential_format']!r} but captured {captured!r}",
                        file=sys.stderr); sys.exit(1)
          print(f"credential format {captured!r} is compatible with every declared alias: {aliases}")
          PY

      - name: Claim slot atomically (acct-claims ref) + store token + register — fail closed
        id: store
        if: steps.login.outputs.status == 'ok'
        env:
          REGISTRY_PAT: ${{ secrets.REGISTRY_SECRETS_PAT }}
          PROVIDER: ${{ steps.meta.outputs.provider }}
          MODELS: ${{ steps.meta.outputs.models }}
          RESERVED_HANDLE: ${{ steps.meta.outputs.handle }}
        run: |
          set -euo pipefail
          # #186 stale-snapshot fix, hardened after review round 1 of #236. `meta` picked the slot
          # from a snapshot taken BEFORE a login lasting up to ~13 min, and the concurrency group
          # serializes only this workflow's own runs — NOT manual account creation or other writers.
          # Proceeding blind would OVERWRITE a live credential (`gh secret set` is an upsert) and
          # mint a DUPLICATE acctNN title (GitHub permits duplicate titles). A re-read immediately
          # before the write is STILL a TOCTOU check, so ownership is taken atomically instead:
          # creating `refs/acct-claims/acctNN` is first-writer-wins on the server — exactly one
          # writer can ever create a given ref — and claims are NEVER deleted (a run that fails
          # after claiming burns its slot rather than releasing it, so a different credential can
          # never overwrite an in-flight one). The acct-claims namespace is the canonical allocation
          # record; every automated account writer MUST create its claim ref before writing a secret
          # or an acctNN issue. Out-of-band manual writes cannot be forced through this protocol;
          # they are caught by deriving the slot from the COMPLETE union of claim refs, acctNN issue
          # titles in ANY state, and ACCTNN_TOKEN secret names at BOTH scopes (repository AND the
          # dispatch-secrets environment — the post-#101 canonical home; an env-only stray must be
          # visible BEFORE the irreversible claim, not first at the absence probe) — each fully
          # paginated, because any capped listing silently treats every unseen slot as free — plus a
          # secret-absence probe right before the upsert. If any listing fails, freeness cannot be
          # proven -> fail closed. The pre-login hint is reused when still free so a retry converges
          # on the same slot.
          reserved=${RESERVED_HANDLE#acct}; reserved=$((10#$reserved))
          claimed=""
          for attempt in 1 2 3 4 5; do
            if ! claim_nums=$(gh api --paginate "repos/${{ github.repository }}/git/matching-refs/acct-claims/" \
                   --jq '.[].ref | select(test("^refs/acct-claims/acct[0-9]+$")) | ltrimstr("refs/acct-claims/acct")'); then
              echo "::error::could not list acct-claims refs — refusing to store (fail closed)"; exit 1
            fi
            if ! issue_nums=$(gh api --paginate "repos/${{ github.repository }}/issues?state=all&per_page=100" \
                   --jq '.[] | select(has("pull_request") | not) | .title | select(test("^acct[0-9]+$")) | ltrimstr("acct")'); then
              echo "::error::could not enumerate every account issue — refusing to store (fail closed)"; exit 1
            fi
            if ! secret_nums=$(GH_TOKEN="$REGISTRY_PAT" gh api --paginate "repos/${{ github.repository }}/actions/secrets?per_page=100" \
                   --jq '.secrets[].name | select(test("^ACCT[0-9]+_TOKEN$")) | ltrimstr("ACCT") | rtrimstr("_TOKEN")'); then
              echo "::error::could not enumerate existing secrets — refusing to store (fail closed)"; exit 1
            fi
            # Post-cutover (#101) ACCTNN_TOKEN secrets live in the dispatch-secrets ENVIRONMENT,
            # so the union MUST enumerate that scope too (sol round-6 finding 3): an env-only
            # token with no claim ref or issue yet would otherwise be invisible here, the broker
            # would create the claim ref IRREVERSIBLY (claims are never deleted) and only then
            # fail at the env absence-probe below — permanently burning the slot. Fully
            # paginated, same PAT (its Environments read+write grant is proven by the preflight
            # canary write; env-secret listing sits under Environments: read).
            if ! env_secret_nums=$(GH_TOKEN="$REGISTRY_PAT" gh api --paginate "repos/${{ github.repository }}/environments/dispatch-secrets/secrets?per_page=100" \
                   --jq '.secrets[].name | select(test("^ACCT[0-9]+_TOKEN$")) | ltrimstr("ACCT") | rtrimstr("_TOKEN")'); then
              echo "::error::could not enumerate dispatch-secrets environment secrets — refusing to store (fail closed)"; exit 1
            fi
            taken=$(printf '%s\n%s\n%s\n%s\n' "$claim_nums" "$issue_nums" "$secret_nums" "$env_secret_nums" \
                      | jq -Rn '[inputs | select(test("^[0-9]+$")) | tonumber]')
            n=$(jq -n --argjson t "$taken" --argjson r "$reserved" \
                  'if ($t | index($r)) then (([$t[], 0] | max) + 1) else $r end')
            cand=$(printf 'acct%02d' "$n")
            # First-writer-wins claim: 422 "already exists" means we lost a race -> re-derive.
            # Any OTHER failure is indistinguishable from "claim state unknown" -> fail closed.
            if out=$(gh api "repos/${{ github.repository }}/git/refs" \
                       -f ref="refs/acct-claims/$cand" -f sha="$GITHUB_SHA" 2>&1); then
              claimed=$n
              break
            fi
            if ! printf '%s' "$out" | grep -qi 'already exists'; then
              echo "::error::claim-ref creation for $cand failed for a non-collision reason — refusing to store (fail closed)"; exit 1
            fi
            echo "slot $cand was claimed concurrently; re-deriving (attempt $attempt)"
          done
          if [ -z "$claimed" ]; then
            echo "::error::could not obtain an account-slot claim after 5 attempts — refusing to store (fail closed)"; exit 1
          fi
          HANDLE=$(printf 'acct%02d' "$claimed")
          SECRET_NAME=$(printf 'ACCT%02d_TOKEN' "$claimed")
          # Last probe before the irreversible upsert: the claim defeats every protocol-observing
          # writer; this narrows the residual out-of-protocol (manual) window to probe->set. Only an
          # explicit 404 proves absence — any other outcome (exists, network error) refuses.
          if probe=$(GH_TOKEN="$REGISTRY_PAT" gh api "repos/${{ github.repository }}/actions/secrets/$SECRET_NAME" 2>&1); then
            echo "::error::secret $SECRET_NAME already exists despite an owned claim (out-of-band write) — refusing to overwrite (fail closed)"; exit 1
          fi
          if ! printf '%s' "$probe" | grep -q 'HTTP 404'; then
            echo "::error::could not prove $SECRET_NAME is absent — refusing to store (fail closed)"; exit 1
          fi
          # Post-#101 the canonical home is the `dispatch-secrets` environment: probe it too
          # (BOTH scopes must 404 — a repo-scope stray would trip the secrets-guard, an env
          # stray means the claim protocol was bypassed).
          if envprobe=$(GH_TOKEN="$REGISTRY_PAT" gh api "repos/${{ github.repository }}/environments/dispatch-secrets/secrets/$SECRET_NAME" 2>&1); then
            echo "::error::secret $SECRET_NAME already exists in the dispatch-secrets environment despite an owned claim — refusing to overwrite (fail closed)"; exit 1
          fi
          if ! printf '%s' "$envprobe" | grep -q 'HTTP 404'; then
            echo "::error::could not prove $SECRET_NAME is absent from the dispatch-secrets environment — refusing to store (fail closed)"; exit 1
          fi
          # The secret lives on THIS registry repo, in the `dispatch-secrets` ENVIRONMENT
          # (post-#101): worker.yml/review-fix.yml resolve secrets[secret_ref] from env-bound
          # jobs, and the rotation write-back targets the same environment. A repo-scope write
          # would re-trip the secrets-guard. Never echo the token — gh reads the file.
          GH_TOKEN="$REGISTRY_PAT" gh secret set "$SECRET_NAME" -R "${{ github.repository }}" --env dispatch-secrets < "$LOGIN_DIR/token"
          fmt=$(cat "$LOGIN_DIR/credential_format" 2>/dev/null || echo unknown)
          harness=$([ "$PROVIDER" = openai ] && echo codex || echo claude)
          # registry issue + comment use the workflow's own github.token (same-owner)
          gh issue create -R "${{ github.repository }}" \
            --title "$HANDLE" \
            --label "provider:$PROVIDER" --label status:available \
            --body "$(printf 'provider: %s\nharness: %s\nmodels: %s\ncredential_format: %s\nmax_concurrent_workers: 1\nsecret_ref: %s\nnotes: registered via set-up-account broker\n' "$PROVIDER" "$harness" "$MODELS" "$fmt" "$SECRET_NAME")"
          # Publish the CLAIMED slot so every downstream step uses it, not the stale pre-login snapshot.
          {
            printf 'handle=%s\n' "$HANDLE"
            printf 'secret=%s\n' "$SECRET_NAME"
          } >> "$GITHUB_OUTPUT"

      - name: Validate the registration through the real allocator parser
        if: steps.login.outputs.status == 'ok'
        env:
          NEW_HANDLE: ${{ steps.store.outputs.handle }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import importlib.util
          import os

          spec = importlib.util.spec_from_file_location(
              "registry_select_and_claim", "scripts/select-and-claim.py")
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          handle = os.environ["NEW_HANDLE"]
          accounts = {a["handle"]: a for a in module.read_accounts(os.environ["GITHUB_REPOSITORY"])}
          account = accounts.get(handle)
          if account is None or not account.get("models"):
              raise SystemExit(
                  f"registration validation FAILED: {handle} is invisible to read_accounts "
                  "(missing or empty models line) — the allocator could never select it")
          print(f"registration validated: {handle} models={account['models']}")
          PY

      # SEAM(#325): the account-pool list is slated to move to a PRIVATE location; until then
      # policy/repos.toml account_pool is the single allow-list every enforcement point checks
      # (policy-resolve validation, claim()'s pool filter, worker.yml's independent re-check), so
      # the broker appends the new handle there via a contents-API compare-and-swap.
      - name: Append the handle to policy account_pool (contents-API CAS, rebase-retry)
        if: steps.login.outputs.status == 'ok'
        env:
          NEW_HANDLE: ${{ steps.store.outputs.handle }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import json
          import os
          import re
          import subprocess
          import time
          import tomllib

          repo = os.environ["GITHUB_REPOSITORY"]
          handle = os.environ["NEW_HANDLE"]
          if not re.fullmatch(r"acct[0-9a-z]{2,}", handle):
              raise SystemExit("unsafe handle")
          path = "policy/repos.toml"

          def gh_api(args, input_doc=None):
              result = subprocess.run(
                  ["gh", "api", *args], capture_output=True, text=True, check=False,
                  input=json.dumps(input_doc) if input_doc is not None else None)
              return result

          for attempt in range(6):
              meta = gh_api([f"repos/{repo}/contents/{path}"])
              if meta.returncode != 0:
                  raise SystemExit("policy file read failed")
              document = json.loads(meta.stdout)
              text = base64.b64decode("".join(document["content"].split())).decode()
              pattern = re.compile(r"(?m)^(account_pool\s*=\s*\[)([^\]]*)(\])")
              def append(match):
                  entries = match.group(2)
                  if f'"{handle}"' in entries:
                      return match.group(0)
                  separator = ", " if entries.strip() else ""
                  return f"{match.group(1)}{entries}{separator}\"{handle}\"{match.group(3)}"
              new_text, count = pattern.subn(append, text)
              if count == 0:
                  raise SystemExit("no account_pool line found in policy/repos.toml")
              if new_text == text:
                  print(f"{handle} already present in account_pool")
                  break
              parsed = tomllib.loads(new_text)  # refuse to commit a policy the resolver can't parse
              if not any(handle in (row.get("account_pool") or [])
                         for row in parsed.get("repos", {}).values()):
                  raise SystemExit("edited policy does not contain the new handle; refusing")
              put = gh_api(
                  [f"repos/{repo}/contents/{path}", "-X", "PUT", "--input", "-"],
                  input_doc={
                      "message": f"register {handle} in account_pool (set-up-account broker)",
                      "content": base64.b64encode(new_text.encode()).decode(),
                      "sha": document["sha"],
                  })
              if put.returncode == 0:
                  print(f"appended {handle} to account_pool")
                  break
              time.sleep(2 * (attempt + 1))   # CAS conflict -> re-read and retry
          else:
              raise SystemExit("account_pool append did not settle after 6 CAS attempts")
          PY

      - name: Close the request issue (registration complete)
        if: steps.login.outputs.status == 'ok'
        run: |
          fmt=$(cat "$LOGIN_DIR/credential_format" 2>/dev/null || echo unknown)
          gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
            --body "✅ Account **${{ steps.store.outputs.handle }}** registered: secret \`${{ steps.store.outputs.secret }}\` on \`${{ github.repository }}\` (format \`$fmt\`), \`models: ${{ steps.meta.outputs.models }}\`, appended to \`policy/repos.toml\` account_pool, validated via read_accounts. Closing." || true
          gh issue close "${{ github.event.issue.number }}" -R "${{ github.repository }}" || true

      - name: Report failure
        if: steps.login.outputs.status != 'ok'
        run: |
          gh issue comment "${{ github.event.issue.number }}" -R "${{ github.repository }}" \
            --body "⚠️ Sign-in did not complete in time (device code expires ~15 min). Re-apply \`set-up-account\` to retry." || true

      - name: Cleanup auth state (always)
        if: always()
        run: |
          pkill -f 'codex login' 2>/dev/null || true
          pkill -f 'claude setup-token' 2>/dev/null || true
          rm -rf "$LOGIN_DIR" 2>/dev/null || true
