# [OPUS-4.8] B1: the registry's own required PR gate. The onboarded review lane arms a PR with
# the sha-bound enablePullRequestAutoMerge mutation (allow_auto_merge is enabled live on the
# repo; never `gh pr merge --auto`, which direct-merges — sol r4 on #334); that latch only merges when
# a REQUIRED status check named `gate` is green. This workflow IS that check — a `pull_request`
# job literally named `gate` running the registry-selftest suite (python --self-test + actionlint).
# It is also the authoritative check dispatch-claim.py's CI_GATE_CHECK reads (name == "gate").
#
# The orchestrator requires this via a ruleset AFTER push (documented in the commit message):
#   required_status_checks context 'gate'; NO require-pull-request rule (direct pipeline pushes —
#   worker/review-fix branch pushes — must stay allowed). Do NOT create the ruleset here.
#
# Least privilege: contents:read only (the gate reads code + runs tests; it never writes). Actions
# are SHA-pinned, and the gate enforces that policy on itself (sol audit #221): every non-local
# `uses:` reference in every workflow must be a full 40-hex commit pin — actionlint does not check
# that, so without the assertion a regression to a mutable tag would pass this REQUIRED check.
# PyYAML is installed version- and hash-locked for the same reason: a mutable PyPI release must not
# be able to break or influence the gate. actionlint is fetched as a pinned release binary verified
# against the release's published sha256 (the raven-actions installer broke under the runner's
# forced Node-24 migration, and `go install` is checksum-free — a pinned+checksummed direct
# download is the sturdiest option).
name: pr-gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python (pinned)
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'

      - name: Install PyYAML for the workflow-yaml lint (version + hash locked)
        run: |
          set -euo pipefail
          # A REQUIRED gate must not depend on a mutable release (sol audit #221): pin the exact
          # version AND its PyPI sha256 digests (manylinux cp312 x86_64 + aarch64 wheels).
          # --only-binary forbids a fallback sdist build, whose isolated build deps pip would
          # download WITHOUT hash-checking.
          cat > "$RUNNER_TEMP/gate-requirements.txt" <<'REQ'
          pyyaml==6.0.2 \
              --hash=sha256:80bab7bfc629882493af4aa31a4cfa43a4c57c83813253626916b8c7ada83476 \
              --hash=sha256:1f71ea527786de97d1a0cc0eacd1defc0985dcf6b3f17bb77dcfc8c34bec4dc5
          REQ
          python3 -m pip install --disable-pip-version-check --require-hashes \
            --only-binary=:all: -r "$RUNNER_TEMP/gate-requirements.txt"

      - name: Install actionlint (pinned release, sha256-verified)
        run: |
          set -euo pipefail
          ver=1.7.7
          sha256=023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757
          curl -fsSL --retry 3 -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ver}/actionlint_${ver}_linux_amd64.tar.gz"
          echo "${sha256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/actionlint-bin"
          tar -C "$RUNNER_TEMP/actionlint-bin" -xzf /tmp/actionlint.tar.gz actionlint
          echo "$RUNNER_TEMP/actionlint-bin" >> "$GITHUB_PATH"

      - name: Run the full registry self-test suite
        run: |
          set -euo pipefail
          # Every self-testing pipeline script — the same FULL suite worker-live.sh's
          # registry-selftest gate runs. A missing self-test fails the gate (fail closed).
          suite="policy-resolve.py route-resolve.py ready-issues.py curate-frontier.py dispatch-plan.py \
          plan-snapshot.py resolve-conflicts.py triage.py park_policy.py \
          dispatch-claim.py worker-pr.py worker-issue.py select-and-claim.py groom.py \
          account-usage.py usage-alert.py model-health.py plan-alert.py groom-alert.py pat-validity.py broker-refresh.py \
          backfill-provenance.py dashboard-gen.py trust-gate.py dispatch-secrets-guard.py"
          for s in $suite; do
            # An enrolled script that is MISSING is a hard failure (sol r3 on #227): the
            # silent [[ -f ]] skip would keep this gate green after deleting a security
            # script — the exact class the trust-gate outage exposed.
            if [[ ! -f "scripts/$s" ]]; then
              echo "::error::enrolled self-test script scripts/$s is missing"; exit 1
            fi
            if [[ -f "scripts/$s" ]]; then
              echo "== self-test $s =="
              python3 "scripts/$s" --self-test
            fi
          done
          echo "== self-test worker-live.sh =="
          bash scripts/worker-live.sh self-test
          echo "== self-test migrate-secrets.sh =="
          bash scripts/migrate-secrets.sh --self-test

      - name: bash -n every shell script
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in scripts/*.sh; do
            echo "== bash -n $f =="
            bash -n "$f"
          done

      - name: actionlint + yaml-parse every workflow
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            echo "== yaml-parse $f =="
            python3 -c 'import sys,yaml; yaml.safe_load(open(sys.argv[1]))' "$f"
          done
          echo "== actionlint =="
          actionlint -color

      - name: Assert every non-local action reference is pinned to a 40-hex commit
        run: |
          set -euo pipefail
          shopt -s nullglob
          # actionlint does NOT enforce commit-pinning, so a regression from a 40-hex pin to a
          # mutable tag would otherwise pass this required gate (sol audit #221). Walk every
          # parsed workflow and reject any non-local `uses:` whose ref is not exactly 40 hex
          # (docker refs must pin a sha256 digest). Scanning zero references is itself a
          # failure — a parser regression must not turn this assertion vacuous (fail closed).
          python3 - .github/workflows/*.yml .github/workflows/*.yaml <<'PY'
          import re, sys, yaml

          def walk(node):
              if isinstance(node, dict):
                  for key, value in node.items():
                      if key == "uses" and isinstance(value, str):
                          yield value
                      else:
                          yield from walk(value)
              elif isinstance(node, list):
                  for item in node:
                      yield from walk(item)

          total, bad = 0, []
          for path in sys.argv[1:]:
              with open(path, encoding="utf-8") as fh:
                  doc = yaml.safe_load(fh)
              for ref in walk(doc):
                  if ref.startswith("./"):
                      continue  # local action: already pinned by this PR's own commit
                  total += 1
                  if ref.startswith("docker://"):
                      ok = re.search(r"@sha256:[0-9a-f]{64}$", ref)
                  else:
                      ok = re.fullmatch(r"[^@\s]+@[0-9a-f]{40}", ref)
                  if not ok:
                      bad.append(f"{path}: uses: {ref}")
          for entry in bad:
              print(f"::error::action reference is not commit-pinned (need @<40-hex sha>): {entry}")
          if bad:
              sys.exit(1)
          if total == 0:
              print("::error::pin check scanned zero non-local action references (fail closed)")
              sys.exit(1)
          print(f"pin check OK: all {total} non-local 'uses:' references are 40-hex pinned")
          PY
