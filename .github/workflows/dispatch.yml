# [GPT-5.6] REG-4 privilege-separated dispatcher. PLAN executes protected public-target planner
# code with no secrets in its environment; CLAIM treats the PLAN artifact as hostile data before
# any mutation.
#
# The */10 cron below is the SINGLE scheduler for the issue drain AND the cross-provider
# review/fix loop: every review -> fix -> re-review -> arm transition is a durable-marker state
# the sweep re-derives each tick, so the loop's LIVENESS depends on this cron. It was enabled
# after the REG-4 pilot canary passed end-to-end (issues #2407–#2416 flowed through workers;
# PRs #2417–#2421 merged). "Retry next tick" is real only while this schedule stays on.
name: dispatch

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

permissions: {}

concurrency:
  group: registry-dispatcher
  cancel-in-progress: false

env:
  # Public discovery manifest only. CLAIM requires this set to exactly match enabled policy rows.
  DISPATCH_TARGET_REPOS: '["sparq-org/sparq"]'

jobs:
  plan:
    name: PLAN (unprivileged, secret-free target half)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # contents:read exists ONLY for the registry checkout in the assemble step below, which runs
    # AFTER every target-planner-code step has finished — the hostile target code never sees the
    # token (persist-credentials is off) or the registry tree (checked out later).
    permissions:
      contents: read
    steps:
      - name: Clone protected public targets without credentials
        env:
          TARGET_REPOS: ${{ env.DISPATCH_TARGET_REPOS }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dispatch-targets"
          python3 - "$RUNNER_TEMP/dispatch-targets/repos.txt" <<'PY'
          import json
          import os
          from pathlib import Path
          import re
          import sys

          targets = json.loads(os.environ["TARGET_REPOS"])
          if (not isinstance(targets, list) or not targets
                  or len(set(targets)) != len(targets)
                  or any(not isinstance(repo, str) or not re.fullmatch(
                      r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*", repo
                  ) for repo in targets)):
              raise SystemExit("public target manifest must be a non-empty unique owner/repo list")
          Path(sys.argv[1]).write_text("\n".join(targets) + "\n", encoding="utf-8")
          PY
          index=0
          while IFS= read -r repo; do
            target="$RUNNER_TEMP/dispatch-targets/$index"
            git clone --depth 1 "https://github.com/$repo.git" "$target"
            [[ -f "$target/scripts/ready-issues.py" && ! -L "$target/scripts/ready-issues.py" ]]
            [[ -f "$target/scripts/dispatch-plan.py" && ! -L "$target/scripts/dispatch-plan.py" ]]
            python3 "$target/scripts/ready-issues.py" --self-test
            python3 "$target/scripts/dispatch-plan.py" --self-test
            index=$((index + 1))
          done < "$RUNNER_TEMP/dispatch-targets/repos.txt"

      - name: Build ready + deferred issue rows and snapshot pull requests (target planner code)
        env:
          TARGET_ROOT: ${{ runner.temp }}/dispatch-targets
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/dispatch-targets/repos.txt" "$RUNNER_TEMP" <<'PY'
          import hashlib
          import importlib.util
          import json
          import os
          from pathlib import Path
          import re
          import subprocess
          import sys
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          repos_path, out_dir = sys.argv[1:]
          root = Path(os.environ["TARGET_ROOT"])
          repos = Path(repos_path).read_text(encoding="utf-8").splitlines()
          trusted_associations = {"OWNER", "MEMBER", "COLLABORATOR"}

          def api(path):
              request = Request(
                  "https://api.github.com" + path,
                  headers={"Accept": "application/vnd.github+json", "User-Agent": "reg4-plan"},
              )
              try:
                  with urlopen(request, timeout=30) as response:
                      return json.load(response)
              except (HTTPError, URLError, TimeoutError, json.JSONDecodeError) as exc:
                  raise SystemExit(f"public GitHub API read failed for {path.split('?')[0]}") from exc

          def paginated(path):
              items = []
              for page in range(1, 11):
                  separator = "&" if "?" in path else "?"
                  result = api(f"{path}{separator}per_page=100&page={page}")
                  if not isinstance(result, list):
                      raise SystemExit("public GitHub API returned a non-list page")
                  items.extend(result)
                  if len(result) < 100:
                      return items
              raise SystemExit("refusing a target snapshot at or above 1000 entries")

          def load_dispatch(path):
              spec = importlib.util.spec_from_file_location("target_dispatch_plan", path)
              if spec is None or spec.loader is None:
                  raise SystemExit("cannot load target dispatch-plan.py")
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              return module

          def label_names(issue):
              labels = issue.get("labels")
              if not isinstance(labels, list):
                  raise SystemExit("target issue labels are malformed")
              names = []
              for label in labels:
                  name = label.get("name") if isinstance(label, dict) else None
                  if not isinstance(name, str) or not name:
                      raise SystemExit("target issue carries a malformed label")
                  names.append(name)
              return sorted(set(names))

          def trusted(issue):
              author = issue.get("user", {}).get("login")
              association = str(issue.get("author_association", "")).upper()
              return (
                  isinstance(author, str)
                  and (author.endswith("[bot]") or association in trusted_associations)
              )

          def linked_issue_numbers(pulls):
              linked = set()
              for pull in pulls:
                  if not isinstance(pull, dict):
                      raise SystemExit("target pull-request entry is malformed")
                  head = pull.get("head", {}).get("ref", "")
                  body = pull.get("body") or ""
                  if not isinstance(head, str) or not isinstance(body, str):
                      raise SystemExit("target pull-request fields are malformed")
                  linked.update(int(number) for number in re.findall(
                      r"(?:^|/)issue-([1-9][0-9]*)-", head
                  ))
                  linked.update(int(number) for number in re.findall(
                      r"(?i)\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#([1-9][0-9]*)\b", body
                  ))
              return linked

          repositories = []
          for index, repo in enumerate(repos):
              target = root / str(index)
              dispatch = load_dispatch(target / "scripts" / "dispatch-plan.py")
              raw = [
                  issue for issue in paginated(f"/repos/{repo}/issues?state=open")
                  if isinstance(issue, dict) and "pull_request" not in issue
              ]
              if len(raw) >= 1000:
                  raise SystemExit("target issue snapshot may be truncated")
              open_numbers = {
                  issue.get("number") for issue in raw
                  if isinstance(issue.get("number"), int)
              }
              details = {}
              readiness_input = []
              for issue in raw:
                  number = issue.get("number")
                  body = issue.get("body") or ""
                  if (not isinstance(number, int) or number <= 0 or not isinstance(body, str)):
                      raise SystemExit("target issue fields are malformed")
                  labels = label_names(issue)
                  blockers = re.findall(r"[Bb]locked-by:\s*#([0-9]+)", body)
                  readiness_input.append({
                      "number": number,
                      "state": "OPEN",
                      "labels": labels,
                      "open_blockers": sum(int(blocker) in open_numbers for blocker in blockers),
                  })
                  details[number] = (issue, labels, body)

              pulls = paginated(f"/repos/{repo}/pulls?state=open")
              linked = linked_issue_numbers(pulls)
              ready = dispatch.compute_ready(readiness_input)
              ready = [
                  issue for issue in ready
                  if issue["number"] not in linked and trusted(details[issue["number"]][0])
              ]
              # Deferred-retry candidates (registry decision: a status:deferred issue with no
              # live lease and no linked open PR is retryable). The ready-engine gate is reused
              # by SWAPPING deferred->ready only for readiness computation; the emitted item
              # keeps the REAL labels plus deferred=true, and CLAIM re-validates + flips the
              # label on dispatch. The live-lease filter runs registry-side in the next step.
              taken = set()
              for issue in ready:
                  taken |= dispatch.packages_of(dispatch.labels_of(issue))
              retry_gated = {"status:blocked", "status:in-progress",
                             "status:in-progress-review", "status:untriaged", "trust:untrusted"}
              deferred_input = []
              for row in readiness_input:
                  labels = set(row["labels"])
                  number = row["number"]
                  if "status:deferred" not in labels or "status:ready" in labels:
                      continue
                  if labels & retry_gated or any(l.startswith("needs:") for l in labels):
                      continue
                  if number in linked or not trusted(details[number][0]):
                      continue
                  deferred_input.append({
                      **row,
                      "labels": sorted((labels - {"status:deferred"}) | {"status:ready"}),
                  })
              deferred_ready = dispatch.compute_ready(
                  deferred_input, in_progress_packages=taken)

              routing_doc = dispatch._routing_doc()
              flagged_rows = [(row, False) for row in dispatch.plan_dispatch(ready, routing_doc)]
              flagged_rows += [(row, True)
                               for row in dispatch.plan_dispatch(deferred_ready, routing_doc)]
              items = []
              for row, deferred in flagged_rows:
                  number = row.get("number")
                  issue, labels, body = details[number]
                  author = issue.get("user", {}).get("login")
                  if row.get("role") is None or row.get("agent") is None or not row.get("model_chain"):
                      raise SystemExit(f"target planner left {repo}#{number} unresolved")
                  items.append({
                      **row,
                      "labels": labels,
                      "author": author,
                      "body_sha": hashlib.sha256(body.encode()).hexdigest(),
                      "deferred": deferred,
                  })
              items.sort(key=lambda item: (item["priority"], item["number"]))
              target_sha = subprocess.run(
                  ["git", "-C", str(target), "rev-parse", "HEAD"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout.strip()
              if not re.fullmatch(r"[0-9a-f]{40}", target_sha):
                  raise SystemExit("target checkout returned an unsafe commit sha")
              repositories.append({"target_repo": repo, "target_sha": target_sha, "items": items})

              # Field-selected PR snapshot + issue-label map for the registry-side review
              # enumeration in the assemble step (avoids a second API sweep there).
              snapshot = []
              for pull in pulls:
                  head = pull.get("head") or {}
                  user = pull.get("user") or {}
                  snapshot.append({
                      "number": pull.get("number"),
                      "state": pull.get("state"),
                      "draft": pull.get("draft"),
                      "body": pull.get("body") or "",
                      "labels": [label.get("name") for label in (pull.get("labels") or [])
                                 if isinstance(label, dict)],
                      "head": {"ref": head.get("ref"), "sha": head.get("sha"),
                               "repo": {"full_name": (head.get("repo") or {}).get("full_name")}},
                      "user": {"login": user.get("login"), "type": user.get("type")},
                  })
              Path(out_dir, f"pulls-{index}.json").write_text(
                  json.dumps(snapshot), encoding="utf-8")
              Path(out_dir, f"issue-labels-{index}.json").write_text(
                  json.dumps({str(number): details[number][1] for number in details}),
                  encoding="utf-8")

          Path(out_dir, "issue-plan.json").write_text(
              json.dumps({"repositories": repositories}, indent=2, sort_keys=True) + "\n",
              encoding="utf-8")
          print(f"PLAN rows: {sum(len(repo['items']) for repo in repositories)} issue item(s)")
          PY

      # The registry is checked out only NOW — after every step that executes target planner code
      # — so hostile target code can never read the registry tree, and no token ever coexists
      # with it in a step environment.
      - name: Checkout private registry helpers (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Assemble and validate the v2 plan (registry code only, no tokens, local data)
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP" "$RUNNER_TEMP/plan.json" <<'PY'
          import importlib.util
          import json
          from pathlib import Path
          import re
          import sys
          import time
          from datetime import datetime, timezone

          out_dir, plan_path = sys.argv[1:]
          registry = Path("registry")

          def load(name, path):
              spec = importlib.util.spec_from_file_location(name, path)
              if spec is None or spec.loader is None:
                  raise SystemExit(f"cannot load registry helper {path}")
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              return module

          claim_mod = load("registry_dispatch_claim", registry / "scripts" / "dispatch-claim.py")

          intermediate = json.loads(Path(out_dir, "issue-plan.json").read_text(encoding="utf-8"))
          leases_path = registry / "data" / "leases.json"
          leases = []
          if leases_path.is_file():
              leases = json.loads(leases_path.read_text(encoding="utf-8")).get("leases") or []
          now = int(time.time())

          review_items = []
          for index, repository in enumerate(intermediate["repositories"]):
              repo = repository["target_repo"]
              owner, name = repo.split("/", 1)
              pulls = json.loads(Path(out_dir, f"pulls-{index}.json").read_text(encoding="utf-8"))
              issue_labels = {
                  int(number): labels for number, labels in json.loads(
                      Path(out_dir, f"issue-labels-{index}.json").read_text(encoding="utf-8")
                  ).items()
              }
              # Registry-recorded provenance is the ROOT OF TRUST: a PR with no record here is
              # never enumerated for review (fail closed). The target model has no registry token.
              provenance = {}
              provenance_dir = registry / "orchestration" / "provenance"
              if provenance_dir.is_dir():
                  pattern = re.compile(rf"{re.escape(owner)}--{re.escape(name)}--pr([1-9][0-9]*)\.json")
                  for record_path in sorted(provenance_dir.iterdir()):
                      match = pattern.fullmatch(record_path.name)
                      if not match:
                          continue
                      try:
                          provenance[int(match.group(1))] = json.loads(
                              record_path.read_text(encoding="utf-8"))
                      except (OSError, json.JSONDecodeError):
                          continue
              # LABEL-terminal states (review:needs-user / review:pass) are excluded inside the
              # enumerator. Round-budget exhaustion is NOT excluded here: CLAIM re-derives the
              # live round count and applies the terminal needs-user transition itself, so a PR
              # whose final outcome mutation crashed converges to a loud human hand-off.
              review_items.extend(claim_mod.enumerate_review_items(
                  repo, pulls, provenance, leases, issue_labels, now))
              # Deferred-retry items with a still-live lease are dropped registry-side.
              repository["items"] = claim_mod.filter_deferred_items(
                  repository["items"], repo, leases, now)

          document = {
              "schema": "registry-dispatch-plan/v2",
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "repositories": intermediate["repositories"],
              "review_items": review_items,
          }
          # PLAN-side inline set-equality checks (CLAIM repeats a stricter independent
          # re-validation of the artifact as hostile data before any mutation).
          if set(document) != {"schema", "generated_at", "repositories", "review_items"}:
              raise SystemExit("plan schema top-level fields are invalid")
          if document["schema"] != "registry-dispatch-plan/v2":
              raise SystemExit("plan schema version is invalid")
          expected_item_fields = {"number", "priority", "package", "role", "model_chain",
                                  "agent", "escalate", "labels", "author", "body_sha", "deferred"}
          for repository in document["repositories"]:
              if set(repository) != {"target_repo", "target_sha", "items"}:
                  raise SystemExit("plan repository fields are invalid")
              for item in repository["items"]:
                  if set(item) != expected_item_fields:
                      raise SystemExit("plan item fields are invalid")
          expected_review_fields = {"pr_number", "head_sha", "state", "impl_provider", "repo",
                                    "package", "security"}
          for item in document["review_items"]:
              if set(item) != expected_review_fields:
                  raise SystemExit("plan review item fields are invalid")
          # Full structural validation with the same validator CLAIM uses (strictly stronger
          # than a hand-rolled inline copy, and available here because the registry is local).
          claim_mod.validate_plan(document)
          Path(plan_path).write_text(
              json.dumps(document, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"PLAN complete: "
                f"{sum(len(repo['items']) for repo in document['repositories'])} issue item(s), "
                f"{len(review_items)} review item(s)")
          PY

      - name: Upload immutable plan artifact (pinned)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dispatch-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/plan.json
          if-no-files-found: error
          retention-days: 1

  claim:
    name: CLAIM (validate, lease, launch)
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: write
      issues: write   # write: upsert the rolling worker-availability alert issue (usage-alert.py)
    steps:
      - name: Download PLAN artifact (pinned)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dispatch-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan

      - name: Checkout private registry helpers (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      # The deferred-retry label flips, review needs-user escalations, and missed-fix markers are
      # TARGET mutations, so CLAIM mints its own target-scoped App token. Single-target
      # assumption: the mint covers the first (only) manifest entry; extend to a loop if the
      # manifest ever grows. A mint failure only skips those paths (issue dispatch continues).
      - name: Resolve target owner for the App token
        id: target
        env:
          TARGET_REPOS: ${{ env.DISPATCH_TARGET_REPOS }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re

          targets = json.loads(os.environ["TARGET_REPOS"])
          repo = targets[0]
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*", repo):
              raise SystemExit("unsafe target repo in the manifest")
          owner, name = repo.split("/", 1)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"owner={owner}\n")
              output.write(f"name={name}\n")
          PY

      - name: Mint target-scoped App token (issue/PR mutations only)
        id: app-token
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ steps.target.outputs.owner }}
          repositories: ${{ steps.target.outputs.name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Probe live account usage (usage-aware dispatch; tokens never printed)
        continue-on-error: true   # a probe failure must never block dispatch — it falls back to the static cap
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          set -uo pipefail
          python3 registry/scripts/account-usage.py > "$RUNNER_TEMP/usage.json" 2>/dev/null || printf '{}' > "$RUNNER_TEMP/usage.json"
          python3 -c "import json,os; d=json.load(open(os.path.join(os.environ['RUNNER_TEMP'],'usage.json'))); print('usage-probe: %d account(s) with live usage' % len(d))" || true

      - name: Strictly validate, CAS claim, and dispatch live workers + review/fix runs
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BOT_LOGIN: ${{ steps.app-token.outputs.app-slug && format('{0}[bot]', steps.app-token.outputs.app-slug) || '' }}
          REGISTRY_REPO: ${{ github.repository }}
          REGISTRY_ALERT_TOKEN: ${{ github.token }}
          # Privacy routing (locked decision 22c): a maintainer-set ALERT_REPO (+ ALERT_TOKEN
          # with access to it) sends account-enumerating ops alerts to a PRIVATE repo instead of
          # this public registry; unset falls back to REGISTRY_REPO + the workflow token.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
          # Salt for the provenance account-hash comparison (locked decision 22a). This job runs
          # registry code only — the salt never enters a job that executes target code.
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          WORKFLOW_REF: ${{ github.ref_name }}
          WORKER_USAGE_FILE: ${{ runner.temp }}/usage.json
        run: |
          set -euo pipefail
          printf '::add-mask::%s\n' "$GH_TOKEN"
          [[ -z "$TARGET_GH_TOKEN" ]] || printf '::add-mask::%s\n' "$TARGET_GH_TOKEN"
          python3 registry/scripts/dispatch-claim.py \
            --plan plan/plan.json \
            --policy-file registry/policy/repos.toml \
            --registry-repo "$GITHUB_REPOSITORY" \
            --registry-root registry \
            --bot-login "$BOT_LOGIN" \
            --workflow-ref "$WORKFLOW_REF"

      # FAIL-LOUD maintainer alert: opposite posture to the fail-closed dispatcher. Runs even if the
      # claim step above skipped everything (all accounts capped), so degraded throughput is never
      # silent. Upserts ONE rolling `ops-alert` issue @-mentioning the maintainer; never blocks dispatch.
      - name: Alert maintainer if worker accounts are unavailable
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          WORKER_USAGE_FILE: ${{ runner.temp }}/usage.json
          USAGE_SAFETY_MARGIN: '0.10'
          MAINTAINER_HANDLE: jeswr
        run: |
          set -uo pipefail
          gh label create ops-alert -R "$REGISTRY_REPO" --color d73a4a \
            --description "Autonomous worker availability alert (maintainer action)" 2>/dev/null || true
          python3 registry/scripts/usage-alert.py
