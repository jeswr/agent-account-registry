# [GPT-5.6] REG-4 privilege-separated dispatcher. PLAN executes protected public-target planner
# code with no secrets in its environment; CLAIM treats the PLAN artifact as hostile data before
# any mutation.
#
# The */10 cron below is the SINGLE scheduler for the issue drain AND the cross-provider
# review/fix loop: every review -> fix -> re-review -> arm transition is a durable-marker state
# the sweep re-derives each tick, so the loop's LIVENESS depends on this cron. It was enabled
# after the REG-4 pilot canary passed end-to-end (issues #2407–#2416 flowed through workers;
# PRs #2417–#2421 merged). "Retry next tick" is real only while this schedule stays on.
name: dispatch

on:
  # workflow_dispatch is REQUIRED — it is the worker/review doorbell (see the workflow_run note
  # below and the `doorbell` jobs in worker.yml / review-fix.yml). It ALSO accepts an arbitrary
  # branch/tag ref and GitHub runs the workflow file AT that ref, so a collaborator could manually
  # dispatch a modified branch copy of this workflow. That is why every secret-bearing job here
  # (claim, plan-alert) is bound to the default-branch-only `dispatch-secrets` environment: it is
  # the only server-side lever that survives an attacker-controlled workflow file (issue #101).
  # Because that lever lives in REPO SETTINGS, the `secrets-guard` job below verifies it is
  # actually in effect every tick, fail closed, before any secret-bearing job runs.
  workflow_dispatch:
  schedule:
    # Explicit minutes (not */10): GitHub degrades wildcard schedules under load — measured
    # 2026-07-17: */10 fired at 12:06 and 12:37 then went silent for 25+ min. Explicit-minute
    # schedules are throttled less aggressively, and the off-peak offset (:03 not :00) avoids
    # the top-of-minute stampede. The cron is now the BACKSTOP; the doorbell below is the
    # primary liveness signal.
    - cron: '3,13,23,33,43,53 * * * *'
  # NOTE: this workflow_run trigger is effectively DEAD for pipeline-initiated runs — worker
  # and review-fix runs are started via the repo GITHUB_TOKEN, and GitHub suppresses
  # workflow-triggering events from GITHUB_TOKEN-initiated runs (measured 2026-07-17: zero
  # deliveries). It is kept only for manually-started worker/review runs. The REAL doorbell
  # is the explicit `doorbell` job at the end of worker.yml / review-fix.yml (workflow_dispatch
  # API calls are the documented exception to the suppression). The registry-dispatcher
  # concurrency group coalesces bursts either way.
  workflow_run:
    workflows: [worker, review-fix]
    types: [completed]

permissions: {}

concurrency:
  group: registry-dispatcher
  cancel-in-progress: false

env:
  # Public discovery manifest only. CLAIM requires this set to exactly match enabled policy rows.
  # jeswr/agent-account-registry is onboarded as a SECOND self-managed target (its own pipeline);
  # its issues flow triage -> ready -> worker -> draft PR -> cross-provider review -> arm exactly
  # like sparq. The registry App must be installed on the jeswr owner (the registry worker/review
  # canary runs reaching the model stage confirm it is); CLAIM mints a PER-OWNER token map so the
  # registry-owner disarm/needs-user/deferred-label mutations use the jeswr-scoped token, not the
  # sparq-org one (defects #1,#5 — the single-token mint 404-looped every registry mutation).
  DISPATCH_TARGET_REPOS: '["sparq-org/sparq", "jeswr/agent-account-registry"]'

jobs:
  plan:
    name: PLAN (unprivileged, secret-free target half)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # contents:read exists ONLY for (a) the snapshot-helper registry checkout + the authenticated
    # snapshot step it feeds, both of which run BEFORE any target code executes (the token lives
    # in the snapshot step's own env), and (b) the registry checkout in the assemble step, which
    # runs AFTER every target-planner-code step has finished. The hostile target code itself
    # never sees a token (its steps have no token env and persist-credentials is off), and no
    # registry code that runs AFTER target code reads a tree that existed while it ran (the
    # assemble step uses its own later checkout, so the early snapshot copy is tamper-inert).
    permissions:
      contents: read
    steps:
      - name: Resolve the public target manifest
        env:
          TARGET_REPOS: ${{ env.DISPATCH_TARGET_REPOS }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/dispatch-targets"
          python3 - "$RUNNER_TEMP/dispatch-targets/repos.txt" <<'PY'
          import json
          import os
          from pathlib import Path
          import re
          import sys

          targets = json.loads(os.environ["TARGET_REPOS"])
          if (not isinstance(targets, list) or not targets
                  or len(set(targets)) != len(targets)
                  or any(not isinstance(repo, str) or not re.fullmatch(
                      r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*", repo
                  ) for repo in targets)):
              raise SystemExit("public target manifest must be a non-empty unique owner/repo list")
          Path(sys.argv[1]).write_text("\n".join(targets) + "\n", encoding="utf-8")
          PY

      # Registry snapshot-helper checkout — BEFORE the snapshot step (and every target-code
      # step) so the authenticated read runs REGISTRY code with a real self-test
      # (plan-snapshot.py, extracted from the old heredoc after run 29617040167's whole-sweep
      # kill). REG-4 note: this copy is consumed ONLY by the snapshot step below, which
      # precedes all target-code execution; the assemble step keeps its OWN later checkout, so
      # target planner code can never influence registry code that runs after it.
      - name: Checkout registry snapshot helper (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry-snapshot
          persist-credentials: false

      # AUTHENTICATED, registry-inline snapshot — runs BEFORE any target code executes, so the
      # token (repo-scoped github.token, read-only against the public targets) never coexists
      # with hostile target planner code; the planner step below consumes only the local JSON
      # files this writes. Authenticated reads remove the 60/hr shared-runner-IP unauthenticated
      # ceiling. plan-snapshot.py scopes every per-PR failure to the ITEM (an oversized
      # check-run listing skips THAT PR with a recorded reason instead of failing the sweep —
      # the run-29617040167 fix) and reads check runs gate-filtered (check_name=gate, the
      # d2c0dd0 pattern) so merge-queue churn heads with hundreds of runs stay one small page.
      - name: Snapshot target issues and pull requests (authenticated, registry-inline only)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 registry-snapshot/scripts/plan-snapshot.py --self-test
          python3 registry-snapshot/scripts/plan-snapshot.py \
            "$RUNNER_TEMP/dispatch-targets/repos.txt" "$RUNNER_TEMP"

      - name: Clone protected public targets without credentials
        run: |
          set -euo pipefail
          index=0
          while IFS= read -r repo; do
            target="$RUNNER_TEMP/dispatch-targets/$index"
            git clone --depth 1 "https://github.com/$repo.git" "$target"
            [[ -f "$target/scripts/ready-issues.py" && ! -L "$target/scripts/ready-issues.py" ]]
            [[ -f "$target/scripts/dispatch-plan.py" && ! -L "$target/scripts/dispatch-plan.py" ]]
            python3 "$target/scripts/ready-issues.py" --self-test
            python3 "$target/scripts/dispatch-plan.py" --self-test
            index=$((index + 1))
          done < "$RUNNER_TEMP/dispatch-targets/repos.txt"

      - name: Build ready + deferred issue rows and snapshot pull requests (target planner code)
        env:
          TARGET_ROOT: ${{ runner.temp }}/dispatch-targets
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/dispatch-targets/repos.txt" "$RUNNER_TEMP" <<'PY'
          import hashlib
          import importlib.util
          import json
          import os
          from pathlib import Path
          import re
          import subprocess
          import sys

          repos_path, out_dir = sys.argv[1:]
          root = Path(os.environ["TARGET_ROOT"])
          repos = Path(repos_path).read_text(encoding="utf-8").splitlines()
          trusted_associations = {"OWNER", "MEMBER", "COLLABORATOR"}

          def snapshot(kind, index):
              # Written by the authenticated registry-inline snapshot step (this step deliberately
              # holds NO token because it executes target planner code — REG-4 separation).
              document = json.loads(
                  Path(out_dir, f"raw-{kind}-{index}.json").read_text(encoding="utf-8"))
              if not isinstance(document, dict) or document.get("complete") is not True \
                      or not isinstance(document.get("items"), list):
                  raise SystemExit(f"target {kind} snapshot is missing or incomplete")
              return document["items"]

          def load_dispatch(path):
              spec = importlib.util.spec_from_file_location("target_dispatch_plan", path)
              if spec is None or spec.loader is None:
                  raise SystemExit("cannot load target dispatch-plan.py")
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              return module

          def label_names(issue):
              labels = issue.get("labels")
              if not isinstance(labels, list):
                  raise SystemExit("target issue labels are malformed")
              names = []
              for label in labels:
                  name = label.get("name") if isinstance(label, dict) else None
                  if not isinstance(name, str) or not name:
                      raise SystemExit("target issue carries a malformed label")
                  names.append(name)
              return sorted(set(names))

          def trusted(issue):
              author = issue.get("user", {}).get("login")
              association = str(issue.get("author_association", "")).upper()
              return (
                  isinstance(author, str)
                  and (author.endswith("[bot]") or association in trusted_associations)
              )

          def linked_issue_numbers(pulls):
              linked = set()
              for pull in pulls:
                  if not isinstance(pull, dict):
                      raise SystemExit("target pull-request entry is malformed")
                  head = pull.get("head", {}).get("ref", "")
                  body = pull.get("body") or ""
                  if not isinstance(head, str) or not isinstance(body, str):
                      raise SystemExit("target pull-request fields are malformed")
                  linked.update(int(number) for number in re.findall(
                      r"(?:^|/)issue-([1-9][0-9]*)-", head
                  ))
                  linked.update(int(number) for number in re.findall(
                      r"(?i)\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#([1-9][0-9]*)\b", body
                  ))
              return linked

          repositories = []
          for index, repo in enumerate(repos):
              target = root / str(index)
              dispatch = load_dispatch(target / "scripts" / "dispatch-plan.py")
              raw = [
                  issue for issue in snapshot("issues", index)
                  if isinstance(issue, dict) and "pull_request" not in issue
              ]
              open_numbers = {
                  issue.get("number") for issue in raw
                  if isinstance(issue.get("number"), int)
              }
              details = {}
              readiness_input = []
              for issue in raw:
                  number = issue.get("number")
                  body = issue.get("body") or ""
                  if (not isinstance(number, int) or number <= 0 or not isinstance(body, str)):
                      raise SystemExit("target issue fields are malformed")
                  labels = label_names(issue)
                  blockers = re.findall(r"[Bb]locked-by:\s*#([0-9]+)", body)
                  readiness_input.append({
                      "number": number,
                      "state": "OPEN",
                      "labels": labels,
                      "open_blockers": sum(int(blocker) in open_numbers for blocker in blockers),
                  })
                  details[number] = (issue, labels, body)

              pulls = snapshot("pulls", index)
              linked = linked_issue_numbers(pulls)
              ready = dispatch.compute_ready(readiness_input)
              ready = [
                  issue for issue in ready
                  if issue["number"] not in linked and trusted(details[issue["number"]][0])
              ]
              # Deferred-retry candidates (registry decision: a status:deferred issue with no
              # live lease and no linked open PR is retryable). The ready-engine gate is reused
              # by SWAPPING deferred->ready only for readiness computation; the emitted item
              # keeps the REAL labels plus deferred=true, and CLAIM re-validates + flips the
              # label on dispatch. The live-lease filter runs registry-side in the next step.
              taken = set()
              for issue in ready:
                  taken |= dispatch.packages_of(dispatch.labels_of(issue))
              retry_gated = {"status:blocked", "status:in-progress",
                             "status:in-progress-review", "status:untriaged", "trust:untrusted"}
              deferred_input = []
              for row in readiness_input:
                  labels = set(row["labels"])
                  number = row["number"]
                  if "status:deferred" not in labels or "status:ready" in labels:
                      continue
                  if labels & retry_gated or any(l.startswith("needs:") for l in labels):
                      continue
                  if number in linked or not trusted(details[number][0]):
                      continue
                  deferred_input.append({
                      **row,
                      "labels": sorted((labels - {"status:deferred"}) | {"status:ready"}),
                  })
              deferred_ready = dispatch.compute_ready(
                  deferred_input, in_progress_packages=taken)

              routing_doc = dispatch._routing_doc()
              flagged_rows = [(row, False) for row in dispatch.plan_dispatch(ready, routing_doc)]
              flagged_rows += [(row, True)
                               for row in dispatch.plan_dispatch(deferred_ready, routing_doc)]
              items = []
              for row, deferred in flagged_rows:
                  number = row.get("number")
                  issue, labels, body = details[number]
                  author = issue.get("user", {}).get("login")
                  if row.get("role") is None or row.get("agent") is None or not row.get("model_chain"):
                      raise SystemExit(f"target planner left {repo}#{number} unresolved")
                  items.append({
                      **row,
                      "labels": labels,
                      "author": author,
                      "body_sha": hashlib.sha256(body.encode()).hexdigest(),
                      "deferred": deferred,
                  })
              items.sort(key=lambda item: (item["priority"], item["number"]))
              target_sha = subprocess.run(
                  ["git", "-C", str(target), "rev-parse", "HEAD"],
                  capture_output=True,
                  text=True,
                  check=True,
              ).stdout.strip()
              if not re.fullmatch(r"[0-9a-f]{40}", target_sha):
                  raise SystemExit("target checkout returned an unsafe commit sha")
              repositories.append({"target_repo": repo, "target_sha": target_sha, "items": items})

              # Field-selected PR snapshot + issue-label map for the registry-side review
              # enumeration in the assemble step (avoids a second API sweep there).
              # NB: named pr_snapshot, NOT `snapshot` — that would shadow the snapshot() reader
              # and make the SECOND target's iteration call a list (the exact two-target
              # TypeError that broke the first multi-target sweep, 2026-07-17).
              pr_snapshot = []
              for pull in pulls:
                  head = pull.get("head") or {}
                  user = pull.get("user") or {}
                  pr_snapshot.append({
                      "number": pull.get("number"),
                      "state": pull.get("state"),
                      "draft": pull.get("draft"),
                      "body": pull.get("body") or "",
                      "labels": [label.get("name") for label in (pull.get("labels") or [])
                                 if isinstance(label, dict)],
                      "head": {"ref": head.get("ref"), "sha": head.get("sha"),
                               "repo": {"full_name": (head.get("repo") or {}).get("full_name")}},
                      "user": {"login": user.get("login"), "type": user.get("type")},
                  })
              Path(out_dir, f"pulls-{index}.json").write_text(
                  json.dumps(pr_snapshot), encoding="utf-8")
              Path(out_dir, f"issue-labels-{index}.json").write_text(
                  json.dumps({str(number): details[number][1] for number in details}),
                  encoding="utf-8")

          Path(out_dir, "issue-plan.json").write_text(
              json.dumps({"repositories": repositories}, indent=2, sort_keys=True) + "\n",
              encoding="utf-8")
          print(f"PLAN rows: {sum(len(repo['items']) for repo in repositories)} issue item(s)")
          PY

      # The registry is checked out only NOW — after every step that executes target planner code
      # — so hostile target code can never read the registry tree, and no token ever coexists
      # with it in a step environment.
      - name: Checkout private registry helpers (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      # The mutable data plane (data/leases.json) lives on the unprotected `ledger` branch
      # (issue #28): a master checkout no longer carries fresh lease state. This checkout fails
      # the job LOUDLY if the ledger branch is missing — never plan against a silently-empty
      # lease view.
      - name: Checkout the data-plane ledger branch (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry-ledger
          ref: ledger
          persist-credentials: false

      # Trust guard (review round 1): the ledger branch is DATA-ONLY by design — a
      # `workflow_dispatch` at `ref: ledger` would execute the LEDGER copy of a workflow file,
      # so its non-execution property holds only while no executable content exists at that ref.
      # Fail LOUD if that ever erodes.
      - name: Ledger checkout is data-only (trust guard)
        run: |
          set -euo pipefail
          test ! -e registry-ledger/.github
          test ! -e registry-ledger/scripts

      - name: Assemble and validate the v2 plan (registry code only, no tokens, local data)
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP" "$RUNNER_TEMP/plan.json" <<'PY'
          import importlib.util
          import json
          from pathlib import Path
          import re
          import sys
          import time
          from datetime import datetime, timezone

          out_dir, plan_path = sys.argv[1:]
          registry = Path("registry")

          def load(name, path):
              spec = importlib.util.spec_from_file_location(name, path)
              if spec is None or spec.loader is None:
                  raise SystemExit(f"cannot load registry helper {path}")
              module = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(module)
              return module

          claim_mod = load("registry_dispatch_claim", registry / "scripts" / "dispatch-claim.py")

          intermediate = json.loads(Path(out_dir, "issue-plan.json").read_text(encoding="utf-8"))
          # Lease state comes from the data-plane `ledger` branch checkout (issue #28) — the
          # master copy under registry/data/ is a frozen tombstone. Fail LOUD if absent: a
          # silently-empty lease view would double-book every account.
          leases_path = Path("registry-ledger") / "data" / "leases.json"
          if not leases_path.is_file():
              raise SystemExit(
                  "ledger-branch checkout is missing data/leases.json — the `ledger` data-plane "
                  "branch is required (issue #28; see data/README.md on master)")
          leases = json.loads(leases_path.read_text(encoding="utf-8")).get("leases") or []
          now = int(time.time())

          review_items = []
          disarm_items = []
          snapshot_skips = []
          for index, repository in enumerate(intermediate["repositories"]):
              repo = repository["target_repo"]
              owner, name = repo.split("/", 1)
              pulls = json.loads(Path(out_dir, f"pulls-{index}.json").read_text(encoding="utf-8"))
              # Per-PR CI/merge status from the authenticated snapshot, interpreted by the PURE
              # dispatch-claim helpers (hostile-tolerant: malformed records degrade to unknown,
              # and unknown never emits a repair/disarm item).
              pr_status = {}
              raw_skips = []
              status_path = Path(out_dir, f"raw-prstatus-{index}.json")
              if status_path.is_file():
                  raw_status = json.loads(status_path.read_text(encoding="utf-8"))
                  if (isinstance(raw_status, dict) and raw_status.get("complete") is True
                          and isinstance(raw_status.get("items"), dict)):
                      pr_status = {
                          int(number): claim_mod.pr_ci_status(record)
                          for number, record in raw_status["items"].items()
                          if str(number).isdigit()
                      }
                      if isinstance(raw_status.get("skips"), list):
                          raw_skips = raw_status["skips"]
              # PLAN-side per-item snapshot skips (run 29617040167): a PR whose CI/merge
              # snapshot was oversized/unreadable carries a reason instead of killing the
              # sweep. Two tiers (PR #60 round-1): a pre-detail skip has NO pr_status
              # record (every snapshot-derived admission stands down); a check-runs-* skip
              # ships a DEGRADED record too — pr_ci_status forces gate=missing on it, so
              # the gate-dependent admissions (ci-fix, stranded) stand down while the
              # detail-derived ones (needs-rebase, the #42 disarm net) still evaluate.
              # CLAIM folds these rows into the dispatch summary.
              for skip in raw_skips:
                  if not isinstance(skip, dict):
                      continue
                  skip_number = skip.get("pr_number")
                  skip_reason = skip.get("reason")
                  if not isinstance(skip_number, int) or not isinstance(skip_reason, str):
                      continue
                  print(f"SNAPSHOT skip {repo}#{skip_number}: {skip_reason}")
                  snapshot_skips.append(
                      {"repo": repo, "pr_number": skip_number, "reason": skip_reason})
              issue_labels = {
                  int(number): labels for number, labels in json.loads(
                      Path(out_dir, f"issue-labels-{index}.json").read_text(encoding="utf-8")
                  ).items()
              }
              # Registry-recorded provenance is the ROOT OF TRUST: a PR with no record here is
              # never enumerated for review (fail closed). The target model has no registry token.
              # Records live on the `ledger` data-plane branch (issue #96 — master's required
              # `gate` check rejects every direct contents-API PUT, so post-outage records land
              # ONLY there); the master-checkout copies remain the legacy fallback for
              # pre-outage records (<= sparq#2542). Iterated legacy-first so a ledger record
              # for the same PR wins any collision.
              provenance = {}
              pattern = re.compile(rf"{re.escape(owner)}--{re.escape(name)}--pr([1-9][0-9]*)\.json")
              for provenance_dir in (registry / "orchestration" / "provenance",
                                     Path("registry-ledger") / "orchestration" / "provenance"):
                  if not provenance_dir.is_dir():
                      continue
                  for record_path in sorted(provenance_dir.iterdir()):
                      match = pattern.fullmatch(record_path.name)
                      if not match:
                          continue
                      try:
                          provenance[int(match.group(1))] = json.loads(
                              record_path.read_text(encoding="utf-8"))
                      except (OSError, json.JSONDecodeError):
                          continue
              # Human-owned holds (review:needs-user / needs:user on the PR, needs:* on the
              # source issue) are excluded inside the enumerator, as are label-terminal states.
              # Round-budget exhaustion is NOT excluded here: CLAIM re-derives the live round
              # count and applies the terminal needs-user transition itself, so a PR whose
              # final outcome mutation crashed converges to a loud human hand-off.
              review_items.extend(claim_mod.enumerate_review_items(
                  repo, pulls, provenance, leases, issue_labels, now, pr_status=pr_status))
              # Armed-SHA-mismatch safety invariant (issue #42): CLAIM disarms these FIRST each
              # sweep, re-deriving every precondition live (matching SHAs are never disarmed).
              disarm_items.extend(claim_mod.enumerate_disarm_items(
                  repo, pulls, pr_status, provenance))
              # Deferred-retry items with a still-live lease are dropped registry-side, then the
              # busy-area union over ALL open worker PRs (issue #27) keeps impl items out of any
              # crate with an in-flight review-loop PR. The busy partition reads the SAME
              # provenance linkage and the SAME per-PR arm state as the enumerator above
              # (round-2 P1/P2, drafts-only since round 3, coherent-detail-confirmed since
              # round 4): a human-parked PR frees its crate only when it is a provably-inert
              # DRAFT whose NEWER pr_status detail record (the pulls listing predates the
              # per-PR detail reads) is head-matched, unlatched AND itself confirms draft —
              # a missing/incoherent/non-draft detail stays BUSY (the split-snapshot race:
              # a draft that flipped ready between the two reads must never free a crate it
              # can merge into); parked NON-drafts stay busy unconditionally (queue state is
              # GraphQL-only, unprovable from this snapshot) — and a PR with missing/
              # divergent linkage reserves fail-closed. CLAIM re-proves each item's crate
              # against the LIVE pull listing again right before launch (dispatch-claim.py
              # revalidate_items_against_live_pulls closes the PLAN->CLAIM window).
              # [round-5 P1] `leases`/`now` feed the CROSS-LANE lease partition: any live
              # sibling lease (impl `<repo>#<issue>`, `review:`/`fix:`) on an item's package
              # defers it — the lanes share ONE crate-ownership view (the same ledger the
              # enumerator's superseded-until-sibling-resolves exclusion reads).
              repository["items"] = claim_mod.filter_busy_area_items(
                  claim_mod.filter_deferred_items(repository["items"], repo, leases, now),
                  repo, pulls, issue_labels, provenance, pr_status, leases, now)

          snapshot_skips.sort(key=lambda skip: (skip["repo"], skip["pr_number"]))
          document = {
              "schema": "registry-dispatch-plan/v4",
              "generated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "repositories": intermediate["repositories"],
              "review_items": review_items,
              "disarm_items": disarm_items,
              "snapshot_skips": snapshot_skips,
          }
          # GLOBAL (repo, pr_number) order via the SHARED, self-tested helper (sol r2 on
          # #233): per-repo policy-order assembly inverts lexicographically with a second
          # active target; the sort must be the exact code the self-test exercises.
          claim_mod.normalize_plan_order(document)
          # PLAN-side inline set-equality checks (CLAIM repeats a stricter independent
          # re-validation of the artifact as hostile data before any mutation).
          if set(document) != {"schema", "generated_at", "repositories", "review_items",
                               "disarm_items", "snapshot_skips"}:
              raise SystemExit("plan schema top-level fields are invalid")
          if document["schema"] != "registry-dispatch-plan/v4":
              raise SystemExit("plan schema version is invalid")
          expected_item_fields = {"number", "priority", "package", "role", "model_chain",
                                  "agent", "escalate", "labels", "author", "body_sha", "deferred"}
          for repository in document["repositories"]:
              if set(repository) != {"target_repo", "target_sha", "items"}:
                  raise SystemExit("plan repository fields are invalid")
              for item in repository["items"]:
                  if set(item) != expected_item_fields:
                      raise SystemExit("plan item fields are invalid")
          expected_review_fields = {"pr_number", "head_sha", "state", "impl_provider", "repo",
                                    "package", "security", "context"}
          for item in document["review_items"]:
              if set(item) != expected_review_fields:
                  raise SystemExit("plan review item fields are invalid")
          expected_disarm_fields = {"pr_number", "head_sha", "reviewed_sha", "repo"}
          for item in document["disarm_items"]:
              if set(item) != expected_disarm_fields:
                  raise SystemExit("plan disarm item fields are invalid")
          expected_skip_fields = {"repo", "pr_number", "reason"}
          for item in document["snapshot_skips"]:
              if set(item) != expected_skip_fields:
                  raise SystemExit("plan snapshot skip fields are invalid")
          # Full structural validation with the same validator CLAIM uses (strictly stronger
          # than a hand-rolled inline copy, and available here because the registry is local).
          claim_mod.validate_plan(document)
          Path(plan_path).write_text(
              json.dumps(document, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(f"PLAN complete: "
                f"{sum(len(repo['items']) for repo in document['repositories'])} issue item(s), "
                f"{len(review_items)} review item(s), {len(disarm_items)} disarm item(s), "
                f"{len(snapshot_skips)} snapshot skip(s)")
          PY

      - name: Upload immutable plan artifact (pinned)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dispatch-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/plan.json
          if-no-files-found: error
          retention-days: 1

  # SECRET-EXFIL SETTINGS GUARD (issue #101, review round 1 on the #101 PR). The
  # `dispatch-secrets` environment binding on CLAIM / plan-alert below is enforced by REPO
  # SETTINGS, not by this file — GitHub silently AUTO-CREATES a referenced environment with no
  # deployment-branch policy, so an unconfigured binding is a default-ALLOW no-op (repo-scope
  # secrets stay readable by a modified workflow copy dispatched at an attacker ref). This job
  # verifies both load-bearing settings every tick, fail closed, BEFORE any secret-bearing job:
  #   (1) EMPTY REPO SCOPE — this job is deliberately NOT bound to the environment, so its
  #       `secrets` context is exactly what a stripped-binding attacker copy would see;
  #       asserting it holds nothing beyond the ephemeral github_token proves the stripped-file
  #       exfil path yields nothing (key NAMES only are ever read or printed);
  #   (2) DEFAULT-BRANCH-ONLY ENVIRONMENT — `dispatch-secrets` must exist with a CUSTOM
  #       deployment-branch policy naming exactly the default branch (branch type only), so a
  #       kept-binding copy at any other ref is refused server-side.
  # Until the maintainer applies both settings, this fails every tick and CLAIM/plan-alert are
  # SKIPPED: dispatch pauses loudly (default-DENY) instead of running in the prior silent
  # default-allow window. The guard is read-only (`gh api` GETs; asserted by its self-test).
  secrets-guard:
    name: GUARD (verify secret-exfil settings, fail closed)
    # TEMPORARY ADVISORY MODE (2026-07-18, issue #276): continue-on-error until the #275
    # secret migration completes. The guard's pause is pure self-DoS — the repo-scope
    # secrets it flags are equally readable by the OTHER (not-yet-bound) workflows that
    # keep running every tick, while dispatch's own secret-bearing jobs are ALREADY
    # environment-bound here. Pausing dispatch reduces zero exposure and halts BOTH
    # repos' drains. REMOVE this line the moment #275's migration verifies (issue #276).
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      # actions:read is LOAD-BEARING (review round 2 on the #101 PR): the environment and
      # deployment-branch-policy REST reads in dispatch-secrets-guard.py require Actions
      # repository read on the fine-grained GITHUB_TOKEN, and an explicit permissions map sets
      # everything unlisted to none — without this line both GETs fail on EVERY tick, turning
      # the guard into a permanent denial (CLAIM/plan-alert stay skipped even once the
      # maintainer settings are correct). The guard's self-test statically asserts this map
      # stays exactly this least-privilege pair.
      actions: read
      contents: read  # minimum for the sparse checkout below
    steps:
      - name: Check out the guard script + this workflow (pinned, sparse, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false
          # The workflow file feeds the self-test's static assertion that the guard job keeps
          # its load-bearing `actions: read` permission (see the permissions map above).
          sparse-checkout: |
            scripts/dispatch-secrets-guard.py
            .github/workflows/dispatch.yml
          sparse-checkout-cone-mode: false

      - name: Verify empty repo-scope secrets + default-branch-only environment policy
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          # Unbound-job secrets context: in the verified end state this holds ONLY the ephemeral
          # github_token. The guard inspects and prints key NAMES exclusively, never values
          # (asserted by sentinel checks in its self-test).
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          python3 registry/scripts/dispatch-secrets-guard.py --self-test
          python3 registry/scripts/dispatch-secrets-guard.py

  claim:
    name: CLAIM (validate, lease, launch)
    needs: [plan, secrets-guard]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # SECRET-EXFIL GUARD (issue #101). This job holds the App private key, every repository secret
    # (toJSON(secrets)), the per-account ACCT*_TOKEN credentials, the alert token, and a write
    # GITHUB_TOKEN. Because `workflow_dispatch` (top of file) accepts an arbitrary ref and GitHub
    # runs the file AT that ref, a collaborator could dispatch a modified branch copy of this
    # workflow and exfiltrate all of it. An in-file `if:` on the ref cannot stop that — the
    # attacker controls the whole file at their ref. A protected environment is the only lever
    # that survives, because it is enforced by repo settings, not the workflow file: bind this
    # job to `dispatch-secrets`, whose deployment-branch policy admits the DEFAULT BRANCH ONLY.
    # A run from any other ref then either (a) keeps this line and is refused by the branch
    # policy, or (b) strips it and sees EMPTY secrets (they live in the environment, not at repo
    # level) — no exfiltration either way. Every legitimate trigger runs from the default branch
    # (schedule; workflow_run; the doorbell rings `gh workflow run dispatch.yml` with no --ref),
    # so none are starved. REQUIRED maintainer settings for this to bite: create the
    # `dispatch-secrets` environment, restrict its deployment branches to a CUSTOM policy naming
    # ONLY the default branch, and MOVE every repo-scope secret into it (this job reads
    # toJSON(secrets), so EVERY repo-scope secret is in its blast radius). Those settings live
    # outside this file, so the `secrets-guard` job verifies them every tick and this job runs
    # only after it passes (review round 1 on the #101 PR): until the settings are applied — and
    # again if they ever regress — no secret-bearing job runs (default-DENY, loud red tick),
    # never a silent default-allow window.
    environment: dispatch-secrets
    permissions:
      actions: write
      contents: write
      issues: write   # write: upsert the rolling worker-availability alert issue (usage-alert.py)
    steps:
      - name: Download PLAN artifact (pinned)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dispatch-plan-${{ github.run_id }}-${{ github.run_attempt }}
          path: plan

      - name: Checkout private registry helpers (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      # Provenance + verdict records live on the unprotected `ledger` data-plane branch
      # (issue #96): master's required `gate` check rejects every direct contents-API PUT, so
      # post-outage records exist ONLY at this ref. CLAIM's fail-closed re-reads (provenance
      # re-validation, round verdicts) consult this checkout first, then the master copy for
      # pre-outage records. Fails the job LOUDLY if the ledger branch is missing.
      - name: Checkout the data-plane ledger branch (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: ledger
          ref: ledger
          persist-credentials: false

      # Trust guard (issue #28 review round 1): the ledger branch is DATA-ONLY by design.
      - name: Ledger checkout is data-only (trust guard)
        run: |
          set -euo pipefail
          test ! -e ledger/.github
          test ! -e ledger/scripts

      # The deferred-retry label flips, review needs-user escalations, missed-fix markers, and the
      # armed-SHA-mismatch DISARMS (issue #42) are TARGET mutations, so CLAIM mints its own
      # target-scoped App token(s). PER-OWNER MINT (defects #1,#5): the manifest now has two
      # DISTINCT owners (sparq-org, jeswr), so a single token scoped to targets[0]=sparq-org would
      # 404 every jeswr-owned registry disarm/needs-user/deferred-flip and defer it forever — the
      # exact issue-#42 disarm window the sweep exists to close would have no automated retraction
      # on the trust-surface repo. We mint one App token per distinct owner and hand CLAIM a
      # {owner: token} JSON map (_target_token resolves per repo owner). Each mint is
      # continue-on-error: a missing install for one owner only skips THAT owner's mutation paths;
      # the other owner's dispatch + the issue dispatch for both continue.
      - name: Resolve distinct target owners (per-owner token mint)
        id: owners
        env:
          TARGET_REPOS: ${{ env.DISPATCH_TARGET_REPOS }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re

          targets = json.loads(os.environ["TARGET_REPOS"])
          safe = re.compile(r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*")
          owners = {}
          for repo in targets:
              if not safe.fullmatch(repo):
                  raise SystemExit("unsafe target repo in the manifest")
              owner, name = repo.split("/", 1)
              owners.setdefault(owner, name)   # one representative repo per owner is enough
          # The mint steps below are static (two known owners); assert the manifest owners are
          # exactly {sparq-org, jeswr} so a manifest change fails LOUD here instead of silently
          # dropping a new owner's token (which would reintroduce the wrong-owner-token bug).
          if set(owners) != {"sparq-org", "jeswr"}:
              raise SystemExit(f"unexpected target owners {sorted(owners)}; add a mint step")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"sparq_name={owners['sparq-org']}\n")
              output.write(f"jeswr_name={owners['jeswr']}\n")
          PY

      - name: Mint sparq-org target-scoped App token (issue/PR mutations only)
        id: app-token-sparq
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: sparq-org
          repositories: ${{ steps.owners.outputs.sparq_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Mint jeswr target-scoped App token (issue/PR mutations only)
        id: app-token-jeswr
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: jeswr
          repositories: ${{ steps.owners.outputs.jeswr_name }}
          permission-issues: write
          permission-pull-requests: write

      # Assemble the {owner: token} JSON map from whichever mints succeeded. A masked, single-line
      # step output; missing owners are simply absent (their mutations defer, never wrong-owner).
      - name: Assemble the per-owner target token map
        id: token-map
        env:
          SPARQ_TOKEN: ${{ steps.app-token-sparq.outputs.token }}
          JESWR_TOKEN: ${{ steps.app-token-jeswr.outputs.token }}
        run: |
          set -euo pipefail
          [[ -z "${SPARQ_TOKEN:-}" ]] || printf '::add-mask::%s\n' "$SPARQ_TOKEN"
          [[ -z "${JESWR_TOKEN:-}" ]] || printf '::add-mask::%s\n' "$JESWR_TOKEN"
          python3 - <<'PY'
          import json
          import os

          tokens = {}
          if os.environ.get("SPARQ_TOKEN"):
              tokens["sparq-org"] = os.environ["SPARQ_TOKEN"]
          if os.environ.get("JESWR_TOKEN"):
              tokens["jeswr"] = os.environ["JESWR_TOKEN"]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              # Compact single-line JSON — GITHUB_OUTPUT is line-based; the tokens are masked above.
              output.write(f"tokens={json.dumps(tokens, separators=(',', ':'))}\n")
          PY

      # Least-exposure filter (audit-2026-07-17): only this tiny inline step ever sees the full
      # secrets map; the probe step below receives ONLY the ACCT_* worker-token subset via a file.
      - name: Materialize the ACCT_* worker-token subset for the probe
        continue-on-error: true
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -euo pipefail
          python3 - "$RUNNER_TEMP/acct-secrets.json" <<'PY'
          import json
          import os
          import re
          import sys

          path = sys.argv[1]
          allow = re.compile(r"ACCT[A-Z0-9]+_TOKEN")
          data = json.loads(os.environ["ALL_SECRETS"])
          subset = {key: value for key, value in data.items()
                    if isinstance(value, str) and allow.fullmatch(key)}
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(subset, handle)
          os.chmod(path, 0o600)
          PY

      - name: Probe live account usage (usage-aware dispatch; tokens never printed)
        continue-on-error: true   # a probe failure must never block dispatch — it falls back to the static cap
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          SECRETS_FILE: ${{ runner.temp }}/acct-secrets.json
          # Reactive backoff for probe-exempt providers (decision 2026-07-17, registry issue #29):
          # the salt maps catalog handles to the salted hashes in data/model-health.json so active
          # rate-limit backoffs land on the exempt usage entries. This job runs registry code only
          # (same posture as the claim step's PROVENANCE_SALT below) — the salt never enters a job
          # that executes target code. A missing salt or unreadable ledger fails OPEN (backoff
          # disabled, exemption intact) with a loud ::warning:: line.
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          set -uo pipefail
          python3 registry/scripts/account-usage.py --self-test
          python3 registry/scripts/account-usage.py > "$RUNNER_TEMP/usage.json" 2> "$RUNNER_TEMP/usage-probe.stderr" || printf '{}' > "$RUNNER_TEMP/usage.json"
          # Privacy (locked decision 22b): the public log never carries account counts; a wholesale
          # probe failure is surfaced by the fail-loud usage-alert step below, not by this line.
          # Only explicitly ::warning::-prefixed diagnostics (sanitized by construction — no
          # handles/counts) are re-surfaced from stderr; everything else stays discarded.
          grep -a '^::warning::' "$RUNNER_TEMP/usage-probe.stderr" || true
          echo 'usage-probe: snapshot written'

      # Capacity model (2026-07-17): persist the live anthropic-ratelimit-unified-* LIMIT headers
      # into the account issues' front-matter so per-account tier limits stop being "TBD".
      # Best-effort; the allocator ignores the extra `limits:` line entirely.
      - name: Persist probed tier limits to the account catalog
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
        run: python3 registry/scripts/account-usage.py --persist-limits "$RUNNER_TEMP/usage.json"

      - name: Strictly validate, CAS claim, and dispatch live workers + review/fix runs
        id: claim
        env:
          GH_TOKEN: ${{ github.token }}
          # Per-owner target App-token map (defects #1,#5): _target_token(repo) resolves the token
          # for repo's OWNER. Same App across owners, so the bot slug is identical; take it from
          # whichever mint succeeded.
          TARGET_GH_TOKENS: ${{ steps.token-map.outputs.tokens }}
          BOT_LOGIN: ${{ (steps.app-token-sparq.outputs.app-slug || steps.app-token-jeswr.outputs.app-slug) && format('{0}[bot]', steps.app-token-sparq.outputs.app-slug || steps.app-token-jeswr.outputs.app-slug) || '' }}
          REGISTRY_REPO: ${{ github.repository }}
          REGISTRY_ALERT_TOKEN: ${{ github.token }}
          # Privacy routing (locked decision 22c): a maintainer-set ALERT_REPO (+ ALERT_TOKEN
          # with access to it) sends account-enumerating ops alerts to a PRIVATE repo instead of
          # this public registry; unset falls back to REGISTRY_REPO + the workflow token.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
          # Salt for the provenance account-hash comparison (locked decision 22a). This job runs
          # registry code only — the salt never enters a job that executes target code.
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
          WORKFLOW_REF: ${{ github.ref_name }}
          WORKER_USAGE_FILE: ${{ runner.temp }}/usage.json
          # Zero-dispatch visibility (registry #28/#32): dispatch-claim writes a compact
          # {planned, dispatched, defer_reasons} summary here (no issue numbers/handles) for the
          # step below to render + record.
          DISPATCH_SUMMARY_FILE: ${{ runner.temp }}/dispatch-summary.json
        run: |
          set -euo pipefail
          printf '::add-mask::%s\n' "$GH_TOKEN"
          # Re-mask each per-owner token value defensively (already masked at mint assembly).
          python3 - <<'PY'
          import json
          import os
          for tok in json.loads(os.environ.get("TARGET_GH_TOKENS", "{}") or "{}").values():
              if tok:
                  print(f"::add-mask::{tok}")
          PY
          python3 registry/scripts/dispatch-claim.py \
            --plan plan/plan.json \
            --policy-file registry/policy/repos.toml \
            --registry-repo "$GITHUB_REPOSITORY" \
            --registry-root registry \
            --ledger-root ledger \
            --bot-login "$BOT_LOGIN" \
            --workflow-ref "$WORKFLOW_REF"

      # Zero-dispatch visibility (registry #28) + model-access health (#32): every tick that
      # PLANNED work writes a health record — `zero-dispatch` when nothing launched, dispatch
      # SUCCESS when something did (review defect #5: consecutiveness is over the tick sequence,
      # and a productive tick both resets the run and closes the alert via `decide`). A claim that
      # ABORTED before writing even the early plan summary records `claim-abort` (review defect
      # #6, counted as a zero-dispatch tick); dispatch-claim writes the plan-derived summary
      # BEFORE claim-side work so a mid-claim abort still surfaces as planned>0/launched-0.
      # Empty-frontier ticks (planned == 0) stay recordless by design. always() so a claim
      # FAILURE (exactly when nothing launches) is still surfaced. No issue numbers or account
      # handles are emitted.
      - name: Surface + record the dispatch-tick health state
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          DISPATCH_SUMMARY_FILE: ${{ runner.temp }}/dispatch-summary.json
          CLAIM_OUTCOME: ${{ steps.claim.outcome }}
        run: |
          set -uo pipefail
          python3 - "$DISPATCH_SUMMARY_FILE" <<'PY'
          import json
          import os
          import sys

          path = sys.argv[1]
          try:
              with open(path, encoding="utf-8") as handle:
                  summary = json.load(handle)
          except (OSError, ValueError):
              summary = None
          planned = (summary or {}).get("planned", 0)
          dispatched = (summary or {}).get("dispatched", 0)
          reasons = (summary or {}).get("defer_reasons", {})
          # Issue #28: ready-frontier size + lease-ledger health, so this line tells an empty
          # frontier apart from a ledger failure (both otherwise read as a green 0-dispatch tick).
          frontier_size = (summary or {}).get("frontier_size", planned)
          ledger = (summary or {}).get("ledger", "ok")
          zero = isinstance(planned, int) and planned > 0 and dispatched == 0
          productive = isinstance(planned, int) and planned > 0 and \
              isinstance(dispatched, int) and dispatched > 0
          # No summary at all = the claim aborted before even the early plan-summary write
          # (validation/API/setup); that is a zero-dispatch-shaped tick, not a quiet one.
          abort = summary is None and os.environ.get("CLAIM_OUTCOME") == "failure"
          # Issue #108: per-lane health, so a productive WORKER launch can no longer mark the tick
          # healthy while a safety disarm or an entire review/fix lane failed. The disarm lane
          # consumes no account/lease, so it is invisible to the fleet planned/dispatched counts
          # above — a disarm ERROR (a stale auto-merge latch that could not be retracted) is
          # safety-critical and MUST alert on its own. A review/fix lane that planned work, launched
          # nothing, AND hit hard errors is a genuine stall (as opposed to plain capacity
          # contention, which is `deferred`, not `error`). Any of these records the SAME
          # `zero-dispatch` health class the fleet signal uses (ready work that did not launch), so a
          # persistent stall accumulates over consecutive ticks and pages — while a healthy tick
          # (every planned lane launched, no disarm error) still records `success` and closes it.
          lanes = (summary or {}).get("lanes", {})
          lanes = lanes if isinstance(lanes, dict) else {}
          def _lane(name):
              lane = lanes.get(name, {})
              return lane if isinstance(lane, dict) else {}
          def _n(lane, key):
              value = lane.get(key, 0)
              return value if isinstance(value, int) else 0
          disarm_failed = _n(_lane("disarm"), "error") > 0
          def _lane_stalled(name):
              lane = _lane(name)
              return _n(lane, "planned") > 0 and _n(lane, "launched") == 0 \
                  and _n(lane, "error") > 0
          review_stalled = _lane_stalled("review")
          fix_stalled = _lane_stalled("fix")
          lane_unhealthy = disarm_failed or review_stalled or fix_stalled
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          # Every tick with a summary emits the frontier/ledger health line (issue #28) — an
          # empty frontier (frontier_size=0) is now visibly distinct from a ledger failure
          # (ledger=error), which the claim step also fails loud on when nothing dispatched.
          if summary is not None and step_summary:
              with open(step_summary, "a", encoding="utf-8") as out:
                  out.write(f"dispatch tick: frontier_size={frontier_size}, "
                            f"ledger={ledger}, dispatched={dispatched}\n\n")
          if zero and step_summary:
              with open(step_summary, "a", encoding="utf-8") as out:
                  out.write("### ⚠️ Zero-dispatch tick\n\n")
                  out.write(f"Planned **{planned}** ready item(s) but launched **0**. "
                            "Defer-reason histogram:\n\n")
                  for reason, count in sorted(reasons.items(), key=lambda kv: (-kv[1], kv[0])):
                      out.write(f"- `{reason}`: {count}\n")
                  if not reasons:
                      out.write("- (no per-item defer reason captured)\n")
          # Issue #108: surface a lane stall that the fleet dispatched>0 count would otherwise hide,
          # so the masked safety failure is human-visible on the tick it happens (not just after the
          # consecutive-tick page).
          if lane_unhealthy and not zero and step_summary:
              with open(step_summary, "a", encoding="utf-8") as out:
                  out.write("### ⚠️ Lane stall masked by other lanes\n\n")
                  if disarm_failed:
                      out.write(f"- safety **disarm** errored on "
                                f"{_n(_lane('disarm'), 'error')} item(s) — a stale auto-merge "
                                "latch could not be retracted\n")
                  if review_stalled:
                      out.write("- **review** lane planned work but launched nothing "
                                "(every item errored)\n")
                  if fix_stalled:
                      out.write("- **fix** lane planned work but launched nothing "
                                "(every item errored)\n")
          # Emit a marker file the record step reads (keeps the record invocation out of this
          # inline python so the salted-hash discipline stays in model-health.py). A lane stall or a
          # failed safety disarm counts as a zero-dispatch tick even when the fleet dispatched>0.
          state = "zero" if (zero or lane_unhealthy) else "abort" if abort \
              else "ok" if productive else "none"
          with open(os.environ["RUNNER_TEMP"] + "/dispatch-tick-state", "w",
                    encoding="utf-8") as flag:
              flag.write(state)
          PY
          state="$(cat "$RUNNER_TEMP/dispatch-tick-state" 2>/dev/null || echo none)"
          case "$state" in
            zero)
              python3 registry/scripts/model-health.py record \
                --provider fleet \
                --exit-class zero-dispatch \
                --run-id "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"
              ;;
            abort)
              python3 registry/scripts/model-health.py record \
                --provider fleet \
                --exit-class claim-abort \
                --run-id "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"
              ;;
            ok)
              # dispatch-success record: resets the consecutive zero-tick run + closes the alert
              python3 registry/scripts/model-health.py record \
                --provider fleet \
                --exit-class success \
                --run-id "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"
              ;;
          esac

      # FAIL-LOUD maintainer alert: opposite posture to the fail-closed dispatcher. Runs even if the
      # claim step above skipped everything (all accounts capped), so degraded throughput is never
      # silent. The account pool + margin come from policy/repos.toml READ INSIDE the script (never
      # env/log lines — privacy d22b), and classify() mirrors usage_eligible's fail-closed posture,
      # so a WHOLESALE probe failure (empty usage.json) always fires the alert. Upserts ONE rolling
      # `ops-alert` issue @-mentioning the maintainer; never blocks dispatch.
      - name: Alert maintainer if worker accounts are unavailable
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          WORKER_USAGE_FILE: ${{ runner.temp }}/usage.json
          POLICY_FILE: registry/policy/repos.toml
          MAINTAINER_HANDLE: jeswr
          # Privacy routing (locked decision 22c, issue #107): the per-account alert body enumerates
          # account handles, so it is emitted ONLY over a VERIFIED private route — a maintainer-set
          # ALERT_REPO together with an ALERT_TOKEN that can write there. Any fallback to this PUBLIC
          # registry repo (route unset OR half-configured) redacts handles to aggregate counts.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
        run: |
          set -uo pipefail
          python3 registry/scripts/usage-alert.py --self-test
          python3 registry/scripts/usage-alert.py

  # FAIL-LOUD alert for a HARD PLAN failure (issue #38). Every always()/ops-alert step above lives
  # INSIDE the claim job, which is `needs: plan` — so when PLAN itself fails or is cancelled (e.g.
  # sustained snapshot 403s), claim is SKIPPED and none of them run: a persistent PLAN failure means
  # ZERO dispatching fleet-wide yet presents only as skipped jobs on a cron nobody watches. This
  # standalone job keys on `needs.plan.result` and, on failure/cancelled, upserts a rolling
  # `ops-alert` issue @-mentioning the maintainer via the SAME ALERT_REPO/ALERT_TOKEN routing the
  # account-availability alert uses (locked decision 22c). It never runs when plan succeeds, so a
  # healthy tick auto-closes any prior open plan-alert. No token or snapshot data reaches this job
  # (it downloads no PLAN artifact); it only reads the plan JOB RESULT.
  plan-alert:
    name: ALERT (hard PLAN-job failure)
    needs: [plan, secrets-guard]
    # Runs every tick regardless of the PLAN result so a healthy PLAN can auto-close a prior
    # alert; scripts/plan-alert.py keys on needs.plan.result — close happens ONLY on an explicit
    # success (a skipped PLAN is not a recovery, review r1), and a success tick with no open alert
    # does only a bare `gh issue list`, so a green tick stays cheap and side-effect-free.
    # secrets-guard gate (issue #101 review round 1): this job mounts ALERT_TOKEN/ALERT_REPO, so
    # it must NOT run while the secret-exfil settings are unverified — a guard failure skips it
    # (fail closed; the guard-red tick is itself the loud signal).
    if: ${{ always() && needs.secrets-guard.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # SECRET-EXFIL GUARD (issue #101): this job reads ALERT_TOKEN/ALERT_REPO (the private-alert
    # routing secrets), so it is reachable by the same arbitrary-ref workflow_dispatch exfil
    # vector as CLAIM. Bind it to the same default-branch-only `dispatch-secrets` environment
    # where those secrets live. It only ever runs from the default branch (schedule/workflow_run/
    # doorbell), so the branch policy never starves it.
    environment: dispatch-secrets
    permissions:
      contents: read  # minimum for the sparse checkout below — the job runs a script from the repo
      issues: write   # upsert/close the rolling plan-failure ops-alert issue
    steps:
      # Codex r4 privilege review: the job DOES need a checkout (the alert logic lives in
      # scripts/plan-alert.py), but only that one file — sparse-checkout scopes the working copy
      # to it, pinned and with no persisted token, so nothing else from the repo reaches this job.
      - name: Check out ONLY scripts/plan-alert.py (pinned, sparse, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false
          sparse-checkout: scripts/plan-alert.py
          sparse-checkout-cone-mode: false

      - name: Alert maintainer that the dispatch PLAN job hard-failed
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          PLAN_RESULT: ${{ needs.plan.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MAINTAINER_HANDLE: jeswr
          # Privacy routing (locked decision 22c): scripts/plan-alert.py routes to a maintainer-set
          # PRIVATE ALERT_REPO only when ALERT_TOKEN can write there (usage-alert.py's audited
          # _alert_route semantics, issue #39); otherwise the registry repo. The body carries no
          # account handles (a PLAN failure is target-planner-side), so that fallback is safe.
          ALERT_REPO: ${{ secrets.ALERT_REPO || vars.ALERT_REPO || '' }}
          ALERT_TOKEN: ${{ secrets.ALERT_TOKEN || '' }}
        run: |
          set -uo pipefail
          python3 registry/scripts/plan-alert.py --self-test
          python3 registry/scripts/plan-alert.py
