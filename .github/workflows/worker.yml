# [GPT-5.6] Private-registry worker. Dry-run remains the default; REG-3's live path claims a CAS
# lease, revalidates trust, runs one routed model attempt, pushes the candidate branch in the
# pre-gate credential window, gates it host-side, and a SEPARATE clean-runner `publish` job (no
# target code) opens the DRAFT target PR (cross-provider review pending). Publish never arms:
# the pipeline records the implementer's identity in the registry (orchestration/provenance/)
# and stops; the lease releases immediately, and the dispatch sweep drives the review-fix loop
# that alone may arm the PR.
name: worker
run-name: worker claim=${{ inputs.claim_id || 'self' }}

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: Target owner/repository allowed by policy/repos.toml
        required: true
        type: string
      issue_number:
        description: Existing target issue used to resolve routing labels and task content
        required: true
        type: string
      account:
        description: Dry-run account handle; ignored by live runs, which claim from policy
        required: true
        type: string
      claim_id:
        description: Optional dispatcher-owned CAS claim to adopt for a live run
        required: false
        default: ''
        type: string
      dry_run:
        description: Prove policy, target token, checkout, and credential prep without live effects
        required: true
        default: true
        type: boolean

permissions: {}

jobs:
  resolve:
    name: Resolve policy without worker secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: read
    outputs:
      target_owner: ${{ steps.inputs.outputs.target_owner }}
      target_name: ${{ steps.inputs.outputs.target_name }}
      issue_author: ${{ steps.issue.outputs.issue_author }}
      issue_body_sha: ${{ steps.issue.outputs.issue_body_sha }}
      packages: ${{ steps.issue.outputs.packages }}
      role: ${{ steps.issue.outputs.role }}
      routing: ${{ steps.policy.outputs.routing }}
      model_chain: ${{ steps.policy.outputs.model_chain }}
      account_pool: ${{ steps.policy.outputs.account_pool }}
      agent: ${{ steps.policy.outputs.agent }}
      gate_profile: ${{ steps.policy.outputs.gate_profile }}
      arm_auto_merge: ${{ steps.policy.outputs.arm_auto_merge }}
      max_attempts: ${{ steps.policy.outputs.max_attempts }}
      max_concurrent: ${{ steps.policy.outputs.max_concurrent }}
      worker_timeout_minutes: ${{ steps.policy.outputs.worker_timeout_minutes }}
      provider: ${{ steps.account.outputs.provider }}
      harness: ${{ steps.account.outputs.harness }}
      model: ${{ steps.account.outputs.model }}
      provider_model: ${{ steps.account.outputs.provider_model }}
      credential_format: ${{ steps.account.outputs.credential_format }}
      secret_ref: ${{ steps.account.outputs.secret_ref }}
    steps:
      - name: Validate dispatch inputs
        id: inputs
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ACCOUNT: ${{ inputs.account }}
          CLAIM_ID: ${{ inputs.claim_id }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          python3 - <<'PY'
          import os
          import re

          target = os.environ["TARGET_REPO"]
          issue = os.environ["ISSUE_NUMBER"]
          account = os.environ["ACCOUNT"]
          claim_id = os.environ["CLAIM_ID"]
          dry_run = os.environ["DRY_RUN"] == "true"
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*/[A-Za-z0-9][A-Za-z0-9_.-]*", target):
              raise SystemExit("target_repo must be a safe owner/repository name")
          if not re.fullmatch(r"[1-9][0-9]*", issue):
              raise SystemExit("issue_number must be a positive integer")
          if not re.fullmatch(r"acct[0-9a-z]{2,}", account):
              raise SystemExit("account must be an acctNN registry handle")
          if claim_id and not re.fullmatch(r"[0-9a-f]{32}", claim_id):
              raise SystemExit("claim_id must be empty or a lowercase 32-hex CAS identifier")
          if claim_id and dry_run:
              raise SystemExit("a dispatcher claim cannot be used by a dry run")
          owner, name = target.split("/", 1)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"target_owner={owner}\n")
              output.write(f"target_name={name}\n")
          PY

      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Checkout public target for protected routing data (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          path: target-routing
          persist-credentials: false

      - name: Snapshot issue labels and revision
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail
          gh api "repos/$TARGET_REPO/issues/$ISSUE_NUMBER" > "$RUNNER_TEMP/issue.json"
          python3 - "$RUNNER_TEMP/issue.json" "$RUNNER_TEMP/labels" <<'PY'
          import hashlib
          import json
          import os
          import re
          import sys

          issue_path, labels_path = sys.argv[1:]
          with open(issue_path, encoding="utf-8") as handle:
              issue = json.load(handle)
          if "pull_request" in issue:
              raise SystemExit("issue_number identifies a pull request, not an issue")
          if issue.get("state") != "open":
              raise SystemExit("target issue must be open")
          labels = sorted({
              label.get("name")
              for label in issue.get("labels", [])
              if isinstance(label, dict) and isinstance(label.get("name"), str) and label.get("name")
          })
          roles = sorted(label[5:] for label in labels if label.startswith("role:"))
          packages = sorted(label[5:] for label in labels if label.startswith("area:"))
          if len(roles) != 1 or not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", roles[0]):
              raise SystemExit("target issue must carry exactly one safe role:* label")
          if any(not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", package) for package in packages):
              raise SystemExit("target issue has an unsafe area:* label")
          author = issue.get("user", {}).get("login")
          if (not isinstance(author, str)
                  or not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*(?:\[bot\])?", author)):
              raise SystemExit("target issue has an unsafe or missing author")
          with open(labels_path, "w", encoding="utf-8") as handle:
              for label in labels:
                  handle.write(f"{label}\n")
          values = {
              "issue_author": author,
              "issue_body_sha": hashlib.sha256((issue.get("body") or "").encode()).hexdigest(),
              "packages": ",".join(packages),
              "role": roles[0],
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  output.write(f"{key}={value}\n")
          PY

      - name: Resolve issue routing through registry policy
        id: policy
        env:
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          set -euo pipefail
          args=(
            --target-repo "$TARGET_REPO"
            --policy-file registry/policy/repos.toml
            --target-root target-routing
          )
          while IFS= read -r label; do
            args+=(--label "$label")
          done < "$RUNNER_TEMP/labels"
          python3 registry/scripts/policy-resolve.py "${args[@]}" > "$RUNNER_TEMP/policy.json"
          python3 - "$RUNNER_TEMP/policy.json" <<'PY'
          import json
          import os
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              policy = json.load(handle)
          csv_fields = {"model_chain": policy["model_chain"], "account_pool": policy["account_pool"]}
          for key, values in csv_fields.items():
              if not values or any(not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", value) for value in values):
                  raise SystemExit(f"resolved {key} contains an unsafe value")
          values = {
              "routing": policy["routing"],
              "model_chain": ",".join(policy["model_chain"]),
              "account_pool": ",".join(policy["account_pool"]),
              "agent": policy["agent"],
              "gate_profile": policy["gate_profile"],
              "arm_auto_merge": str(policy["arm_auto_merge"]).lower(),
              "max_attempts": str(policy["max_attempts"]),
              "max_concurrent": str(policy["max_concurrent"]),
              "worker_timeout_minutes": str(policy["worker_timeout_minutes"]),
          }
          for key, value in values.items():
              if not isinstance(value, str) or not value or "\n" in value or "\r" in value:
                  raise SystemExit(f"unsafe or missing resolved value: {key}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  output.write(f"{key}={value}\n")
          print(
              f"policy resolved: models={','.join(policy['model_chain'])}, "
              f"gate={policy['gate_profile']}, max_attempts={policy['max_attempts']}"
          )
          PY

      - name: Validate dry-run account against resolved policy
        id: account
        if: ${{ inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          ACCOUNT: ${{ inputs.account }}
        run: |
          set -euo pipefail
          gh issue list -R "$GITHUB_REPOSITORY" --state open --limit 500 \
            --json title,body,labels > "$RUNNER_TEMP/accounts.json"
          python3 - \
            "$GITHUB_WORKSPACE/registry/scripts/select-and-claim.py" \
            "$RUNNER_TEMP/policy.json" \
            "$RUNNER_TEMP/accounts.json" <<'PY'
          import importlib.util
          import json
          import os
          from pathlib import Path
          import re
          import sys
          import tomllib

          allocator_path, policy_path, accounts_path = sys.argv[1:]
          with open(policy_path, encoding="utf-8") as handle:
              policy = json.load(handle)
          target_root = Path(os.environ["GITHUB_WORKSPACE"], "target-routing").resolve()
          routing_path = Path(target_root, policy["routing"]).resolve()
          try:
              routing_path.relative_to(target_root)
          except ValueError as exc:
              raise SystemExit("resolved routing path escaped the target checkout") from exc
          with open(routing_path, "rb") as handle:
              routing = tomllib.load(handle)
          with open(accounts_path, encoding="utf-8") as handle:
              catalog = json.load(handle)

          spec = importlib.util.spec_from_file_location("select_and_claim", allocator_path)
          if spec is None or spec.loader is None:
              raise SystemExit("cannot load registry account parser")
          allocator = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(allocator)
          account_name = os.environ["ACCOUNT"]
          matches = [item for item in catalog if item.get("title", "").strip() == account_name]
          if len(matches) != 1:
              raise SystemExit(f"selected account {account_name} is missing or ambiguous")
          item = matches[0]
          labels = {label.get("name") for label in item.get("labels", []) if isinstance(label, dict)}
          if "status:available" not in labels:
              raise SystemExit(f"selected account {account_name} is not available")
          if account_name not in policy["account_pool"]:
              raise SystemExit(f"selected account {account_name} is outside the resolved account pool")

          # Round 5: route the parsed record through the SAME read-time legacy-shape
          # normalization read_accounts applies (sol r3 f1). A raw _parse_account() here gates
          # model membership LITERALLY, so a legacy `models: [terra]` record would fail this
          # sol-led dry-run even though the live claim path normalizes it. (Privacy: the parsed
          # record carries no handle and this step exports no PROVENANCE_SALT, so the shared
          # diagnostic stays handle-free in these public logs.)
          account = allocator.normalize_legacy_models(allocator._parse_account(item.get("body")))
          model = next((candidate for candidate in policy["model_chain"]
                        if candidate in account.get("models", [])), None)
          if model is None:
              raise SystemExit(f"selected account {account_name} cannot serve the resolved model chain")
          model_meta = routing.get("models", {}).get(model)
          if not isinstance(model_meta, dict):
              raise SystemExit(f"selected model {model} has no routing metadata")
          provider = model_meta.get("provider")
          harness = model_meta.get("harness")
          credential_format = model_meta.get("credential_format")
          provider_model = model_meta.get("provider_model")
          if (provider, harness) not in {("openai", "codex"), ("anthropic", "claude")}:
              raise SystemExit("resolved model has an unsupported provider/harness pair")
          if account.get("provider") != provider:
              raise SystemExit("selected account provider does not match the resolved model")
          if account.get("harness") and account["harness"] != harness:
              raise SystemExit("selected account harness does not match the resolved model")
          if credential_format not in {
              "codex-auth-json", "claude-credentials-json", "claude-oauth-token", "anthropic-api-key"
          }:
              raise SystemExit("resolved model has an unsupported credential format")
          # Harness-aware contract (2026-07-18): "TBD" is the WIRE sentinel for an
          # unpinned codex model — it must survive GITHUB_OUTPUT's non-empty value check
          # (the later resolvers already normalize unset/empty -> "TBD" for exactly that
          # reason), and worker-live.sh omits --model for it so the codex CLI default
          # tracks the account's supported model. The incident: worker-live previously
          # omitted only on EMPTY, so the sentinel reached `codex exec --model TBD` ->
          # API 400 / degraded no-tool-call fallback on every terra fleet worker.
          # For claude, a concrete id remains mandatory.
          if provider_model in (None, "", "TBD"):
              if harness == "codex":
                  provider_model = "TBD"
              else:
                  raise SystemExit("resolved claude model has no concrete provider model")
          elif not isinstance(provider_model, str):
              raise SystemExit("resolved model provider_model is malformed")
          secret_ref = account.get("secret_ref")
          if secret_ref != f"{account_name.upper()}_TOKEN" or not re.fullmatch(r"[A-Z][A-Z0-9_]*", secret_ref):
              raise SystemExit("selected account has an unsafe or mismatched secret_ref")
          values = {
              "provider": provider,
              "harness": harness,
              "model": model,
              "provider_model": provider_model,
              "credential_format": credential_format,
              "secret_ref": secret_ref,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  if not isinstance(value, str) or not value or "\n" in value or "\r" in value:
                      raise SystemExit(f"unsafe or missing dry-run value: {key}")
                  output.write(f"{key}={value}\n")
          # Privacy (locked decision 22b): public workflow logs never carry account handles.
          print(f"dry-run account validated: model={model}, harness={harness}")
          PY

  claim:
    name: Claim live account lease
    if: ${{ !inputs.dry_run }}
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: read
    outputs:
      acquired: ${{ steps.adopt.outputs.acquired || steps.claim.outputs.acquired }}
      account: ${{ steps.adopt.outputs.account || steps.claim.outputs.account }}
      claim_id: ${{ steps.adopt.outputs.claim_id || steps.claim.outputs.claim_id }}
      model: ${{ steps.adopt.outputs.model || steps.claim.outputs.model }}
      provider: ${{ steps.adopt.outputs.provider || steps.claim.outputs.provider }}
      harness: ${{ steps.adopt.outputs.harness || steps.claim.outputs.harness }}
      credential_format: ${{ steps.adopt.outputs.credential_format || steps.claim.outputs.credential_format }}
      secret_ref: ${{ steps.adopt.outputs.secret_ref || steps.claim.outputs.secret_ref }}
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: CAS claim from the policy-filtered account pool
        id: claim
        if: ${{ inputs.claim_id == '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          MODELS: ${{ needs.resolve.outputs.model_chain }}
          ACCOUNT_POOL: ${{ needs.resolve.outputs.account_pool }}
          PACKAGE: ${{ needs.resolve.outputs.packages }}
          ROLE: ${{ needs.resolve.outputs.role }}
          TIMEOUT_MINUTES: ${{ needs.resolve.outputs.worker_timeout_minutes }}
        run: |
          set -euo pipefail
          [[ "$TIMEOUT_MINUTES" =~ ^[1-9][0-9]*$ ]]
          ttl=$((TIMEOUT_MINUTES * 60 + 900))
          holder="$TARGET_REPO#$ISSUE_NUMBER@$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"
          lease_package=${PACKAGE:-__global__}
          set +e
          python3 registry/scripts/select-and-claim.py \
            --claim \
            --repo "$GITHUB_REPOSITORY" \
            --package "$lease_package" \
            --role "$ROLE" \
            --models "$MODELS" \
            --account-pool "$ACCOUNT_POOL" \
            --holder "$holder" \
            --holder-prefix "$TARGET_REPO#" \
            --max-holder-concurrent "${{ needs.resolve.outputs.max_concurrent }}" \
            --ttl "$ttl" > "$RUNNER_TEMP/claim.json"
          rc=$?
          set -e
          if [[ "$rc" -eq 3 ]]; then
            printf 'acquired=false\n' >> "$GITHUB_OUTPUT"
            printf 'No eligible account lease is free; deferring without failure.\n'
            exit 0
          fi
          [[ "$rc" -eq 0 ]] || { echo '::error::lease claim failed'; exit "$rc"; }
          python3 - "$RUNNER_TEMP/claim.json" "$ACCOUNT_POOL" "$MODELS" <<'PY'
          import json
          import os
          import re
          import sys

          claim_path, pool_csv, models_csv = sys.argv[1:]
          with open(claim_path, encoding="utf-8") as handle:
              claim = json.load(handle)
          pool = pool_csv.split(",")
          models = models_csv.split(",")
          account = claim.get("account")
          model = claim.get("model")
          claim_id = claim.get("claim_id")
          secret_ref = claim.get("secret_ref")
          if account not in pool or model not in models:
              raise SystemExit("allocator returned an account/model outside resolved policy")
          if not re.fullmatch(r"acct[0-9a-z]{2,}", str(account)):
              raise SystemExit("allocator returned an unsafe account")
          if secret_ref != f"{account.upper()}_TOKEN" or not re.fullmatch(r"[A-Z][A-Z0-9_]*", str(secret_ref)):
              raise SystemExit("allocator returned an unsafe or mismatched secret_ref")
          if not re.fullmatch(r"[0-9a-f]{32}", str(claim_id)):
              raise SystemExit("allocator returned an unsafe claim_id")
          values = {
              "acquired": "true",
              "account": account,
              "claim_id": claim_id,
              "model": model,
              "provider": claim.get("provider") or "",
              "harness": claim.get("harness") or "",
              "credential_format": claim.get("credential_format") or "",
              "secret_ref": secret_ref,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  if "\n" in value or "\r" in value:
                      raise SystemExit(f"allocator returned unsafe {key}")
                  output.write(f"{key}={value}\n")
          # Privacy (locked decision 22b): public logs never carry account handles. (Historical
          # pre-migration runs printed the handle here — backfill-provenance.py parses only
          # those OLD logs; new runs record provenance at publish and never need it.)
          print(f"lease claimed: model={model}, claim={claim_id[:8]}")
          PY

      - name: Adopt dispatcher-owned CAS claim
        id: adopt
        if: ${{ inputs.claim_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EXPECTED_ACCOUNT: ${{ inputs.account }}
          CLAIM_ID: ${{ inputs.claim_id }}
          MODELS: ${{ needs.resolve.outputs.model_chain }}
          ACCOUNT_POOL: ${{ needs.resolve.outputs.account_pool }}
          PACKAGES: ${{ needs.resolve.outputs.packages }}
          ROLE: ${{ needs.resolve.outputs.role }}
        run: |
          set -euo pipefail
          python3 registry/scripts/select-and-claim.py \
            --inspect "$CLAIM_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --expected-holder-prefix "$TARGET_REPO#$ISSUE_NUMBER@" > "$RUNNER_TEMP/adopt.json"
          if ! python3 - "$RUNNER_TEMP/adopt.json" <<'PY'
          import json
          import os
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              claim = json.load(handle)
          account = claim.get("account")
          model = claim.get("model")
          claim_id = claim.get("claim_id")
          secret_ref = claim.get("secret_ref")
          pool = os.environ["ACCOUNT_POOL"].split(",")
          models = os.environ["MODELS"].split(",")
          packages = os.environ["PACKAGES"].split(",") if os.environ["PACKAGES"] else []
          expected_package = packages[0] if packages else "__global__"
          if account != os.environ["EXPECTED_ACCOUNT"] or account not in pool:
              raise SystemExit("dispatcher claim account is outside resolved policy")
          if model not in models:
              raise SystemExit("dispatcher claim model is outside resolved routing")
          if claim_id != os.environ["CLAIM_ID"] or not re.fullmatch(r"[0-9a-f]{32}", str(claim_id)):
              raise SystemExit("dispatcher claim id is invalid")
          if claim.get("role") != os.environ["ROLE"] or claim.get("package") != expected_package:
              raise SystemExit("dispatcher claim work partition disagrees with resolved issue")
          if secret_ref != f"{account.upper()}_TOKEN" or not re.fullmatch(
                  r"[A-Z][A-Z0-9_]*", str(secret_ref)):
              raise SystemExit("dispatcher claim secret_ref is unsafe")
          values = {
              "acquired": "true",
              "account": account,
              "claim_id": claim_id,
              "model": model,
              "provider": claim.get("provider") or "",
              "harness": claim.get("harness") or "",
              "credential_format": claim.get("credential_format") or "",
              "secret_ref": secret_ref,
          }
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  if not isinstance(value, str) or "\n" in value or "\r" in value:
                      raise SystemExit(f"dispatcher claim returned unsafe {key}")
                  output.write(f"{key}={value}\n")
          # Privacy (locked decision 22b): public workflow logs never carry account handles.
          print(f"dispatcher lease adopted: model={model}, claim={claim_id[:8]}")
          PY
          then
            python3 registry/scripts/select-and-claim.py \
              --release "$CLAIM_ID" \
              --repo "$GITHUB_REPOSITORY" || true
            exit 1
          fi

  worker:
    name: ${{ inputs.dry_run && 'Prove dry-run worker environment' || 'Run live target worker (DRAFT, review pending)' }}
    if: ${{ always() && needs.resolve.result == 'success' && (inputs.dry_run || needs.claim.result == 'success') }}
    needs: [resolve, claim]
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(needs.resolve.outputs.worker_timeout_minutes) }}
    permissions:
      # READ ONLY — this job executes model-authored target code HOST-side (the cargo gate), so
      # no registry-WRITE token may exist anywhere in its blast radius. The implementer
      # provenance record (the review loop's root of trust) is written by the separate
      # `provenance` job below, which executes no target code.
      contents: read
    outputs:
      # CLEAN-PUBLISHER SPLIT (PR #310 review round 2 blocker): this job executes target-
      # CONTROLLED code host-side (the cargo gate), so it holds NO credential at or after that
      # step and publishes NOTHING itself. The separate `publish` job (fresh runner, no target
      # code) opens the DRAFT PR, files follow-ups, and writes the final issue state. These
      # outputs are the bounded hand-off; they transit this runner post-gate, so the publish job
      # treats them as HINTS and re-derives everything trust-relevant clean-side: the branch
      # name is recomputed from run inputs, the head sha is checked against the live API (only
      # registry App tokens can push the per-run branch — the hostile gate held none), and a
      # forged outcome can at worst mis-set a status label or open a DRAFT PR that the
      # cross-provider review loop still fully guards (publish never arms).
      model_outcome: ${{ steps.model.outcome }}
      push_outcome: ${{ steps.push.outcome }}
      gate_outcome: ${{ steps.gate.outcome }}
      trust_outcome: ${{ steps.trust.outcome }}
      budget_exhausted: ${{ steps.budget.outputs.exhausted }}
      attempt_number: ${{ steps.attempt.outputs.number }}
      head_sha: ${{ steps.push.outputs.head_sha }}
      # provider_model is COSMETIC (PR-body text only); it never gates anything clean-side.
      provider_model: ${{ steps.selected.outputs.provider_model }}
      followups_b64: ${{ steps.followups-out.outputs.followups_b64 }}
      # Model-access health (registry #32): the sanitized exit CLASS of the model launch, surfaced
      # so the separate no-target-code `model_health` job records it (success or failure). The
      # provider/account/model come from the pre-hostile `claim` job outputs (not this job, which
      # runs target code), exactly like the provenance record.
      exit_class: ${{ steps.exit-class.outputs.class }}
      # The sanitized session-limit reset time worker-live.sh extracts (review defect #9); empty
      # for every other class. Feeds the provider-capped alert's "earliest known reset".
      reset_hint: ${{ steps.exit-class.outputs.reset_hint }}
    concurrency:
      group: worker-${{ inputs.target_repo }}-${{ inputs.issue_number }}
      cancel-in-progress: false
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Mint dry-run target-scoped App token (contents read only)
        id: app-token-dry
        if: ${{ inputs.dry_run }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ needs.resolve.outputs.target_owner }}
          repositories: ${{ needs.resolve.outputs.target_name }}
          permission-contents: read

      - name: Mint live target-scoped App token
        id: app-token-live
        if: ${{ !inputs.dry_run }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ needs.resolve.outputs.target_owner }}
          repositories: ${{ needs.resolve.outputs.target_name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          # Granted at App + installation level 2026-07-17 (maintainer): lets workers push
          # branches touching .github/workflows/* (role:ci issues were structurally blocked).
          permission-workflows: write

      - name: Verify target App identity and default branch
        id: target
        env:
          GH_TOKEN: ${{ steps.app-token-dry.outputs.token || steps.app-token-live.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          APP_SLUG: ${{ steps.app-token-dry.outputs.app-slug || steps.app-token-live.outputs.app-slug }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TOKEN" ]] || { echo '::error::target App token was not minted'; exit 1; }
          [[ -n "$APP_SLUG" ]] || { echo '::error::app slug was not resolved'; exit 1; }
          printf '::add-mask::%s\n' "$GH_TOKEN"
          gh api "repos/$TARGET_REPO" > "$RUNNER_TEMP/target.json"
          # An App INSTALLATION token cannot call /user; resolve the bot identity via the
          # public /users/<slug>[bot] endpoint instead. [OPUS-4.8] canary fix.
          gh api "/users/${APP_SLUG}[bot]" > "$RUNNER_TEMP/app-user.json"
          python3 - "$RUNNER_TEMP/target.json" "$RUNNER_TEMP/app-user.json" <<'PY'
          import json
          import os
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              repo = json.load(handle)
          with open(sys.argv[2], encoding="utf-8") as handle:
              user = json.load(handle)
          if repo.get("full_name") != os.environ["TARGET_REPO"]:
              raise SystemExit("App token read the wrong target")
          default_branch = repo.get("default_branch")
          login = user.get("login")
          user_id = str(user.get("id", ""))
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", str(default_branch)):
              raise SystemExit("target has an unsafe default branch")
          if not re.fullmatch(r"[A-Za-z0-9_.-]+\[bot\]", str(login)) or not user_id.isdigit():
              raise SystemExit("target token did not identify a GitHub App bot")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"default_branch={default_branch}\n")
              output.write(f"bot_login={login}\n")
              output.write(f"bot_id={user_id}\n")
          print(f"target token verified for {repo['full_name']} at {default_branch}")
          PY

      - name: Checkout target default branch with scoped App token (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ steps.target.outputs.default_branch }}
          path: target
          token: ${{ steps.app-token-dry.outputs.token || steps.app-token-live.outputs.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve claimed account to concrete target model
        id: selected
        if: ${{ inputs.dry_run || needs.claim.outputs.acquired == 'true' }}
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          ROUTING_PATH: ${{ needs.resolve.outputs.routing }}
          DRY_ACCOUNT: ${{ inputs.account }}
          DRY_MODEL: ${{ needs.resolve.outputs.model }}
          DRY_PROVIDER: ${{ needs.resolve.outputs.provider }}
          DRY_HARNESS: ${{ needs.resolve.outputs.harness }}
          DRY_PROVIDER_MODEL: ${{ needs.resolve.outputs.provider_model }}
          DRY_CREDENTIAL_FORMAT: ${{ needs.resolve.outputs.credential_format }}
          DRY_SECRET_REF: ${{ needs.resolve.outputs.secret_ref }}
          LIVE_ACCOUNT: ${{ needs.claim.outputs.account }}
          LIVE_MODEL: ${{ needs.claim.outputs.model }}
          LIVE_PROVIDER: ${{ needs.claim.outputs.provider }}
          LIVE_HARNESS: ${{ needs.claim.outputs.harness }}
          LIVE_CREDENTIAL_FORMAT: ${{ needs.claim.outputs.credential_format }}
          LIVE_SECRET_REF: ${{ needs.claim.outputs.secret_ref }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path, PurePosixPath
          import re
          import tomllib

          dry = os.environ["DRY_RUN"] == "true"
          target_root = Path(os.environ["GITHUB_WORKSPACE"], "target").resolve()
          routing_path = target_root.joinpath(*PurePosixPath(os.environ["ROUTING_PATH"]).parts).resolve()
          try:
              routing_path.relative_to(target_root)
          except ValueError as exc:
              raise SystemExit("resolved routing path escaped target checkout") from exc
          with open(routing_path, "rb") as handle:
              routing = tomllib.load(handle)

          if dry:
              account = os.environ["DRY_ACCOUNT"]
              model = os.environ["DRY_MODEL"]
              expected = {
                  "provider": os.environ["DRY_PROVIDER"],
                  "harness": os.environ["DRY_HARNESS"],
                  "provider_model": os.environ["DRY_PROVIDER_MODEL"],
                  "credential_format": os.environ["DRY_CREDENTIAL_FORMAT"],
              }
              secret_ref = os.environ["DRY_SECRET_REF"]
          else:
              account = os.environ["LIVE_ACCOUNT"]
              model = os.environ["LIVE_MODEL"]
              expected = {}
              secret_ref = os.environ["LIVE_SECRET_REF"]
          meta = routing.get("models", {}).get(model)
          if not isinstance(meta, dict):
              raise SystemExit("claimed model is missing from protected target routing")
          # A codex alias may leave provider_model unset/TBD (locked decision 14): worker-live.sh
          # then omits --model and the codex CLI default applies (the proven drain posture).
          provider_model = meta.get("provider_model")
          if meta.get("harness") == "codex" and provider_model in (None, "", "TBD"):
              provider_model = "TBD"
          values = {
              "account": account,
              "model": model,
              "provider": meta.get("provider"),
              "harness": meta.get("harness"),
              "provider_model": provider_model,
              "credential_format": meta.get("credential_format"),
              "secret_ref": secret_ref,
          }
          if values["provider"] not in {"openai", "anthropic"}:
              raise SystemExit("claimed model has an unsupported provider")
          if (values["provider"], values["harness"]) not in {
              ("openai", "codex"), ("anthropic", "claude")
          }:
              raise SystemExit("claimed model has an unsupported harness")
          if values["credential_format"] not in {
              "codex-auth-json", "claude-credentials-json", "claude-oauth-token", "anthropic-api-key"
          }:
              raise SystemExit("claimed model has an unsupported credential format")
          if not dry:
              claimed_provider = os.environ["LIVE_PROVIDER"]
              claimed_harness = os.environ["LIVE_HARNESS"]
              claimed_format = os.environ["LIVE_CREDENTIAL_FORMAT"]
              if claimed_provider and claimed_provider != values["provider"]:
                  raise SystemExit("claimed account provider conflicts with protected routing")
              if claimed_harness and claimed_harness != values["harness"]:
                  raise SystemExit("claimed account harness conflicts with protected routing")
              if claimed_format and claimed_format != values["credential_format"]:
                  raise SystemExit("claimed account credential format conflicts with protected routing")
          elif any(values[key] != value for key, value in expected.items()):
              raise SystemExit("dry-run account metadata drifted from protected routing")
          if not re.fullmatch(r"acct[0-9a-z]{2,}", str(account)):
              raise SystemExit("unsafe selected account")
          if secret_ref != f"{account.upper()}_TOKEN" or not re.fullmatch(r"[A-Z][A-Z0-9_]*", str(secret_ref)):
              raise SystemExit("unsafe selected secret_ref")
          for key, value in values.items():
              if not isinstance(value, str) or not value or "\n" in value or "\r" in value:
                  raise SystemExit(f"unsafe or missing selected value: {key}")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in values.items():
                  output.write(f"{key}={value}\n")
          # Privacy (locked decision 22b): public workflow logs never carry account handles.
          print(f"selected account resolved: model={model}, harness={values['harness']}")
          PY

      - name: Check durable per-issue attempt budget
        id: budget
        if: ${{ !inputs.dry_run && needs.claim.outputs.acquired == 'true' }}
        env:
          GH_TOKEN: ${{ steps.app-token-live.outputs.token }}
        run: |
          python3 registry/scripts/worker-issue.py attempt-check \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --max-attempts "${{ needs.resolve.outputs.max_attempts }}" \
            --bot-login "${{ steps.target.outputs.bot_login }}"

      - name: Last-step trust and issue-revision revalidation
        id: trust
        if: ${{ !inputs.dry_run && needs.claim.outputs.acquired == 'true' && steps.budget.outputs.exhausted != 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token-live.outputs.token }}
        run: |
          python3 registry/scripts/worker-issue.py reverify \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --expected-author "${{ needs.resolve.outputs.issue_author }}" \
            --expected-body-sha "${{ needs.resolve.outputs.issue_body_sha }}" \
            --trust-gate "$GITHUB_WORKSPACE/target/scripts/trust-gate.py" \
            --bot-login "${{ steps.target.outputs.bot_login }}" \
            --issue-file "$RUNNER_TEMP/verified-issue.json"

      - name: Mark trusted live issue in progress + post claim receipt
        if: ${{ !inputs.dry_run && needs.claim.outputs.acquired == 'true' && steps.trust.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token-live.outputs.token }}
          WORKER_MODEL: ${{ needs.claim.outputs.model }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 registry/scripts/worker-issue.py status \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --status in-progress
          # A GitHub App cannot be a literal issue assignee, so the receipt comment + the
          # status:in-progress label ARE the "orchestrator is working this" assignment.
          python3 registry/scripts/worker-issue.py claim-receipt \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --model "$WORKER_MODEL" --run-url "$RUN_URL" || true

      - name: Prepare isolated selected-account environment
        id: prepare
        if: ${{ inputs.dry_run || (needs.claim.outputs.acquired == 'true' && steps.trust.outcome == 'success') }}
        env:
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
          WORKER_ACCOUNT: ${{ steps.selected.outputs.account }}
          WORKER_ACCOUNT_CREDENTIAL: ${{ secrets[steps.selected.outputs.secret_ref] }}
          WORKER_PROVIDER: ${{ steps.selected.outputs.provider }}
          WORKER_HARNESS: ${{ steps.selected.outputs.harness }}
          WORKER_CREDENTIAL_FORMAT: ${{ steps.selected.outputs.credential_format }}
        run: bash registry/scripts/worker-prep.sh

      - name: Confirm dry-run boundary
        if: ${{ inputs.dry_run }}
        env:
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
          EXPECTED_HARNESS: ${{ steps.selected.outputs.harness }}
        run: |
          set -euo pipefail
          [[ "$HOME" == "$WORKER_ROOT/home" ]]
          [[ -x "$WORKER_ROOT/cli/node_modules/.bin/$EXPECTED_HARNESS" ]]
          printf 'DRY-RUN complete: policy, target token, checkout, and worker-prep passed.\n'
          printf 'No lease was claimed, no model was run, and no pull request was opened.\n'

      - name: Record model attempt
        id: attempt
        if: ${{ !inputs.dry_run && steps.prepare.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token-live.outputs.token }}
        run: |
          python3 registry/scripts/worker-issue.py record-attempt \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --max-attempts "${{ needs.resolve.outputs.max_attempts }}" \
            --bot-login "${{ steps.target.outputs.bot_login }}" \
            --run-key "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"

      - name: Run routed model headless on a fresh target branch
        id: model
        if: ${{ !inputs.dry_run && steps.attempt.outcome == 'success' }}
        working-directory: target
        env:
          # Deliberately NO GH_TOKEN here: the model container must never see a GitHub token
          # (commit/push/PR are host-side in the publish step; the prompt forbids gh use).
          TARGET_DIR: ${{ github.workspace }}/target
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_DEFAULT_BRANCH: ${{ steps.target.outputs.default_branch }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
          WORKER_ISSUE_FILE: ${{ runner.temp }}/verified-issue.json
          WORKER_MODEL_ALIAS: ${{ steps.selected.outputs.model }}
          WORKER_PROVIDER_MODEL: ${{ steps.selected.outputs.provider_model }}
          WORKER_AGENT: ${{ needs.resolve.outputs.agent }}
          WORKER_PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: bash ../registry/scripts/worker-live.sh model

      # Model-access health (registry #32): capture the sanitized exit CLASS so the separate
      # no-target-code `model_health` job can record it. worker-live.sh sets WORKER_EXIT_CLASS
      # (+ WORKER_RESET_HINT on session-limit) in $GITHUB_ENV on a FAILED launch only; a
      # successful model step means `success`. always() with NO skipped-guard (review defect #4):
      # a pre-launch abort (prep/attempt failure) or a job timeout/cancellation leaves the model
      # step skipped/cancelled with no host-observed CLI exit — that records class=unknown
      # (counted toward persistence, never a provider-outage) instead of recording nothing.
      - name: Capture model exit class
        id: exit-class
        if: ${{ always() && !inputs.dry_run }}
        env:
          MODEL_OUTCOME: ${{ steps.model.outcome }}
        run: |
          set -uo pipefail
          if [[ "$MODEL_OUTCOME" == "success" ]]; then
            cls=success
          elif [[ "$MODEL_OUTCOME" == "skipped" ]]; then
            cls=unknown   # pre-launch abort: no CLI ever ran
          else
            # failure OR cancellation/timeout: use the host-observed class when worker-live.sh
            # got far enough to write one; otherwise unknown.
            cls="${WORKER_EXIT_CLASS:-unknown}"
          fi
          echo "class=$cls" >> "$GITHUB_OUTPUT"
          echo "reset_hint=${WORKER_RESET_HINT:-}" >> "$GITHUB_OUTPUT"

      # Rotation write-back runs in the PRE-HOSTILE window (before the gate ever executes
      # target-controlled code), so REGISTRY_SECRETS_PAT never coexists with a possibly
      # compromised runner. It sits BEFORE the push-token mint so that mint's sole consumer can
      # follow it immediately (see the credential-boundary comment below).
      - name: Write back a rotated full account credential
        id: writeback
        if: ${{ always() && !inputs.dry_run && needs.claim.outputs.acquired == 'true' && steps.prepare.outcome == 'success' && steps.model.outcome != 'skipped' }}
        env:
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
          WORKER_ACCOUNT: ${{ steps.selected.outputs.account }}
          WORKER_SECRET_REF: ${{ steps.selected.outputs.secret_ref }}
          REGISTRY_REPO: ${{ github.repository }}
          REGISTRY_SECRETS_PAT: ${{ secrets.REGISTRY_SECRETS_PAT }}
        run: bash registry/scripts/worker-live.sh write-back

      # CREDENTIAL BOUNDARY (PR #310 review rounds 1+2, blocker): the gate below executes
      # target-CONTROLLED cargo build scripts/tests HOST-side. Code run there can outlive its
      # step (a detached process) and inspect ANY later process on this runner, so from the gate
      # onward NO step in this job may hold, mint, or receive a GitHub credential of any kind —
      # not the App private key (round 1) and not a minted installation token (round 2).
      # Everything privileged that used to follow the gate (DRAFT-PR publish, follow-up issues,
      # final issue state) now lives in the separate `publish` job on a FRESH runner that
      # executes no target code. This mint exists ONLY for the IMMEDIATELY-following push step,
      # which commits the model's work to the per-run candidate branch before any hostile code
      # runs; nothing else can push that branch (the hostile gate holds no token), so the clean
      # publish job treats the remote ref as the integrity-checked hand-off. Scope is narrowed
      # to what the push needs (contents + workflows write).
      #
      # TTL (target issue #126, round 2 major): the push is the SOLE consumer and runs as the
      # immediately-next step under its own 10-minute cap, so the 60-minute installation-token
      # TTL cannot expire between mint and use — there is no intervening step whose duration
      # could erode the window. Final-state no longer depends on this token at all: the publish
      # job mints its own fresh token immediately before its bounded writes, so the deferral
      # path always holds a valid credential even after a worker run that consumes the whole
      # job window. worker-live.sh's self-test structurally enforces all of this (mint→push
      # adjacency, no credential at/after the gate, bounded clean publish job), so a drive-by
      # step insertion turns the registry gate red. continue-on-error + the `|| app-token-live`
      # fallback keep a transient mint hiccup from being worse than the old single-mint
      # behaviour — a stale fallback fails the push CLOSED (git rejects an expired token), and
      # the clean publish job still writes status:deferred with its own fresh token.
      - name: Mint push-scoped App token (candidate-branch hand-off)
        id: app-token-post
        if: ${{ !inputs.dry_run && steps.model.outcome == 'success' }}
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ needs.resolve.outputs.target_owner }}
          repositories: ${{ needs.resolve.outputs.target_name }}
          permission-contents: write
          # Granted at App + installation level 2026-07-17 (maintainer): lets workers push
          # branches touching .github/workflows/* (role:ci issues were structurally blocked).
          permission-workflows: write

      - name: Commit and push the candidate branch (pre-gate; sole token consumer)
        id: push
        if: ${{ !inputs.dry_run && steps.model.outcome == 'success' }}
        timeout-minutes: 10
        working-directory: target
        env:
          GH_TOKEN: ${{ steps.app-token-post.outputs.token || steps.app-token-live.outputs.token }}
          TARGET_DIR: ${{ github.workspace }}/target
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
          WORKER_MODEL_ALIAS: ${{ steps.selected.outputs.model }}
          TARGET_BOT_LOGIN: ${{ steps.target.outputs.bot_login }}
          TARGET_BOT_ID: ${{ steps.target.outputs.bot_id }}
        run: bash ../registry/scripts/worker-live.sh push

      # Bounded transport for model-declared follow-ups: the payload must cross to the clean
      # publish job and is exported BEFORE the hostile gate runs. 64KB cap; over-limit is
      # dropped LOUDLY (no silent truncation). The content is model-authored and is validated
      # as untrusted data by worker-issue.py followup clean-side.
      - name: Export declared follow-ups for the clean publisher (bounded)
        id: followups-out
        if: ${{ !inputs.dry_run && steps.model.outcome == 'success' }}
        env:
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
        run: |
          set -euo pipefail
          spec="$WORKER_ROOT/followups.jsonl"
          if [[ ! -s "$spec" ]]; then
            printf 'worker: no model-declared follow-ups to export\n'
            exit 0
          fi
          size=$(wc -c < "$spec")
          if [[ "$size" -gt 65536 ]]; then
            printf '::warning::follow-ups exceed the 64KB transport bound (%s bytes); dropped — none will be filed\n' "$size"
            exit 0
          fi
          printf 'followups_b64=%s\n' "$(base64 -w0 -- "$spec")" >> "$GITHUB_OUTPUT"

      - name: Ensure a Rust toolchain for the crate-scoped gate
        # [OPUS-4.8] The gate runs `cargo clippy/test` directly on the runner; a stock ubuntu-latest may
        # have rustup with NO default toolchain set (and the target may pin one via rust-toolchain.toml),
        # which fails the gate with "rustup could not choose a version of cargo". Set one up in the target
        # dir so a rust-toolchain.toml pin is honoured; harmless for non-cargo gate profiles.
        if: ${{ !inputs.dry_run && steps.model.outcome == 'success' && steps.push.outcome == 'success' }}
        # Failure-bound hygiene cap. No token remains anywhere in this job from here on (the
        # push above was the last credentialed step), so this is not TTL arithmetic any more.
        timeout-minutes: 10
        working-directory: target
        run: |
          set -uo pipefail
          command -v rustup >/dev/null 2>&1 || { echo '::error::rustup not found on the runner'; exit 1; }
          rustup show active-toolchain >/dev/null 2>&1 || rustup default stable
          rustup show >/dev/null 2>&1 || true      # installs a rust-toolchain.toml-pinned toolchain if present
          rustup component add clippy rustfmt >/dev/null 2>&1 || true
          cargo --version; rustc --version

      - name: Run policy-selected local gate
        id: gate
        if: ${{ !inputs.dry_run && steps.model.outcome == 'success' && steps.push.outcome == 'success' }}
        # Hard cap: bounds how long target-controlled code may run host-side. It is no longer
        # TTL-load-bearing (the clean publish job mints its own fresh token immediately before
        # its writes), so an overlong gate simply fails CLOSED — the publish job skips the PR,
        # deletes the unpublished candidate branch, and writes status:deferred. This job holds
        # NO credential from the push step onward (PR #310 rounds 1+2); the gate runs on the
        # COMMITTED candidate tree and diffs against the recorded pre-model base
        # (WORKER_BASE_SHA via worker-live.sh _changed_paths).
        timeout-minutes: 40
        working-directory: target
        env:
          TARGET_DIR: ${{ github.workspace }}/target
          GATE_PROFILE: ${{ needs.resolve.outputs.gate_profile }}
          WORKER_PACKAGES: ${{ needs.resolve.outputs.packages }}
          # [OPUS-4.8] Credential-safety (security review, finding #3): do NOT `tee` the gate's own
          # stdout+stderr — which is target-CONTROLLED cargo output (build scripts / tests) — into a
          # runner-local file. An earlier revision did that to feed a diagnostics artifact; a hostile
          # build script could exhaust runner disk by writing the COMPLETE unbounded stream to that
          # file before any tail bounded it. The gate's stream is already surfaced verbatim in the
          # GitHub job log (streamed off-runner, not a local file), which is a sufficient and safe
          # crash signal. The failure-class annotation below reads only host-derived step outcomes.
        run: bash ../registry/scripts/worker-live.sh gate

      # NOTE (PR #310 round 2): DRAFT-PR creation, follow-up filing, and the final issue state
      # all moved to the separate `publish` job below — this job runs target-controlled code
      # (the gate) and may hold no credential from the push step onward.

      # [OPUS-4.8] The diagnostics ARTIFACT was DROPPED for credential-safety (security review,
      # finding #1). Rationale: the `gate` step above runs target-CONTROLLED cargo (build scripts /
      # tests) while the job env exposes the account handle and credential file paths. Any file the
      # artifact bundled lived at a path that hostile cargo could write to (it could plant credentials
      # or a raw model transcript into the predictable diagnostics dir), and the artifact uploaded the
      # directory WHOLESALE — an exfiltration channel. Even the "expected" files were unsafe: the gate
      # output is unredacted target output and error-signals.log is raw CLI stderr. The artifact was
      # only a nice-to-have: the primary crash signal (the `gate` step's nonzero exit + its verbatim
      # stdout/stderr already in the GitHub job log) is preserved without it. The failure-class
      # annotation below carries the essential, bounded, host-derived signal instead.

      - name: Cleanup isolated worker state
        if: ${{ always() }}
        env:
          WORKER_ROOT: ${{ runner.temp }}/registry-worker
        run: rm -rf -- "$WORKER_ROOT"

      # [OPUS-4.8] Fail-SOFT failure-class annotation (security review, finding #2). This step ONLY
      # annotates; it must NEVER become the terminal failure signal or mask the real cause, so it is
      # `continue-on-error: true` and does NOT `exit 1` (an unconditional nonzero here would re-mask
      # the primary signal — the very masking this diagnostics work set out to remove). The genuine
      # failure is already surfaced by the `gate`/`push` steps' own nonzero exits and the gate's
      # verbatim output in the job log. The annotation carries ONLY bounded, host-derived values: the
      # class of failure (which step outcome) and the resolved WORKER_PACKAGES atom(s). It deliberately
      # echoes NO target-controlled content (no raw gate stderr, no CLI stderr, no transcript, no
      # account handle / credential paths), so there is no path for hostile cargo output to reach it.
      - name: Preserve live-attempt failure signal (annotation only)
        if: ${{ always() && !inputs.dry_run && needs.claim.outputs.acquired == 'true' && steps.budget.outputs.exhausted != 'true' && steps.trust.outcome == 'success' && (steps.gate.outcome != 'success' || steps.push.outcome != 'success') }}
        continue-on-error: true
        env:
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          MODEL_OUTCOME: ${{ steps.model.outcome }}
          PUSH_OUTCOME: ${{ steps.push.outcome }}
          RESOLVED_PACKAGES: ${{ needs.resolve.outputs.packages }}
        run: |
          set -uo pipefail
          echo '::warning::Live worker attempt did not produce a publishable gated branch (model outcome='"${MODEL_OUTCOME:-?}"', push outcome='"${PUSH_OUTCOME:-?}"', gate outcome='"${GATE_OUTCOME:-?}"').'
          if [[ "${MODEL_OUTCOME:-}" == "success" && "${GATE_OUTCOME:-}" != "success" ]]; then
            echo '::warning::The model produced work but the local gate did not pass for package atom(s) ['"${RESOLVED_PACKAGES:-?}"'] — the gate error is in this run job log above (the Run policy-selected local gate step output); no artifact is produced by design (credential-safety).'
          fi

  # CLEAN PUBLISHER (PR #310 review round 2 blocker). The worker job executes target-controlled
  # cargo code host-side (the gate); a detached process started there can observe any LATER
  # process on that runner, so no privileged write may follow the gate inside that job. This job
  # runs on a FRESH runner, executes NO target code (it never even checks the target out), and
  # re-derives every trust-relevant fact instead of trusting worker-job outputs: the candidate
  # branch name is recomputed from run inputs, its head sha is read from the live API and must
  # match the pre-gate push (only registry App tokens can push the per-run branch — the hostile
  # gate held none), and the issue snapshot is re-fetched and bound to the resolve job's
  # recorded author + body sha. The token is minted HERE, immediately before its bounded writes
  # (10-minute job cap ≪ the 60-minute installation-token TTL — the round-2 fail-closed
  # recovery guarantee: final-state ALWAYS holds a valid token, even after a worker run that
  # consumed its whole window or died mid-job). Worker outcomes only gate WHICH writes run; a
  # forged outcome can at worst mis-set a status label or open a DRAFT PR that the
  # cross-provider review loop still fully guards (publish never arms).
  publish:
    name: Publish gated work and final state (no target code runs here)
    if: ${{ always() && !inputs.dry_run && needs.resolve.result == 'success' && needs.worker.result != 'skipped' }}
    needs: [resolve, claim, worker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
      bot_login: ${{ steps.target.outputs.bot_login }}
    env:
      # Recomputed from trusted run context — byte-identical to run_model's construction;
      # deliberately NEVER taken from a worker-job output.
      WORKER_BRANCH: sparq-agent/issue-${{ inputs.issue_number }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Mint publish-scoped App token (fresh, immediately before its bounded writes)
        id: app-token-publish
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ needs.resolve.outputs.target_owner }}
          repositories: ${{ needs.resolve.outputs.target_name }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Verify target App identity and default branch
        id: target
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          APP_SLUG: ${{ steps.app-token-publish.outputs.app-slug }}
        run: |
          set -euo pipefail
          [[ -n "$GH_TOKEN" ]] || { echo '::error::target App token was not minted'; exit 1; }
          [[ -n "$APP_SLUG" ]] || { echo '::error::app slug was not resolved'; exit 1; }
          printf '::add-mask::%s\n' "$GH_TOKEN"
          gh api "repos/$TARGET_REPO" > "$RUNNER_TEMP/target.json"
          gh api "/users/${APP_SLUG}[bot]" > "$RUNNER_TEMP/app-user.json"
          python3 - "$RUNNER_TEMP/target.json" "$RUNNER_TEMP/app-user.json" <<'PY'
          import json
          import os
          import re
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              repo = json.load(handle)
          with open(sys.argv[2], encoding="utf-8") as handle:
              user = json.load(handle)
          if repo.get("full_name") != os.environ["TARGET_REPO"]:
              raise SystemExit("App token read the wrong target")
          default_branch = repo.get("default_branch")
          login = user.get("login")
          user_id = str(user.get("id", ""))
          if not re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.-]*", str(default_branch)):
              raise SystemExit("target has an unsafe default branch")
          if not re.fullmatch(r"[A-Za-z0-9_.-]+\[bot\]", str(login)) or not user_id.isdigit():
              raise SystemExit("target token did not identify a GitHub App bot")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"default_branch={default_branch}\n")
              output.write(f"bot_login={login}\n")
          print(f"target token verified for {repo['full_name']} at {default_branch}")
          PY

      # Integrity bind (round 2 fix_hint): the PR title/body derive from the live issue, which
      # must still match the author + body sha the pre-hostile resolve job recorded — an issue
      # edited mid-run fails CLOSED to the deferral path instead of publishing stale trust.
      - name: Rebuild the verified issue snapshot (bound to resolve-time author + body sha)
        id: issue
        if: ${{ needs.worker.outputs.gate_outcome == 'success' && needs.worker.outputs.push_outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          EXPECTED_AUTHOR: ${{ needs.resolve.outputs.issue_author }}
          EXPECTED_BODY_SHA: ${{ needs.resolve.outputs.issue_body_sha }}
        run: |
          set -euo pipefail
          gh api "repos/$TARGET_REPO/issues/$ISSUE_NUMBER" > "$RUNNER_TEMP/issue.json"
          python3 - "$RUNNER_TEMP/issue.json" "$RUNNER_TEMP/verified-issue.json" <<'PY'
          import hashlib
          import json
          import os
          import sys

          src, dst = sys.argv[1:]
          with open(src, encoding="utf-8") as handle:
              issue = json.load(handle)
          author = (issue.get("user") or {}).get("login")
          body_sha = hashlib.sha256((issue.get("body") or "").encode()).hexdigest()
          if author != os.environ["EXPECTED_AUTHOR"]:
              raise SystemExit("issue author changed since resolve; refusing to publish")
          if body_sha != os.environ["EXPECTED_BODY_SHA"]:
              raise SystemExit("issue body changed since resolve; refusing to publish")
          with open(dst, "w", encoding="utf-8") as handle:
              json.dump(issue, handle)
          print("issue snapshot rebuilt and bound to the resolve-time author/body sha")
          PY

      - name: Open DRAFT target pull request (review pending)
        id: pr
        if: ${{ needs.worker.outputs.gate_outcome == 'success' && needs.worker.outputs.push_outcome == 'success' && steps.issue.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
          TARGET_DEFAULT_BRANCH: ${{ steps.target.outputs.default_branch }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          WORKER_ROOT: ${{ runner.temp }}/registry-publish
          WORKER_ISSUE_FILE: ${{ runner.temp }}/verified-issue.json
          # Implementer identity from the pre-hostile claim job (like provenance), never from
          # the worker job.
          WORKER_MODEL_ALIAS: ${{ needs.claim.outputs.model }}
          WORKER_PROVIDER: ${{ needs.claim.outputs.provider }}
          # Cosmetic PR-body text only; transits the worker job but gates nothing.
          WORKER_PROVIDER_MODEL: ${{ needs.worker.outputs.provider_model }}
          WORKER_AGENT: ${{ needs.resolve.outputs.agent }}
          GATE_PROFILE: ${{ needs.resolve.outputs.gate_profile }}
          ARM_AUTO_MERGE_REQUESTED: ${{ needs.resolve.outputs.arm_auto_merge }}
          # The head sha the pre-gate push recorded; worker-live.sh publish requires the live
          # API ref to match it exactly (fail closed on any drift or forgery).
          WORKER_EXPECTED_HEAD_SHA: ${{ needs.worker.outputs.head_sha }}
        run: bash registry/scripts/worker-live.sh publish

      - name: Create declared follow-up issues (discovered out-of-scope work)
        # Best-effort; never fails the pipeline. The payload crossed as a bounded base64 output
        # exported BEFORE the hostile gate; worker-issue.py followup validates it as untrusted
        # data (dedup + schema) before any issue is filed.
        if: ${{ always() && needs.worker.outputs.model_outcome == 'success' && needs.worker.outputs.followups_b64 != '' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          FOLLOWUPS_B64: ${{ needs.worker.outputs.followups_b64 }}
        run: |
          set -uo pipefail
          spec="$RUNNER_TEMP/followups.jsonl"
          if ! printf '%s' "$FOLLOWUPS_B64" | base64 -d > "$spec" 2>/dev/null; then
            printf '::warning::follow-up payload is not valid base64; none filed\n'
            exit 0
          fi
          for l in from:agent self-improvement; do
            gh label create "$l" -R "${{ inputs.target_repo }}" --color ededed \
              --description "worker-discovered follow-up" 2>/dev/null || true
          done
          python3 registry/scripts/worker-issue.py followup \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --spec-file "$spec" || true

      - name: Set final target issue state
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          ACQUIRED: ${{ needs.claim.outputs.acquired }}
          EXHAUSTED: ${{ needs.worker.outputs.budget_exhausted }}
          TRUST_OUTCOME: ${{ needs.worker.outputs.trust_outcome }}
          ATTEMPT_NUMBER: ${{ needs.worker.outputs.attempt_number }}
          MAX_ATTEMPTS: ${{ needs.resolve.outputs.max_attempts }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          set -euo pipefail
          status=deferred
          if [[ "$ACQUIRED" == true && "$EXHAUSTED" == true ]]; then
            status=needs-user
          elif [[ "$ACQUIRED" == true && -n "$PR_URL" ]]; then
            # Completion is DEFERRED to the review-fix ARM path (the issue closes only when its
            # PR is approved cross-provider and armed); the review loop owns it from here.
            status=in-progress-review
          elif [[ "$ACQUIRED" == true && "$TRUST_OUTCOME" == success \
                  && "$ATTEMPT_NUMBER" =~ ^[1-9][0-9]*$ \
                  && "$MAX_ATTEMPTS" =~ ^[1-9][0-9]*$ \
                  && "$ATTEMPT_NUMBER" -ge "$MAX_ATTEMPTS" ]]; then
            status=needs-user
          fi
          python3 registry/scripts/worker-issue.py status \
            --repo "${{ inputs.target_repo }}" \
            --issue "${{ inputs.issue_number }}" \
            --status "$status" ||
            printf '%s\n' "::warning::Could not set final target issue state to $status"

      # A pushed candidate whose gate did not pass is intentionally unpublished: remove its
      # branch (best-effort) so gate-failed attempts do not accumulate refs on the target. A
      # gate-PASSED branch is never deleted here, even when PR creation itself failed — the
      # gated work stays recoverable.
      - name: Delete the unpublished candidate branch (gate did not pass)
        if: ${{ always() && needs.worker.outputs.push_outcome == 'success' && needs.worker.outputs.gate_outcome != 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token-publish.outputs.token }}
          TARGET_REPO: ${{ inputs.target_repo }}
        run: |
          gh api --method DELETE "repos/$TARGET_REPO/git/refs/heads/$WORKER_BRANCH" ||
            printf '::warning::could not delete the unpublished candidate branch\n'

  # Provenance is REGISTRY-recorded and is the review loop's root of trust: the review sweep
  # fails closed on a missing record (the PR is never enumerated), so this job must FAIL LOUD —
  # recovery for a missed record is scripts/backfill-provenance.py. It runs as its OWN job (not
  # inside `worker`) because the worker job executes hostile target code host-side (the cargo
  # gate) BEFORE publish: a registry-write token co-located there could be hijacked (poisoned
  # registry checkout / $GITHUB_ENV / a lingering process) to forge provenance for arbitrary PRs
  # — precisely what this record must make impossible. This job executes NO target code, takes
  # the implementer identity from the pre-hostile claim outputs, verifies the (post-hostile)
  # pr_number against the live API bound to THIS run's issue, and stores only the SALTED account
  # hash (privacy: the registry is public — locked decision 22a).
  provenance:
    name: Record implementer provenance (no target code runs here)
    # pr_number/bot_login come from the CLEAN publish job (no target code), not the worker.
    if: ${{ always() && !inputs.dry_run && needs.claim.outputs.acquired == 'true' && needs.publish.outputs.pr_number != '' }}
    needs: [resolve, claim, publish]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # registry provenance file via github.token — never in the worker job
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Record implementer provenance in the registry (salted account hash only)
        env:
          GH_TOKEN: ${{ github.token }}
          # Raw handle + salt arrive via env only (argv is echoed into public logs) and only the
          # 16-hex hash is stored; this job runs no target code, so the salt cannot leak to it.
          WORKER_IMPL_ACCOUNT: ${{ needs.claim.outputs.account }}
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          python3 registry/scripts/worker-pr.py provenance-record \
            --registry-repo "$GITHUB_REPOSITORY" \
            --target-repo "${{ inputs.target_repo }}" \
            --pr "${{ needs.publish.outputs.pr_number }}" \
            --impl-provider "${{ needs.claim.outputs.provider }}" \
            --impl-alias "${{ needs.claim.outputs.model }}" \
            --issue "${{ inputs.issue_number }}" \
            --run-key "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT" \
            --verify-bot-login "${{ needs.publish.outputs.bot_login }}"

      - name: Mint App token for the review-state stamp
        id: app-token-stamp
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.REGISTRY_ADMIN_APP_ID }}
          private-key: ${{ secrets.REGISTRY_ADMIN_APP_KEY }}
          owner: ${{ needs.resolve.outputs.target_owner }}
          repositories: ${{ needs.resolve.outputs.target_name }}
          permission-issues: write
          permission-pull-requests: write

      - name: Stamp the initial review state on the draft PR
        env:
          GH_TOKEN: ${{ steps.app-token-stamp.outputs.token }}
        run: |
          python3 registry/scripts/worker-pr.py review-state set \
            --repo "${{ inputs.target_repo }}" \
            --pr "${{ needs.publish.outputs.pr_number }}" \
            --state needs

  # Model-access health record (registry #32): consumes the worker's exit CLASS (success OR any
  # failure) into the registry model-health ledger so `decide` (in the groom sweep) can alert when
  # a whole provider stops having working model access. A SEPARATE job — like `provenance` — because
  # the worker job executes hostile target code host-side (the cargo gate): a registry-write token
  # co-located there could forge health records. This job runs NO target code, takes the raw handle
  # via env (salted before it reaches the ledger — decision 22a), and never fails the pipeline.
  model_health:
    name: Record model-access health (no target code runs here)
    if: ${{ always() && !inputs.dry_run && needs.claim.outputs.acquired == 'true' && needs.worker.outputs.exit_class != '' }}
    needs: [resolve, claim, worker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # CAS-append data/model-health.json (on the `ledger` branch) via github.token
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Append the model-access health record (salted account hash only)
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_REPO: ${{ github.repository }}
          # Raw handle + salt arrive via env only (argv is echoed into public logs); the script
          # salts the handle so only the 16-hex hash is stored. This job runs no target code.
          WORKER_ACCOUNT_HANDLE: ${{ needs.claim.outputs.account }}
          PROVENANCE_SALT: ${{ secrets.PROVENANCE_SALT }}
        run: |
          python3 registry/scripts/model-health.py record \
            --provider "${{ needs.claim.outputs.provider }}" \
            --model-alias "${{ needs.claim.outputs.model }}" \
            --exit-class "${{ needs.worker.outputs.exit_class }}" \
            --reset-hint "${{ needs.worker.outputs.reset_hint }}" \
            --run-id "$GITHUB_RUN_ID.$GITHUB_RUN_ATTEMPT"

  release:
    name: Always release live account lease
    if: ${{ always() && !inputs.dry_run && needs.claim.outputs.acquired == 'true' }}
    needs: [claim, worker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout private registry (pinned, no persisted token)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: registry
          persist-credentials: false

      - name: Release CAS lease by claim id
        env:
          GH_TOKEN: ${{ github.token }}
          CLAIM_ID: ${{ needs.claim.outputs.claim_id }}
        run: |
          set -euo pipefail
          [[ "$CLAIM_ID" =~ ^[0-9a-f]{32}$ ]] || { echo '::error::unsafe or missing claim id'; exit 1; }
          python3 registry/scripts/select-and-claim.py \
            --release "$CLAIM_ID" \
            --repo "$GITHUB_REPOSITORY"

  # Doorbell: dispatch.yml's workflow_run trigger NEVER fires for these runs — they are
  # started via the repo GITHUB_TOKEN, and GitHub suppresses workflow-triggering events
  # from GITHUB_TOKEN-initiated runs (measured 2026-07-17: zero workflow_run deliveries).
  # workflow_dispatch API calls are the documented exception to that suppression, so each
  # finished run explicitly re-rings the dispatcher; its registry-dispatcher concurrency
  # group coalesces bursts. always(): a FAILED run is exactly when the sweep must
  # re-enumerate (deferral repair, missed-fix accounting, next round).
  doorbell:
    name: doorbell (re-ring dispatcher)
    # publish is in needs so the DRAFT PR + final issue state exist before the sweep re-plans.
    needs: [release, publish]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      actions: write
    steps:
      - name: Ring dispatch.yml
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run dispatch.yml -R "$GITHUB_REPOSITORY" || echo "::warning::doorbell ring failed (cron backstop covers this tick)"
