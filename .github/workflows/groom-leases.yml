# [OPUS-4.8] Lease groomer (review C3 companion): a cron that CAS-removes expired leases from the
# ledger so a crashed/cancelled worker's slot is freed. Necessary counterpart to the lease allocator —
# without it, a dead worker's lease lingers until nothing reclaims it.
name: groom-leases
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write   # CAS-update data/leases.json

jobs:
  reclaim:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Reclaim expired leases
        run: python3 scripts/select-and-claim.py --reclaim --repo "${{ github.repository }}"
