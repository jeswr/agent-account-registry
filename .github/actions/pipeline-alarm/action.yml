# [FABLE-5] Unified loud-fail pipeline alarm — the shared FINAL step every pipeline workflow wires
# in as `if: ${{ failure() || cancelled() }}`. On any job failure/cancel/skip it classifies the
# failure, captures a credential-safe diagnostic tail, and upserts the single rolling
# "⚠️ pipeline failures" issue (label `pipeline-alert`, deduped by a hidden body marker). See
# scripts/pipeline-alarm.py for the full contract. FAIL-SOFT: this action never masks the primary
# failure — its own step is `continue-on-error`-safe and the script always exits 0.
#
# SELF-CONTAINED BY DESIGN — and enforced, not merely claimed (review P2): the action performs its
# OWN pinned checkout of the registry at the RUNNING WORKFLOW's commit (${{ github.sha }}, sparse:
# just scripts/pipeline-alarm.py) into a private action-owned path, and executes ONLY that copy. It
# NEVER prefers ${GITHUB_WORKSPACE}/scripts — a workspace copy is whatever the calling job's earlier
# steps left there, and the documented in-job usage runs AFTER those steps, so a hostile target
# checkout could otherwise substitute the script that receives the registry/alert tokens. The
# isolated checkout works whether or not the caller ever checked the registry out, and its own
# failure degrades fail-soft (continue-on-error + a loud ::error:: annotation), never masking the
# primary failure and never reddening a healthy `mode: resolve` run.
name: pipeline-alarm
description: >-
  Loud, deduped, credential-safe pipeline-failure alarm. Wire as the final
  `if: ${{ failure() || cancelled() }}` step so no pipeline failure is ever silent.
inputs:
  mode:
    description: >-
      `alarm` (default) records a failure. `resolve` is the HEALTHY-tick recovery path
      (pipeline-alarm.py --resolve): prunes this workflow's rows from the rolling alert and
      auto-closes it once the ledger empties. Wire `resolve` from an all-jobs-succeeded recover
      job so a recovered workflow's stale rows never pin the alert open forever.
    required: false
    default: "alarm"
  job-name:
    description: The failing job's display name (e.g. matrix.job.name). Defaults to $GITHUB_JOB.
    required: false
    default: ""
  job-result:
    description: >-
      The failing job's result. From a FINAL-alarm job pass `needs.<job>.result`; from an in-job
      final step pass the empty string (the step only runs on failure(), so failure is implied).
    required: false
    default: "failure"
  failed-step:
    description: Best-effort name of the step that failed (credential-safe; sanitized regardless).
    required: false
    default: ""
  detail:
    description: >-
      Optional short diagnostic string. CREDENTIAL-SAFE ONLY — never pass a token, account handle,
      or model transcript; the script re-sanitizes it, but keep it host-observable (an error class
      / exit code / step name), mirroring worker-live.sh.
    required: false
    default: ""
  cancelled:
    description: "true if the run was cancelled/timed-out (pass ${{ cancelled() }})."
    required: false
    default: "false"
  registry-token:
    description: >-
      Token to READ the registry (for the pinned checkout) and WRITE the alert issue. Pass
      ${{ github.token }} in the registry's own workflows. Needs contents:read + issues:write.
    required: true
  alert-repo:
    description: Optional private ALERT_REPO override (privacy routing, cf model-health/usage-alert).
    required: false
    default: ""
  alert-token:
    description: Token with issues:write on alert-repo (required only if alert-repo is a private one).
    required: false
    default: ""
  maintainer:
    description: Maintainer handle to @-mention in the alert.
    required: false
    default: "jeswr"
runs:
  using: composite
  steps:
    # The pinned ISOLATED checkout that makes the header's hostile-workspace guarantee true: the
    # registry at the exact commit the running workflow was loaded from (github.sha — never a
    # movable ref a concurrent push could swap under us), sparse to the one script, into an
    # action-owned path. actions/checkout's default clean pass wipes anything a hostile earlier
    # step pre-planted at this path. continue-on-error: an unreachable checkout must neither mask
    # the primary failure nor redden a healthy resolve run — the run step below degrades LOUD.
    - name: Isolated pinned checkout of the registry alarm script
      continue-on-error: true
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        repository: ${{ github.repository }}
        ref: ${{ github.sha }}
        token: ${{ inputs.registry-token }}
        persist-credentials: false
        path: .pipeline-alarm-isolated
        sparse-checkout: |
          scripts/pipeline-alarm.py
        sparse-checkout-cone-mode: false

    - name: Raise the loud, deduped, credential-safe pipeline-failure alarm
      shell: bash
      env:
        ALARM_MODE: ${{ inputs.mode }}
        ALARM_GH_TOKEN: ${{ inputs.registry-token }}
        REGISTRY_REPO: ${{ github.repository }}
        ALERT_REPO: ${{ inputs.alert-repo }}
        ALERT_TOKEN: ${{ inputs.alert-token }}
        MAINTAINER_HANDLE: ${{ inputs.maintainer }}
        ALARM_JOB_NAME: ${{ inputs.job-name }}
        ALARM_JOB_RESULT: ${{ inputs.job-result }}
        ALARM_FAILED_STEP: ${{ inputs.failed-step }}
        ALARM_DETAIL: ${{ inputs.detail }}
        ALARM_CANCELLED: ${{ inputs.cancelled }}
      run: |
        set -uo pipefail
        printf '::add-mask::%s\n' "$ALARM_GH_TOKEN"
        if [ -n "${ALERT_TOKEN:-}" ]; then printf '::add-mask::%s\n' "$ALERT_TOKEN"; fi
        # ONLY the isolated pinned checkout above — NEVER a caller-workspace copy, which the
        # calling job's earlier (possibly hostile-target) steps could have substituted before this
        # final step runs with the registry/alert tokens in its environment.
        script="${GITHUB_WORKSPACE}/.pipeline-alarm-isolated/scripts/pipeline-alarm.py"
        if [ ! -f "$script" ]; then
          # Degrade LOUD but never mask the primary failure (the script IS the alarm; if even its
          # isolated checkout failed, this annotation is the alarm surface). exit 0 also keeps a
          # healthy `mode: resolve` run green (recovery is best-effort, retried next tick).
          echo "::error::pipeline-alarm: isolated pinned checkout failed — pipeline ${ALARM_MODE} for ${GITHUB_WORKFLOW}/${GITHUB_JOB} is NOT recorded to an issue (a failure is still red in Actions; a recovery retries next healthy tick)"
          exit 0
        fi
        # Self-test first (the alarm's own correctness is load-bearing); a self-test failure still
        # degrades to an annotation, never to masking the primary failure.
        python3 "$script" --self-test || \
          echo "::error::pipeline-alarm: self-test FAILED; attempting the alert anyway (fail-soft)"
        if [ "$ALARM_MODE" = "resolve" ]; then
          python3 "$script" --resolve
        else
          python3 "$script"
        fi
        # Leave nothing behind in the shared workspace (the checkout is this action's own concern).
        rm -rf "${GITHUB_WORKSPACE}/.pipeline-alarm-isolated" || true
        exit 0
