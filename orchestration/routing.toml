# Routing table for the SELF-MANAGED registry target (jeswr/agent-account-registry).
# PUBLIC — no account information. Same schema + consumer contract as sparq's
# orchestration/routing.toml: the dispatch PLAN clones this repo and reads this file BY THE
# ROUTING POINTER in policy/repos.toml, and route-resolve.py / policy-resolve.py resolve a
# triaged issue's role/labels to a MODEL fallback-chain + agent.
#
# PRECEDENCE (consumer contract, identical to sparq): security-label overrides > explicit role >
# [defaults], evaluated top-to-bottom, FIRST MATCH WINS. The `[[route]]` blocks with `match_labels`
# (the security surfaces) are listed FIRST and win over the role blocks below them.
#
# match_labels SEMANTICS: a rule matches if ANY of the issue's labels CONTAINS any listed keyword
# as a SUBSTRING. This is ALSO the signal the review-lane arm-side security classifier consults
# (worker-pr.py security_flagged / dispatch-claim.py _security_flagged read the target routing's
# match_labels keywords), so the trust-surface areas below are load-bearing for the arm gate, not
# only for model selection: a review that approves an issue matched here is routed to a HUMAN arm
# (needs:user), never auto-armed. THIS repo is the orchestration trust plane, so its worker/
# dispatch/set-up-account/review-loop/groom areas ARE security surfaces.

# ---------------------------------------------------------------------------------------------------
# [models] — the catalog. Mirrors sparq's catalog so the shared account_pool + cross-provider
# review/fix chains resolve identically. A model alias -> provider + harness + concrete provider
# model id + credential format.
[models.haiku]
provider = "anthropic"
harness = "claude"
provider_model = "claude-haiku-4-5"
credential_format = "claude-oauth-token"
[models.sonnet]
provider = "anthropic"
harness = "claude"
provider_model = "claude-sonnet-4-6"
credential_format = "claude-oauth-token"
[models.opus]
provider = "anthropic"
harness = "claude"
provider_model = "claude-opus-4-8"
credential_format = "claude-oauth-token"
[models.fable]
provider = "anthropic"
harness = "claude"
provider_model = "claude-fable-5"
credential_format = "claude-oauth-token"
[models.terra]
provider = "openai"
harness = "codex"
provider_model = ""                    # EMPTY = omit --model: the codex CLI default tracks the account's
                                       # supported model. A literal placeholder here ("TBD") reached
                                       # `codex exec --model TBD` in every terra fleet worker -> API 400 /
                                       # degraded no-tool-call fallback ("model produced no repository
                                       # changes", 8/8 uniform 2026-07-18). Set a concrete id only once
                                       # verified against the worker account type.
credential_format = "codex-auth-json"
[models.sol]
provider = "openai"
harness = "codex"
provider_model = "gpt-5.6-sol"         # Frontier codex model (maintainer 2026-07-18): leads impl/ci/site
                                       # chains (credit abundance) + reviews anthropic-authored content.
credential_format = "codex-auth-json"
[models.luna]
provider = "openai"
harness = "codex"
provider_model = "gpt-5.6-luna"        # Second codex tier (opus<luna<fable<sol); sol's fallback.
credential_format = "codex-auth-json"

[defaults]
model_chain = ["sol", "fable", "opus"]
agent = "registry-impl"

# ---------------------------------------------------------------------------------------------------
# SECURITY-LABEL OVERRIDES (first-match; win over role). On the trust plane the orchestration
# surfaces themselves are soundness surfaces: any issue whose labels touch dispatch / worker /
# set-up-account / review-loop / groom runs on Opus and, on chain-exhaustion, ESCALATES to a human
# (needs:user) rather than degrading to a weaker/cross-provider model. `escalate = true` is
# consumed by dispatch (escalate_starved) AND the substring keywords here are read by the review
# lane's arm-side classifier so an approved trust-surface PR is HUMAN-armed, never auto-armed.
[[route]]
match_labels = [
  "dispatch", "worker", "set-up-account", "review-loop", "groom",
  "zk", "mpc", "crypto", "auth", "e2ee",
]
model_chain = ["opus"]
agent = "registry-reviewer"
escalate = true

# ---------------------------------------------------------------------------------------------------
# ROLE ROUTES. Fable is the primary code-writer; terra (GPT) is the cross-provider implementation
# fallback so an Anthropic outage does not stall implementation. docs -> haiku-led (cheap).
[[route]]
role = "impl"
model_chain = ["sol", "fable", "opus"]
agent = "registry-impl"

# [FABLE-5] STANDING RULE — UI/front-end ownership (maintainer decision 2026-07-17): UI/front-end
# surfaces route to the openai/codex model chain (original-builder ownership: GPT-5.6 codex built
# the registry dashboard, e4098b9). Repos onboarded to the registry inherit this default — mirror
# this route (terra-led site chain) into each target's routing.toml (sparq's already carries it).
# Deliberately a ROLE route, not match_labels: the arm-side security classifier (review-fix.yml)
# unions ALL match_labels keywords, so UI keywords there would human-arm every UI PR.
[[route]]
role = "site"
model_chain = ["sol", "fable", "opus"]
agent = "registry-impl"

# [FABLE-5] STANDING RULE — frontier-tier CI/infrastructure authorship (maintainer decision
# 2026-07-17, same standing-rule pattern as the UI→codex route above): ALL CI/infrastructure work
# — .github/workflows, gate aggregators, orchestration plumbing, the self-draining pipeline itself
# — is authored by a FRONTIER-tier model only: fable (Claude Fable) or terra (GPT-5.6 sol/codex).
# Cheaper tiers (sonnet/haiku) no longer author infra; cross-provider review is unchanged.
# FRONTIER-ONLY chain rather than a floor marker: the routing schema has no floor/pin field (the
# fix-floor pin is a review-loop concept, dispatch-claim.py), and chain exhaustion at the claim
# step already DEFERS the item (retried next tick) instead of degrading — see dispatch-claim's
# "a starved pinned chain DEFERS (defer-not-fallback)" self-test. NOT `escalate = true` (that
# flips a starved item to needs:user; this rule wants defer+retry). On THIS repo most infra
# surfaces (dispatch/worker/set-up-account/review-loop/groom) are trust surfaces matched by the
# security override above, which still WINS (opus + human arm) — correct and unchanged; role:ci
# covers the residual CI plumbing (.github/workflows etc., triage labels area:ci/area:workflows).
# Repos onboarded to the registry inherit this rule — mirror a frontier-only `role = "ci"` chain
# into each target's routing.toml (sparq-org/sparq carries it, PR #3422).
[[route]]
role = "ci"
model_chain = ["sol", "fable"]
agent = "registry-ci"

[[route]]
role = "research"
model_chain = ["fable", "opus"]
agent = "registry-researcher"

[[route]]
role = "docs"
model_chain = ["haiku", "fable"]
agent = "registry-docs"

# Review / soundness: Opus only; escalate to a human on unavailability (never fall to a weaker
# model). The review chain proper is computed cross-provider by dispatch-claim.py; this row exists
# so a `role:review`/`role:soundness` issue resolves + so policy-resolve escalate is set.
[[route]]
role = "review"
model_chain = ["opus"]
agent = "registry-reviewer"
escalate = true

[[route]]
role = "soundness"
model_chain = ["opus"]
agent = "registry-reviewer"
escalate = true
